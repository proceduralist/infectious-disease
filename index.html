 {id:"mdro",name:"Multidrug-Resistant Organisms & Newer Agents",cat:"Other",src:"mksap",src2:"carb",
  suspect:["Resistant organisms to anticipate: methicillin-resistant Staphylococcus aureus (MRSA), vancomycin-resistant enterococci (VRE), extended-spectrum beta-lactamase (ESBL)-producing Enterobacterales, AmpC producers (Enterobacter/Serratia/Citrobacter), carbapenem-resistant Enterobacterales (carbapenem-resistant Enterobacterales (CRE)), difficult-to-treat resistance (DTR)/multidrug-resistant (MDR) Pseudomonas, carbapenem-resistant Acinetobacter (carbapenem-resistant Acinetobacter baumannii (CRAB)), and Stenotrophomonas.","Highest prevalence in long-term acute-care and intensive care unit (ICU) settings — get an infectious disease (ID) consult, as few effective agents remain."],
  workup:["Use the susceptibilities and the resistance mechanism (e.g., KPC vs metallo-β-lactamase vs OXA-48) to choose an agent; source control remains essential."],
  empiric:[
   {set:"extended-spectrum beta-lactamase Enterobacterales",rx:"Carbapenem (meropenem/ertapenem) for serious infection; nitrofurantoin or fosfomycin for extended-spectrum beta-lactamase cystitis only",why:"Carbapenem is reliable; avoid ceftriaxone/piperacillin-tazobactam for serious extended-spectrum beta-lactamase infections."},
   {set:"carbapenem-resistant Enterobacterales — serine carbapenemase (KPC / OXA-48)",rx:"Ceftazidime-avibactam, meropenem-vaborbactam, or imipenem-relebactam",why:"Newer beta-lactam/β-lactamase-inhibitor combinations are active against serine-carbapenemase carbapenem-resistant Enterobacterales."},
   {set:"carbapenem-resistant Enterobacterales — metallo-β-lactamase (NDM/VIM)",rx:"Cefiderocol, OR ceftazidime-avibactam + aztreonam",why:"Metallo-β-lactamases hydrolyze most beta-lactams; cefiderocol or the aztreonam combination is required."},
   {set:"difficult-to-treat resistance / multidrug-resistant Pseudomonas aeruginosa",rx:"Ceftolozane-tazobactam or ceftazidime-avibactam (or cefiderocol)",why:"Preferred over older agents for difficult-to-treat resistance."},
   {set:"carbapenem-resistant Acinetobacter baumannii (Acinetobacter) / Stenotrophomonas",rx:"Acinetobacter: sulbactam-based (incl. sulbactam-durlobactam), minocycline, cefiderocol, or polymyxin combinations. Stenotrophomonas: trimethoprim-sulfamethoxazole (TMP-SMX) (or minocycline)",why:"Minocycline/cefiderocol/sulbactam for carbapenem-resistant Acinetobacter baumannii; trimethoprim-sulfamethoxazole is first-line for Stenotrophomonas."}],
  definitive:["Narrow to the most targeted agent once mechanism/susceptibility is known; involve infectious disease/stewardship and ensure source control."],
  duration:"Infection-specific; outpatient parenteral antibiotic therapy (OPAT) is often needed.",
  pearls:["Match the newer beta-lactam to the carbapenemase: ceftazidime-avibactam / meropenem-vaborbactam for KPC; cefiderocol or ceftazidime-avibactam + aztreonam for metallo-β-lactamases.","Ceftolozane-tazobactam is a workhorse for difficult-to-treat Pseudomonas.","Stenotrophomonas → trimethoprim-sulfamethoxazole; carbapenem-resistant Acinetobacter baumannii → minocycline/cefiderocol/sulbactam-based regimens — get infectious disease involved early."],
  consult:["infectious disease/stewardship consultation is recommended for all multidrug-resistant-organism infections — agent selection and source control are nuanced."]},

 {id:"needlestick",name:"Needlestick & Occupational Bloodborne Exposure (post-exposure prophylaxis (PEP))",cat:"Other",src:"mksap",src2:"hiv",
  suspect:["Percutaneous (hollow-bore needle, deep injury, visible blood, device in an artery/vein) or mucous-membrane exposure to blood/body fluids — risk of human immunodeficiency virus (HIV), hepatitis B virus (HBV), and hepatitis C virus (HCV)."],
  workup:["Test the SOURCE for human immunodeficiency virus (Ag/Ab), hepatitis B surface antigen (HBsAg), and hepatitis C virus (antibody ± RNA). Baseline-test the exposed worker for human immunodeficiency virus, hepatitis B virus immunity (anti-HBs), and hepatitis C virus.","Assess exposure severity and source viral load; act fast — human immunodeficiency virus post-exposure prophylaxis works best within hours."],
  empiric:[
   {set:"human immunodeficiency virus exposure (source positive or unknown high-risk)",rx:"Start human immunodeficiency virus post-exposure prophylaxis ASAP (ideally within 1–2 h, up to 72 h): a 3-drug regimen ×28 days — e.g., tenofovir/emtricitabine + dolutegravir (or raltegravir)",why:"Earlier is better; a 3-drug 28-day course markedly reduces seroconversion."},
   {set:"hepatitis B virus exposure (worker non-immune or unknown)",rx:"Hepatitis B immune globulin (hepatitis B immune globulin (HBIG)) + initiate/complete hepatitis B virus vaccination per immune status",why:"hepatitis B immune globulin + vaccine for non-immune workers; no action needed if documented immune."},
   {set:"hepatitis C virus exposure",rx:"No prophylaxis — monitor with hepatitis C virus RNA/serology and treat with direct-acting antivirals if seroconversion occurs",why:"There is no effective hepatitis C virus post-exposure prophylaxis; early detection allows curative direct-acting antiviral (DAA) therapy."}],
  definitive:["Follow-up serologic testing per protocol; counsel on interim precautions."],
  duration:"human immunodeficiency virus post-exposure prophylaxis 28 days; serologic follow-up over weeks to months.",
  pearls:["human immunodeficiency virus post-exposure prophylaxis is time-critical — start within hours (not days); a 3-drug regimen for 28 days.","There is NO hepatitis C virus prophylaxis — monitor and treat seroconversion with DAAs (curable).","Non-immune workers exposed to hepatitis B virus get hepatitis B immune globulin + vaccine; ensure all health-care workers are hepatitis B virus-immunized."],
  consult:["Occupational health/infectious disease (ID) for post-exposure prophylaxis selection, source testing, and follow-up serologies."]},

 {id:"opat",name:"Outpatient Parenteral Antibiotic Therapy (outpatient parenteral antibiotic therapy (OPAT))",cat:"Other",src:"mksap",
  suspect:["Patients who need intravenous (IV) antibiotics but are otherwise stable for discharge — defined as ≥2 intravenous doses on different days without intervening hospitalization."],
  workup:["Confirm a reliable vascular-access plan, the regimen's stability and dosing schedule, and a monitoring plan (labs, drug levels); infectious disease (ID) consultation improves outpatient parenteral antibiotic therapy outcomes.","Best-suited infections: bone & joint (most common), endocarditis and cardiac-device infections, intra-abdominal, complicated skin and soft tissue infection (SSTI), central nervous system (CNS) infections, and resistant infections requiring intravenous therapy (e.g., some UTIs)."],
  empiric:[
   {set:"outpatient parenteral antibiotic therapy candidate",rx:"Choose an agent with convenient dosing and stability (e.g., ceftriaxone daily, ertapenem daily, daptomycin daily) and arrange weekly safety labs plus drug-level monitoring (e.g., vancomycin)",why:"Once-daily agents simplify home administration; monitoring catches toxicity and confirms efficacy."}],
  definitive:["Reassess regularly; transition to highly bioavailable oral therapy when appropriate — oral can be non-inferior for many bone/joint and endovascular infections (OVIVA, POET)."],
  duration:"Infection-specific.",
  pearls:["Bone and joint infections are the most common outpatient parenteral antibiotic therapy indication.","Pair outpatient parenteral antibiotic therapy with infectious disease oversight and a monitoring plan (weekly labs, drug levels) to catch line complications and toxicity.","Don't default to intravenous — many infections can step down to highly bioavailable oral agents."],
  consult:["infectious disease for outpatient parenteral antibiotic therapy agent selection, line strategy, monitoring, and intravenous-to-oral switch."]},

 {id:"hsv",name:"Herpes Simplex Virus (HSV-1 / HSV-2)",cat:"Skin, Soft Tissue, and Bone",src:"mksap",
  suspect:["herpes simplex virus-1 (orolabial; also keratitis and encephalitis) and herpes simplex virus-2 (genital/rectal ulcers ± proctitis): painful grouped vesicles on an erythematous base → pustules → crusting; recurrent.","Primary genital herpes can be severe with systemic symptoms; reactivations are milder. Suspect herpes simplex virus encephalitis with fever + altered mental status/focal (temporal-lobe) signs."],
  workup:["Polymerase chain reaction (PCR) of a lesion swab is the test of choice; cerebrospinal fluid herpes simplex virus polymerase chain reaction for suspected encephalitis (can be falsely negative <72h — repeat). Type-specific serology can confirm herpes simplex virus-2."],
  empiric:[{set:"Mucocutaneous / genital herpes simplex virus",rx:"Oral acyclovir, valacyclovir, or famciclovir (episodic or daily suppressive); intravenous (IV) acyclovir for severe/disseminated disease, esophagitis, or suspected herpes simplex virus encephalitis",why:"Nucleoside analogues shorten episodes and (suppression) reduce recurrences/transmission; intravenous acyclovir for severe or central nervous system (CNS) disease."}],
  definitive:["Suppressive therapy for frequent recurrences or to reduce transmission. See the Encephalitis module for herpes simplex virus encephalitis (intravenous acyclovir 10 mg/kg every 8 hours)."],
  duration:"Episodic 5–10 days; suppression ongoing; herpes simplex virus encephalitis 14–21 days intravenous.",
  pearls:["A negative cerebrospinal fluid herpes simplex virus polymerase chain reaction in the first 72h does NOT exclude herpes simplex virus encephalitis — continue acyclovir and repeat.","Suppressive valacyclovir reduces genital herpes simplex virus-2 transmission to partners."],
  consult:["infectious disease (ID) for herpes simplex virus encephalitis, disseminated/visceral disease, or acyclovir-resistant herpes simplex virus (consider foscarnet)."]},

 {id:"vzv",name:"Varicella-Zoster Virus (Chickenpox / Shingles)",cat:"Skin, Soft Tissue, and Bone",src:"mksap",
  suspect:["Primary varicella (chickenpox): generalized vesicular rash in different stages ('dewdrops on a rose petal') + fever — severe in adults, the immunocompromised, and pregnancy.","Zoster (shingles): painful dermatomal vesicular rash; postherpetic neuralgia is the major sequela. varicella-zoster virus can cause encephalitis/vasculopathy/myelitis sometimes WITHOUT a rash."],
  workup:["Clinical; polymerase chain reaction of a lesion swab confirms. For varicella-zoster virus central nervous system disease, send cerebrospinal fluid varicella-zoster virus polymerase chain reaction AND cerebrospinal fluid varicella-zoster virus immunoglobulin G (IgG) (more sensitive than polymerase chain reaction for vasculopathy)."],
  empiric:[
   {set:"Zoster",rx:"Valacyclovir/famciclovir (or acyclovir) — ideally within 72h of rash onset",why:"Reduces zoster severity and postherpetic neuralgia."},
   {set:"Severe/disseminated or varicella-zoster virus encephalitis",rx:"Intravenous (IV) acyclovir 10 mg/kg every 8 hours",why:"Intravenous acyclovir for central nervous system/disseminated disease and immunocompromised hosts."}],
  definitive:["Prevent with recombinant zoster vaccine (age ≥50, and immunocompromised ≥19) and varicella vaccine for the non-immune. Post-exposure varicella-zoster immune globulin for susceptible high-risk contacts (pregnant, immunocompromised, neonates)."],
  duration:"Zoster 7 days; varicella-zoster virus encephalitis 10–14 days intravenous.",
  pearls:["Send cerebrospinal fluid varicella-zoster virus polymerase chain reaction (and IgG) in any unexplained encephalitis — varicella-zoster virus can cause central nervous system disease WITHOUT a rash.","The recombinant zoster vaccine is preferred and is recommended even for immunocompromised adults ≥19."],
  consult:["infectious disease (ID) for varicella-zoster virus encephalitis/vasculopathy, disseminated zoster, or ophthalmic zoster (with ophthalmology)."]},

 {id:"ebv",name:"Epstein-Barr Virus (Infectious Mononucleosis)",cat:"Systemic",src:"mksap",
  suspect:["Infectious mononucleosis: fever, exudative pharyngitis, posterior cervical (or generalized) lymphadenopathy, marked fatigue, and splenomegaly — typically adolescents/young adults.","Complications: splenic rupture, airway obstruction from tonsillar hypertrophy. Epstein-Barr virus is linked to post-transplant lymphoproliferative disorder and certain lymphomas/nasopharyngeal carcinoma."],
  workup:["Heterophile antibody (Monospot — low sensitivity in the first week) and Epstein-Barr virus VCA immunoglobulin M (IgM)/immunoglobulin G (IgG); complete blood count shows atypical lymphocytosis; mild transaminitis is common."],
  empiric:[{set:"Infectious mononucleosis",rx:"Supportive care only; AVOID amoxicillin/ampicillin (morbilliform rash); avoid contact/collision sports for ~3–4 weeks (splenic-rupture risk)",why:"Self-limited — no antiviral is indicated. Corticosteroids only for impending airway obstruction or severe complications."}],
  definitive:["Supportive; corticosteroids for airway compromise. In transplant, reduce immunosuppression for Epstein-Barr virus post-transplant lymphoproliferative disorder."],
  duration:"Self-limited (fatigue may last weeks).",
  pearls:["Avoid amoxicillin/ampicillin in mononucleosis (rash) and counsel on splenic-rupture precautions.","Heterophile testing can be falsely negative early — repeat or use Epstein-Barr virus-specific serology."],
  consult:["infectious disease (ID)/hematology for atypical/complicated disease and Epstein-Barr virus post-transplant lymphoproliferative disorder."]},

 {id:"cmv",name:"Cytomegalovirus (CMV)",cat:"Systemic",src:"mksap",
  suspect:["Immunocompetent: mononucleosis-like illness (often heterophile-negative).","Immunocompromised (transplant, advanced human immunodeficiency virus (HIV) CD4 <50): end-organ disease — retinitis, colitis/esophagitis, pneumonitis, hepatitis, encephalitis. Congenital cytomegalovirus is a leading infectious cause of hearing loss."],
  workup:["Quantitative cytomegalovirus polymerase chain reaction (PCR) of blood for systemic disease; tissue biopsy showing 'owl's-eye' inclusions confirms end-organ disease. Dilated fundoscopy for suspected retinitis. Serology mainly gauges pre-transplant donor/recipient risk."],
  empiric:[{set:"cytomegalovirus end-organ disease (immunocompromised)",rx:"Ganciclovir intravenous (IV) or valganciclovir by mouth (PO); foscarnet for resistance or marrow toxicity; reduce immunosuppression where possible",why:"Treat end-organ disease and restore immunity."}],
  definitive:["Transplant: cytomegalovirus prophylaxis (valganciclovir) or pre-emptive therapy guided by surveillance polymerase chain reaction. human immunodeficiency virus retinitis: treat and start/optimize antiretroviral therapy (watch immune reconstitution)."],
  duration:"End-organ disease until clinical/virologic resolution, then maintenance per host.",
  pearls:["Diagnose active cytomegalovirus disease by polymerase chain reaction/biopsy ('owl's-eye' inclusions) — serology mainly gauges pre-transplant risk.","cytomegalovirus retinitis is sight-threatening — urgent ophthalmology."],
  consult:["infectious disease (ID)/transplant for cytomegalovirus in immunocompromised/transplant patients and for ganciclovir resistance."]},

 {id:"pid",name:"Pelvic Inflammatory Disease",cat:"Genitourinary",src:"mksap",src2:"hiv",
  suspect:["Sexually active woman with lower abdominal/pelvic pain; diagnose clinically when there is uterine, adnexal, OR cervical-motion tenderness (especially with mucopurulent cervical discharge).","Often mild/nonspecific; untreated pelvic inflammatory disease (PID) causes infertility, ectopic pregnancy, and chronic pelvic pain. It is polymicrobial — test for Neisseria gonorrhoeae (N. gonorrhoeae) and Chlamydia trachomatis (C. trachomatis) (and consider Mycoplasma genitalium (M. genitalium))."],
  workup:["Pelvic exam; nucleic acid amplification test (NAAT) for gonorrhea and chlamydia; pregnancy test; human immunodeficiency virus (HIV) and syphilis screening; ultrasound if severe or a pelvic mass (tubo-ovarian abscess)."],
  empiric:[
   {set:"Outpatient pelvic inflammatory disease",rx:"Ceftriaxone 500 mg intramuscular (IM) ×1 + doxycycline 100 mg by mouth (PO) twice daily (BID) ×14 days + metronidazole 500 mg by mouth twice daily ×14 days",why:"Covers gonorrhea + chlamydia + anaerobes (2021 Centers for Disease Control and Prevention (CDC)) — treat empirically, don't wait for tests."},
   {set:"Severe / tubo-ovarian abscess / pregnancy / failed outpatient",rx:"Admit for intravenous (IV) therapy (e.g., cefotetan or cefoxitin + doxycycline, or ceftriaxone + doxycycline + metronidazole); drain a tubo-ovarian abscess",why:"Inpatient intravenous therapy and source control for severe disease."}],
  definitive:["Treat partners; counsel on sexually transmitted infection (STI) prevention and re-testing; remove an IUD only if there is no clinical improvement."],
  duration:"14 days.",
  pearls:["Diagnose and treat pelvic inflammatory disease on minimal clinical criteria (cervical-motion/uterine/adnexal tenderness) — a low threshold protects fertility.","The empiric regimen now routinely includes metronidazole for anaerobic coverage (2021 Centers for Disease Control and Prevention).","Suspect tubo-ovarian abscess with a pelvic mass or severe illness — image and consider drainage."],
  consult:["Gynecology for tubo-ovarian abscess/drainage; treat partners and report STIs."]},

 {id:"rsv",name:"Respiratory Syncytial Virus (RSV)",cat:"Respiratory",src:"mksap",
  suspect:["Cold-like upper-respiratory illness, but causes severe lower-respiratory infection (bronchiolitis/pneumonia, wheezing) in adults >60 and the immunocompromised (hematopoietic stem cell transplant (HSCT), lung/heart disease); often nosocomial (droplet/fomite spread)."],
  workup:["Multiplex respiratory polymerase chain reaction (PCR). Use contact/droplet precautions, especially in transplant units."],
  empiric:[{set:"respiratory syncytial virus",rx:"Supportive care and isolation; no routine antiviral in adults (ribavirin is used in selected hematopoietic stem cell transplant recipients by specialists)",why:"Management is supportive; prevention is the priority."}],
  definitive:["Prevention: respiratory syncytial virus vaccination for adults ≥75 (and 60–74 with risk factors) and other indicated groups; infection control to prevent nosocomial spread."],
  duration:"Self-limited (supportive).",
  pearls:["respiratory syncytial virus is not just pediatric — it causes severe lower-respiratory disease in older adults and the immunocompromised; vaccinate eligible older adults.","A major cause of nosocomial respiratory outbreaks — isolate and emphasize hand hygiene."],
  consult:["infectious disease (ID) for severe respiratory syncytial virus in the immunocompromised; infection prevention for outbreaks."]},

 {id:"mpox",name:"Mpox (Monkeypox)",cat:"Skin, Soft Tissue, and Bone",src:"mksap",
  suspect:["Painful vesiculopustular lesions, often umbilicated and in different stages, frequently starting in the anogenital/oral area ± proctitis; may have fever and lymphadenopathy. Spread by skin-to-skin (often sexual) contact, respiratory secretions, and fomites — most cases in men who have sex with men but not exclusively."],
  workup:["Polymerase chain reaction (PCR) of a lesion swab. Use airborne + contact precautions until smallpox/other causes are excluded; report to public health. Co-test for sexually transmitted infections and human immunodeficiency virus."],
  empiric:[{set:"Mpox",rx:"Supportive care and pain control; tecovirimat for severe disease or high-risk hosts (advanced human immunodeficiency virus, extensive/anogenital/ocular disease)",why:"Most disease is self-limited; antivirals are reserved for severe disease or high-risk hosts."}],
  definitive:["Vaccinate close contacts post-exposure (JYNNEOS) and offer vaccination to at-risk populations as pre-exposure prophylaxis."],
  duration:"2–4 weeks (until lesions crust and re-epithelialize); isolate until lesions heal.",
  pearls:["Think mpox with painful anogenital vesiculopustular lesions — co-test for human immunodeficiency virus and sexually transmitted infections.","Severe disease occurs in advanced human immunodeficiency virus — treat with tecovirimat and address immune status."],
  consult:["Infection prevention/public health (isolation, reporting, post-exposure vaccination); infectious disease (ID) for severe disease or immunocompromised hosts."]},

 {id:"measles",name:"Measles (Rubeola)",cat:"Respiratory",src:"mksap",
  suspect:["Prodrome of high fever, cough, coryza, and conjunctivitis ('the 3 C's') with pathognomonic Koplik spots, then a cephalocaudal (face → trunk) maculopapular rash. Re-emerging with under-vaccination — ask about exposure/travel.","Highly contagious (airborne). Complications: pneumonia (leading cause of death), otitis media, encephalitis, and the late subacute sclerosing panencephalitis (SSPE)."],
  workup:["Clinical recognition plus measles immunoglobulin M (IgM) and/or reverse-transcription polymerase chain reaction (PCR) (throat/nasopharyngeal/urine). IMMEDIATELY isolate (airborne) and report to public health."],
  empiric:[{set:"Measles",rx:"Supportive care + vitamin A (reduces morbidity/mortality, especially in children); airborne isolation",why:"No specific antiviral; vitamin A is the key adjunct."}],
  definitive:["Post-exposure prophylaxis for susceptible contacts: MMR vaccine within 72h, OR immune globulin within 6 days (infants, pregnant people, immunocompromised). Prevention is two-dose MMR."],
  duration:"Self-limited (supportive); isolate for 4 days after rash onset (longer if immunocompromised).",
  pearls:["Measles is airborne and extremely contagious — isolate immediately, give vitamin A, and notify public health.","Koplik spots precede the rash; the rash spreads cephalocaudally."],
  consult:["Infection prevention/public health (airborne isolation, reporting, contact post-exposure prophylaxis (PEP))."]},

/* ---------- HELPERS ---------- */
const $=s=>document.querySelector(s);
const ce=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function sClass(v){if(v==null)return"s-na";if(v>=90)return"s-good";if(v>=80)return"s-ok";if(v>=70)return"s-warn";return"s-bad";}
function sCell(v){if(v==null)return'<span class="sb s-na">–</span>';return'<span class="sb '+sClass(v)+'">'+v+'</span>';}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function refLink(key){const L=LIBRARY[key];if(!L)return"";const href="references/"+encodeURIComponent(L.file);return'<a href="'+href+'" target="_blank" title="'+esc(L.src)+'">'+esc(L.t)+'</a>';}
function refTag(key){const L=LIBRARY[key];if(!L)return"";return '<a class="tag b" href="references/'+encodeURIComponent(L.file)+'" target="_blank">&#128196; '+esc(L.src)+'</a>';}

/* Best local agents for an organism (from antibiogram): returns sorted list */
function bestAgents(panel,orgName,min){
  const sec=[...ABG[panel].gramneg,...ABG[panel].grampos].find(x=>x.o===orgName);
  if(!sec)return[];
  return Object.entries(sec.s).filter(([d,v])=>v!=null&&v>=(min||80)).sort((a,b)=>b[1]-a[1]);
}

/* ---------- ANTIBIOGRAM ---------- */
let ABGpanel="systemic";
PAGES.abg=(c)=>{
  c.append(ce("h2","sec","Local Antibiogram (2022)"));
  c.append(ce("p","lead","% of isolates susceptible (LabCorp, Jan 1–Dec 31 2022). Use to choose and de-escalate empiric therapy. Green ≥90 · yellow 80–89 · orange 70–79 · red &lt;70."));
  const tog=ce("div","chips");tog.style.marginBottom="6px";
  [["systemic","Systemic / blood"],["urine","Urine"]].forEach(p=>{const b=ce("span","chip"+(ABGpanel===p[0]?" on":""),p[1]);b.onclick=()=>{ABGpanel=p[0];go("abg");};tog.append(b);});
  c.append(tog);
  c.append(ce("div","legend",'<span><span class="dot" style="background:var(--good)"></span>≥90%</span><span><span class="dot" style="background:#a16207"></span>80–89%</span><span><span class="dot" style="background:var(--warn)"></span>70–79%</span><span><span class="dot" style="background:var(--bad)"></span>&lt;70%</span><span>– = not reported</span> &nbsp; <span class="flag">* n&lt;30: interpret with caution (CLSI M39)</span>'));
  const P=ABG[ABGpanel];
  const esbl=ce("div","callout warn","<b>extended-spectrum beta-lactamase (ESBL) organisms isolated this period:</b> "+P.esbl+". For known/suspected extended-spectrum beta-lactamase infections use a carbapenem — do not rely on cephalosporins or piperacillin-tazobactam for extended-spectrum beta-lactamase bacteremia.");
  c.append(esbl);
  ["gramneg","grampos"].forEach(grp=>{
    const card=ce("div","card");
    card.append(ce("h3",null,grp==="gramneg"?"Gram-negative organisms":"Gram-positive organisms"));
    const wrapT=ce("div");wrapT.style.overflowX="auto";
    const drugs=P.drugs.filter(d=>P[grp].some(o=>o.s[d]!=null));
    let html='<table><thead><tr><th style="min-width:215px">Organism</th><th>n</th>';
    drugs.forEach(d=>html+='<th title="'+d+'">'+d.replace("Trimeth/sulfa","trimethoprim-sulfamethoxazole (TMP-SMX)")+'</th>');
    html+='</tr></thead><tbody>';
    P[grp].forEach(o=>{
      html+='<tr><td><b>'+esc(o.o)+'</b>'+(o.small?' <span class="flag">*</span>':'')+(o.note?' <span class="muted small" title="'+esc(o.note)+'">&#9432;</span>':'')+'</td><td class="muted">'+o.n+'</td>';

/* ---------- SYMPTOM ANALYZER ---------- */
let DXSEL=new Set();
function dxFinding(id){return FINDINGS.find(f=>f.id===id);}
function dxRank(){
  const out=[];
  for(const id in DXKB){
    const syn=SYN.find(s=>s.id===id); if(!syn)continue;
    const feats=DXKB[id]; let score=0,total=0,matched=[],strong=0;
    for(const f in feats){const w=feats[f]; total+=w; if(DXSEL.has(f)){score+=w;matched.push([f,w]);if(w>=3)strong++;}}
    if(score>0) out.push({id,syn,score,total,matched,strong,feat:Object.keys(feats).length});
  }
  out.sort((a,b)=>b.score-a.score||b.strong-a.strong||(b.score/b.total)-(a.score/a.total));
  return out;
}
PAGES.dx=(c)=>{
  c.append(ce("h2","sec","Symptom Analyzer"));
  c.append(ce("p","lead","Select the symptoms, exam signs, lab/micro findings, and exposures present. The analyzer ranks the most plausible diagnoses from this app's syndrome library, shows which findings support each, suggests what else to check, and links to the full module."));
  c.append(ce("div","callout warn small","<b>Decision support — not a diagnosis.</b> This pattern-matches your inputs against curated syndrome profiles; it does not weigh prevalence or timing and can miss diagnoses. Always correlate clinically and confirm with appropriate testing."));
  const ctrl=ce("div","card");
  ctrl.innerHTML='<label class="fld">Filter findings</label>';
  const sb=ce("input");sb.type="text";sb.placeholder="Type to filter (e.g., rash, CD4, tick, lactate, traveler)…";sb.autocomplete="off";ctrl.append(sb);
  const selWrap=ce("div");selWrap.style.marginTop="10px";ctrl.append(selWrap);
  c.append(ctrl);
  const groups=[["sx","Symptoms"],["exam","Exam signs"],["lab","Labs &amp; microbiology"],["imaging","Imaging"],["exposure","Exposures & contacts"],["travel","Travel &amp; geography"],["pmh","Past medical &amp; social history"]];
  const gridWrap=ce("div");c.append(gridWrap);
  const resHead=ce("h2","sec","Ranked differential");resHead.style.marginTop="20px";resHead.style.fontSize="18px";c.append(resHead);
  const res=ce("div");c.append(res);
  let chipEls={};
  function syncChips(){for(const id in chipEls){if(chipEls[id])chipEls[id].classList.toggle("on",DXSEL.has(id));}}
  function drawSelected(){
    selWrap.innerHTML="";
    if(!DXSEL.size){selWrap.append(ce("span","small muted","No findings selected yet — pick from the lists below (or filter above)."));return;}
    selWrap.innerHTML='<div class="small muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Selected ('+DXSEL.size+')</div>';
    const bar=ce("div","chips");
    [...DXSEL].forEach(id=>{const f=dxFinding(id);if(!f)return;const chip=ce("span","chip on",esc(f.label)+"  ✕");chip.onclick=()=>{DXSEL.delete(id);syncChips();drawSelected();drawRes();};bar.append(chip);});
    const clr=ce("span","chip","Clear all");clr.style.borderColor="var(--bad)";clr.style.color="var(--bad)";clr.onclick=()=>{DXSEL.clear();syncChips();drawSelected();drawRes();};
    bar.append(clr);selWrap.append(bar);
  }
  function buildGroups(){
    gridWrap.innerHTML="";chipEls={};
    const q=sb.value.toLowerCase().trim();
    groups.forEach(([g,label])=>{
      const items=FINDINGS.filter(f=>f.grp===g&&(!q||f.label.toLowerCase().includes(q)));
      if(!items.length)return;
      const card=ce("div","card");card.append(ce("h3",null,label+' <span class="muted small">('+items.length+')</span>'));
      const chips=ce("div","chips");
      items.forEach(f=>{const chip=ce("span","chip"+(DXSEL.has(f.id)?" on":""),esc(f.label));chip.onclick=()=>{if(DXSEL.has(f.id))DXSEL.delete(f.id);else DXSEL.add(f.id);chip.classList.toggle("on");drawSelected();drawRes();};chipEls[f.id]=chip;chips.append(chip);});
      card.append(chips);gridWrap.append(card);
    });
    if(!gridWrap.children.length)gridWrap.append(ce("div","callout small","No findings match “"+esc(sb.value)+"”."));
  }
  function drawRes(){
    res.innerHTML="";
    if(!DXSEL.size){res.append(ce("div","callout small","Select findings above to generate a ranked differential."));return;}
    const ranked=dxRank();
    if(!ranked.length){res.append(ce("div","callout small","No syndrome profiles matched those findings. Try adding or broadening findings."));return;}
    const top=ranked[0].score;
    ranked.slice(0,6).forEach((r,i)=>{
      const card=ce("div","card");
      const pct=Math.round(100*r.score/top);
      let h='<div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap"><h3 style="margin:0">'+(i+1)+'. '+esc(r.syn.name)+'</h3><span class="tag">'+esc(r.syn.cat)+'</span>'+(r.strong?'<span class="pill" style="background:var(--goodbg);color:var(--good)">★ '+r.strong+' strong cue'+(r.strong>1?'s':'')+'</span>':'')+'</div>';
      h+='<div style="height:8px;background:var(--soft);border-radius:6px;margin:9px 0 5px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,var(--brand),var(--brand2))"></div></div>';
      h+='<div class="small muted">Match score '+r.score+' · '+r.matched.length+' of '+r.feat+' profile features present</div>';
      card.innerHTML=h;
      const mWrap=ce("div");mWrap.innerHTML='<div class="small muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:10px 0 3px">Findings you entered that fit</div>';
      const mc=ce("div","chips");
      r.matched.slice().sort((a,b)=>b[1]-a[1]).forEach(([f,w])=>{const f0=dxFinding(f);const el=ce("span","chip on",(w>=3?"★ ":"")+esc(f0?f0.label:f));el.style.cursor="default";mc.append(el);});
      mWrap.append(mc);card.append(mWrap);
      const missing=Object.keys(DXKB[r.id]).filter(f=>!DXSEL.has(f)).map(f=>[f,DXKB[r.id][f]]).sort((a,b)=>b[1]-a[1]).slice(0,5);
      if(missing.length){const tWrap=ce("div");tWrap.innerHTML='<div class="small muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:10px 0 3px">Also supports this — check for</div>';const tc=ce("div","chips");missing.forEach(([f,w])=>{const f0=dxFinding(f);const el=ce("span","chip",(w>=3?"★ ":"")+esc(f0?f0.label:f));el.title="Add to findings";el.onclick=()=>{DXSEL.add(f);syncChips();drawSelected();drawRes();};tc.append(el);});tWrap.append(tc);card.append(tWrap);}
      const foot=ce("div");foot.style.cssText="margin-top:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap";
      const refs=ce("span");refs.innerHTML=refTag(r.syn.src)+(r.syn.src2?" "+refTag(r.syn.src2):"");
      foot.append(refs);
      const open=ce("button","btn sm","Open module →");open.onclick=()=>{SYNSEL=r.id;go("syndromes");};
      foot.append(open);card.append(foot);
      res.append(card);
    });
    res.append(ce("div","small muted","Ranking = sum of weights of matched findings (★ = strongly suggestive cue). Profiles are curated teaching fingerprints, not a validated diagnostic algorithm."));
  }
  sb.oninput=()=>buildGroups();
  buildGroups();drawSelected();drawRes();
};

function renderLexi(c,d,L){
  const ctrl=ce("div","card");
  ctrl.innerHTML='<h3>Adjust for this patient <span class="tag b">Lexicomp</span></h3><div class="small muted" style="margin-bottom:8px">Enter values to auto-adjust the maintenance dosing in the table below. Leave blank for normal renal/hepatic function. Always confirm against pharmacy and indication-specific targets.</div>';
  const row=ce("div","chips");row.style.gap="16px";row.style.alignItems="flex-end";
  const mk=(lab,el)=>{const w=ce("label");w.style.cssText="display:flex;flex-direction:column;gap:3px;font-size:11.5px;font-weight:700;color:var(--muted)";w.append(document.createTextNode(lab));w.append(el);return w;};
  let crclEl,rrtEl,ctpEl,ageEl;
  if(L.vars.includes("crcl")){crclEl=ce("input");crclEl.type="number";crclEl.min="0";crclEl.placeholder="mL/min";crclEl.style.cssText="width:110px;padding:6px 8px";row.append(mk("CrCl (mL/min)",crclEl));}
  if(L.vars.includes("rrt")){rrtEl=ce("select");rrtEl.style.padding="6px 8px";"none|No dialysis;hd|Intermittent HD;crrt|CRRT;pirrt|PIRRT".split(";").forEach(o=>{const a=o.split("|");const op=ce("option");op.value=a[0];op.textContent=a[1];rrtEl.append(op);});row.append(mk("Renal replacement",rrtEl));}
  if(L.vars.includes("age")){ageEl=ce("input");ageEl.type="number";ageEl.min="0";ageEl.placeholder="years";ageEl.style.cssText="width:90px;padding:6px 8px";row.append(mk("Age (years)",ageEl));}
  if(L.vars.includes("ctp")){ctpEl=ce("select");ctpEl.style.padding="6px 8px";"|—;A|Child-Pugh A;B|Child-Pugh B;C|Child-Pugh C".split(";").forEach(o=>{const a=o.split("|");const op=ce("option");op.value=a[0];op.textContent=a[1];ctpEl.append(op);});row.append(mk("Child-Pugh",ctpEl));}
  ctrl.append(row);c.append(ctrl);
  const out=ce("div");c.append(out);
  const compute=()=>{
    let active=null,basis="";
    const rrt=rrtEl?rrtEl.value:"none";
    const crcl=(crclEl&&crclEl.value!=="")?parseFloat(crclEl.value):null;
    if(rrt==="hd"&&L.hd){active=L.hd;basis="Intermittent HD";}
    else if(rrt==="crrt"&&L.crrt){active=L.crrt;basis="CRRT";}
    else if(rrt==="pirrt"&&L.pirrt){active=L.pirrt;basis="PIRRT";}
    else if(crcl!==null&&!isNaN(crcl)){
      if(L.arc&&crcl>=130){active=L.arc;basis="Augmented clearance (CrCl ≥130)";}
      else if(L.renal){for(const b of L.renal){if(crcl>=b.lo){active=b.d;basis=b.lbl;break;}}}
    }
    return {active:active,basis:basis,ctp:(ctpEl?ctpEl.value:"")};
  };
  const draw=()=>{
    out.innerHTML="";
    const s=compute();
    const sum=ce("div",s.active?"callout small":"callout warn small");
    sum.innerHTML=s.active?('<b>Adjusted maintenance dosing — '+esc(s.basis)+':</b> '+esc(s.active)+'. Applied to the renally-scaled rows below.'):'Showing <b>normal renal/hepatic-function</b> dosing. Enter a CrCl or dialysis modality above to adjust.';
    out.append(sum);
    if(s.ctp&&L.hepatic){const lbl=s.ctp==="A"?"Child-Pugh A":(s.ctp==="B"?"Child-Pugh B":"Child-Pugh C");const hp=ce("div","callout small");hp.innerHTML='<b>Hepatic ('+esc(lbl)+'):</b> '+esc(typeof L.hepatic==="string"?L.hepatic:(L.hepatic[s.ctp]||L.hepatic.note||""));out.append(hp);}
    const card=ce("div","card");
    let html='<h3>Indication-based dosing</h3><div style="overflow-x:auto"><table><thead><tr><th style="min-width:46%">Disease / indication</th><th>Dose · schedule · route</th></tr></thead><tbody>';
    L.ind.forEach(it=>{
      let cell;
      if(s.active&&it.scal){cell='<b>'+esc(s.active)+'</b> <span class="tag b">'+esc(s.basis)+'</span>';}
      else{cell=esc(it.route+" "+it.dose)+((s.active&&!it.scal)?' <span class="muted small">(fixed dose — not renally scaled)</span>':'');}
      html+='<tr><td><b>'+esc(it.dz)+'</b></td><td class="small">'+cell+'</td></tr>';
    });
    html+='</tbody></table></div>';
    card.innerHTML=html;out.append(card);
  };
  [crclEl,rrtEl,ctpEl,ageEl].forEach(el=>{if(el){el.oninput=draw;el.onchange=draw;}});
  draw();
  const pk=ce("div","card");pk.innerHTML='<h3>Pharmacokinetics — half-life &amp; clearance</h3><div class="small">'+esc(L.pk)+'</div>';c.append(pk);
}

PAGES.sulfa=(c)=>{
  c.append(ce("h2","sec","Sulfonamide (Sulfa) Allergy — alternative regimens"));
  c.append(ce("p","lead","Most “sulfa allergy” is a delayed maculopapular rash to an <b>antimicrobial</b> sulfonamide (usually TMP-SMX). The key distinction is <b>antimicrobial vs non-antimicrobial</b> sulfonamides — there is <b>no meaningful cross-reactivity</b> between them, so a sulfa-allergic patient can still receive thiazide/loop diuretics, sulfonylureas, celecoxib, and acetazolamide."));

  const c1=ce("div","card");
  c1.innerHTML='<h3>1 · Classify the reaction</h3>';
  c1.append(ce("div","callout bad small","<b>Severe / high-risk — avoid antimicrobial sulfonamides; never rechallenge or desensitize:</b> SJS/TEN, DRESS, AGEP, serum sickness, drug-induced hepatitis, hemolytic anemia/cytopenias, or interstitial nephritis. Sulfonamides are among the most common causes of SJS/TEN and DRESS."));
  c1.append(ce("div","callout warn small","<b>Immediate / IgE (urticaria, angioedema, anaphylaxis):</b> avoid antimicrobial sulfonamides and use a non-sulfonamide alternative. Desensitization is feasible (e.g., TMP-SMX for PJP prophylaxis in HIV) <i>only</i> when the prior reaction was non-severe."));
  c1.append(ce("div","callout ok small","<b>Mild delayed rash / GI upset / vague “sulfa” label:</b> clarify what happened. A remote mild maculopapular rash is not a contraindication to non-antibiotic sulfonamides, and TMP-SMX can sometimes be reintroduced or desensitized when truly needed."));
  c.append(c1);

  const c2=ce("div","card");
  c2.innerHTML='<h3>2 · Cross-reactivity facts</h3>'+
   '<ul style="margin:6px 0;padding-left:18px">'+
   '<li><b>Antibiotic vs non-antibiotic is the whole game.</b> Antimicrobial sulfonamides (sulfamethoxazole, sulfadiazine, sulfasalazine) carry an <b>arylamine (N4) group + N1-substituted ring</b> responsible for hypersensitivity. Non-antimicrobial sulfonamides (loop &amp; thiazide diuretics, sulfonylureas, celecoxib, acetazolamide, sumatriptan) <b>lack</b> these → no meaningful cross-reactivity.</li>'+
   '<li>An apparent increased risk after a sulfa-antibiotic reaction reflects a <b>general predisposition to drug allergy</b>, not true structural cross-reactivity — do not blanket-restrict diuretics or sulfonylureas.</li>'+
   '<li>“Sulfa” has <b>no relation to sulfites or elemental sulfur</b> — those need not be avoided.</li>'+
   '<li>Within the antimicrobial sulfonamides there <b>is</b> cross-reactivity (sulfamethoxazole ↔ sulfadiazine ↔ sulfasalazine) — avoid the whole antibiotic group.</li>'+
   '<li><b>Dapsone</b> is a sulfone, not a sulfonamide — usually usable, but be cautious after a severe sulfonamide reaction.</li>'+
   '</ul>';
  c.append(c2);

  const c3=ce("div","card");
  c3.innerHTML='<h3>3 · Syndrome-specific alternatives</h3><p class="small muted" style="margin-top:0">TMP-SMX is usually the agent being replaced. Choose by indication.</p>';
  const rows=[
   ["PJP — treatment","TMP-SMX","Primaquine + clindamycin; OR IV pentamidine; OR atovaquone (mild–moderate). Add corticosteroids if PaO2 <70 mmHg or A-a gradient ≥35."],
   ["PJP — prophylaxis","TMP-SMX","Atovaquone; dapsone (check G6PD; avoid if the sulfa reaction was severe); or inhaled pentamidine"],
   ["Uncomplicated cystitis","TMP-SMX","Nitrofurantoin or fosfomycin (fluoroquinolone-sparing)"],
   ["CA-MRSA SSTI (purulent)","TMP-SMX or doxycycline","I&D + doxycycline/minocycline, clindamycin, or linezolid"],
   ["Stenotrophomonas maltophilia","TMP-SMX","Levofloxacin; minocycline; cefiderocol (infectious disease consult)"],
   ["Nocardiosis","High-dose TMP-SMX","Linezolid, imipenem, amikacin, or minocycline — often in combination (infectious disease consult)"],
   ["Toxoplasmosis","Pyrimethamine + sulfadiazine","Pyrimethamine + clindamycin (+ leucovorin); or atovaquone"],
   ["Traveler's diarrhea / Shigella","—","Azithromycin or a fluoroquinolone (TMP-SMX rarely used now)"]
  ];
  let h='<div style="overflow-x:auto"><table><thead><tr><th>Indication</th><th>Standard (sulfonamide)</th><th>Sulfa-allergic alternative</th></tr></thead><tbody>';
  rows.forEach(r=>h+='<tr><td><b>'+esc(r[0])+'</b></td><td class="small muted">'+esc(r[1])+'</td><td class="small">'+esc(r[2])+'</td></tr>');
  h+='</tbody></table></div>';
  const wrap=ce("div");wrap.innerHTML=h;c3.append(wrap);c.append(c3);

  c.append(ce("div","callout small","<b>Bottom line:</b> confirm the drug and the reaction. Reassure patients that <b>diuretics, sulfonylureas, celecoxib, and acetazolamide are not contraindicated</b> by an antibiotic sulfa allergy. Reserve avoidance for true antimicrobial-sulfonamide reactions; never rechallenge after SJS/TEN or DRESS, but consider desensitization (e.g., PJP prophylaxis in HIV) for non-severe reactions. Confirm dosing and the specific allergy history."));
};

/* ---------- FLUOROQUINOLONE (CLASS) ALLERGY ---------- */
PAGES.fq=(c)=>{
  c.append(ce("h2","sec","Fluoroquinolone Allergy — alternative regimens (incl. ciprofloxacin & levofloxacin)"));
  c.append(ce("p","lead","Fluoroquinolones (FQs) are a leading cause of drug-induced anaphylaxis and can react on <b>first exposure</b> (direct mast-cell MRGPRX2 activation, not only IgE). Immediate hypersensitivity tends to be <b>class-wide</b>, so a clear anaphylactic reaction to one FQ generally means <b>avoid them all</b>. Separate true allergy from the class adverse effects (tendons, QT, neuropathy, dysglycemia), which are not allergy but still limit use."));

  const c1=ce("div","card");
  c1.innerHTML='<h3>1 · Classify the reaction</h3>';
  c1.append(ce("div","callout bad small","<b>Severe — avoid ALL fluoroquinolones (and refer to allergy):</b> anaphylaxis, laryngeal edema, bronchospasm, hypotension (can occur on the first dose); OR severe delayed reactions — SJS/TEN, DRESS, AGEP, hepatitis, cytopenias."));
  c1.append(ce("div","callout warn small","<b>Mild–moderate IgE (urticaria, pruritus, isolated angioedema):</b> avoid the culprit FQ; within-class cross-reactivity is common but not universal — prefer a non-FQ alternative. If a FQ is essential, refer for graded challenge or desensitization."));
  c1.append(ce("div","callout ok small","<b>Non-allergic adverse effect (QT prolongation, tendinopathy, GI upset, photosensitivity, dysglycemia, insomnia/CNS):</b> this is <b>not</b> an allergy — but per FDA, reserve FQs for when no alternative exists in uncomplicated sinusitis, bronchitis, and cystitis."));
  c.append(c1);

  const c2=ce("div","card");
  c2.innerHTML='<h3>2 · Cross-reactivity &amp; class facts</h3>'+
   '<ul style="margin:6px 0;padding-left:18px">'+
   '<li><b>Within-class cross-reactivity for immediate hypersensitivity is high and unpredictable</b> — a true anaphylactic reaction to ciprofloxacin, levofloxacin, or moxifloxacin should prompt avoidance of the <b>entire class</b> (moxifloxacin carries relatively higher anaphylaxis rates).</li>'+
   '<li><b>No cross-reactivity with beta-lactams or sulfonamides</b> — FQs are structurally unrelated, making them a key option in beta-lactam allergy (and vice versa).</li>'+
   '<li><b>Skin testing is not standardized/validated</b> for FQs (high false-positive rates from direct mast-cell activation); diagnosis is largely clinical.</li>'+
   '<li><b>Class adverse effects (not allergy):</b> QT prolongation/torsades; tendinitis/rupture (Achilles; elderly, steroids, transplant); aortic aneurysm/dissection; peripheral neuropathy (can be irreversible); CNS effects/seizure; hypo- and hyperglycemia; C. difficile; chelation by divalent cations (separate from antacids/iron/calcium/dairy).</li>'+
   '</ul>';
  c.append(c2);

  const c2b=ce("div","card");
  c2b.innerHTML='<h3>2b · Agent-specific notes (ciprofloxacin &amp; levofloxacin)</h3>'+
   '<ul style="margin:6px 0;padding-left:18px">'+
   '<li><b>Ciprofloxacin</b> — most antipseudomonal but weak gram-positive (NOT for pneumococcal pneumonia); ~100% oral bioavailability. CYP1A2 inhibitor: <b>tizanidine contraindicated</b>, raises theophylline/warfarin effect; chelated by antacids/iron/calcium/dairy. Replace its Pseudomonas niche with cefepime/ceftazidime/pip-tazo/meropenem ± an aminoglycoside; cystitis → nitrofurantoin/fosfomycin/TMP-SMX; anthrax/plague/tularemia post-exposure prophylaxis → doxycycline.</li>'+
   '<li><b>Levofloxacin</b> — the “respiratory” fluoroquinolone (pneumococcus incl. penicillin-resistant + atypicals + some Pseudomonas); community-acquired pneumonia (CAP) monotherapy AND a common <b>beta-lactam-allergy</b> option, so losing it narrows choices. Notable QT prolongation and dysglycemia. Replace with a beta-lactam + macrolide/doxycycline for CAP, azithromycin/doxycycline for atypicals, and an antipseudomonal beta-lactam ± an aminoglycoside for Pseudomonas.</li>'+
   '</ul>';
  c.append(c2b);

  const c3=ce("div","card");
  c3.innerHTML='<h3>3 · Syndrome-specific alternatives (avoiding fluoroquinolones)</h3>';
  const rows=[
   ["Uncomplicated cystitis","cipro / levo","Nitrofurantoin, TMP-SMX, or fosfomycin"],
   ["Pyelonephritis / complicated UTI","cipro / levo","Ceftriaxone or cefepime; an aminoglycoside; ertapenem/meropenem (ESBL); aztreonam (beta-lactam allergy)"],
   ["CAP (outpatient / inpatient)","levo / moxi","Beta-lactam (amox-clav or ceftriaxone) + macrolide or doxycycline"],
   ["Pseudomonas (HAP, etc.)","cipro / levo","Cefepime, pip-tazo, ceftazidime, or meropenem ± amikacin/tobramycin"],
   ["Intra-abdominal / diverticulitis","cipro + metronidazole","Ceftriaxone + metronidazole; piperacillin-tazobactam; or ertapenem"],
   ["Traveler's diarrhea / enteric fever","cipro / levo","Azithromycin (preferred for resistant Campylobacter / typhoid)"],
   ["Bone & joint / chronic Pseudomonas","levo / cipro","Pathogen-directed IV beta-lactam (cefepime, ceftazidime) ± an aminoglycoside"],
   ["TB / atypical mycobacteria","moxi / levo (regimen part)","Substitute per regimen with infectious disease / tuberculosis guidance"]
  ];
  let h='<div style="overflow-x:auto"><table><thead><tr><th>Syndrome</th><th>Typical FQ use</th><th>Non-FQ alternative</th></tr></thead><tbody>';
  rows.forEach(r=>h+='<tr><td><b>'+esc(r[0])+'</b></td><td class="small muted">'+esc(r[1])+'</td><td class="small">'+esc(r[2])+'</td></tr>');
  h+='</tbody></table></div>';
  const wrap=ce("div");wrap.innerHTML=h;c3.append(wrap);c.append(c3);

  c.append(ce("div","callout small","<b>Bottom line:</b> separate true hypersensitivity (avoid the whole class) from the class adverse effects (a stewardship reason to avoid FQs, not an allergy). FQs do not cross-react with beta-lactams or sulfonamides, so they remain useful in those allergies — and unrelated agents replace them here. For genuine FQ anaphylaxis, choose a structurally unrelated agent by syndrome; desensitization exists when a FQ is truly required."));
};

PAGES.library=(c)=>{
  c.append(ce("h2","sec","Reference Library"));
  c.append(ce("p","lead","Every algorithm is anchored to one of these sources, <b>grouped by disease</b>. PDFs open from the bundled <b>references/</b> folder kept beside this app."));
  const cap1=s=>s?s.charAt(0).toUpperCase()+s.slice(1):s;
  const groups={};
  Object.values(LIBRARY).forEach(L=>{const g=LIBGROUP[L.topic]||cap1(L.topic);(groups[g]=groups[g]||[]).push(L);});
  const names=Object.keys(groups).sort((a,b)=>a.localeCompare(b,"en",{sensitivity:"base"}));
  const card=ce("div","card");
  let h='<table><thead><tr><th style="min-width:46%">Reference</th><th>Citation</th></tr></thead><tbody>';
  names.forEach(g=>{
    const items=groups[g];
    h+='<tr class="lib-grp"><td colspan="2">'+esc(g)+(items.length>1?' <span class="muted small" style="font-weight:600">('+items.length+' references)</span>':'')+'</td></tr>';
    items.forEach(L=>{
      const cell=L.big?(esc(L.t)+' <span class="flag">(large file — kept in your original source folder)</span>'):'<a href="references/'+encodeURIComponent(L.file)+'" target="_blank">'+esc(L.t)+'</a>';
      h+='<tr><td>'+cell+'</td><td class="small muted">'+esc(L.src)+'</td></tr>';
    });
  });
  h+='</tbody></table>';card.innerHTML=h;c.append(card);
  c.append(ce("div","callout small","Source PDFs open from the <b>references/</b> folder kept beside this app. Keep that folder with the HTML file when you move it."));
};

/* ---------- SCORES & CALCULATORS ---------- */
PAGES.scores=(c)=>{
  c.append(ce("h2","sec","Scores & Calculators"));
  c.append(ce("p","lead","Bedside risk tools used on the infectious disease (ID) / medicine service, grouped by clinical problem. Educational support — verify inputs and apply clinical judgment."));

  /* shared helpers */
  const mkCat=(t)=>{const h=ce("h2","sec",t);h.style.cssText="font-size:16px;margin:24px 0 6px;color:var(--brand2);border-top:2px solid var(--line);padding-top:14px";c.append(h);};
  const chip=(box,label,key,state,upd)=>{const b=ce("span","chip");b.textContent=label;b.onclick=()=>{state[key]=!state[key];b.classList.toggle("on");upd();};box.append(b);};
  const chipsRow=(card,items,state,upd)=>{const box=ce("div","chips");items.forEach(it=>chip(box,it[0],it[1],state,upd));card.append(box);return box;};
  const selField=(card,label,opts)=>{const w=ce("div");w.style.margin="8px 0";const l=ce("label","fld");l.textContent=label;w.append(l);const s=ce("select");s.innerHTML=opts.map((o,i)=>'<option value="'+o[1]+'"'+(i===0?' selected':'')+'>'+esc(o[0])+'</option>').join("");w.append(s);card.append(w);return s;};
  const numField=(card,label,ph)=>{const w=ce("div");w.style.cssText="margin:8px 8px 8px 0;display:inline-block;min-width:150px";const l=ce("label","fld");l.textContent=label;w.append(l);const i=ce("input");i.type="number";i.style.maxWidth="150px";if(ph)i.placeholder=ph;w.append(i);card.append(w);return i;};
  const out=(r,score,unit,txt,cls)=>{r.innerHTML='<span class="scorebox">'+score+'</span>'+(unit?' <span class="muted">'+unit+'</span>':'')+'<div class="callout '+(cls||'')+' small">'+txt+'</div>';};
  const newCard=(title,sub)=>{const card=ce("div","card");card.innerHTML='<h3>'+title+'</h3>'+(sub?'<p class="small muted" style="margin-top:0">'+sub+'</p>':'');const r=ce("div");r.style.marginTop="10px";return {card,r};};

  /* ===== 1. Sepsis, Bacteremia & Critical Infection ===== */
  mkCat("1 · Sepsis, Bacteremia & Critical Infection");

  (function(){const {card,r}=newCard("SOFA — Sequential Organ Failure Assessment","intensive care unit (ICU) organ-dysfunction score. A rise of ≥2 points from baseline defines sepsis (Sepsis-3).");
    const fields=[
     ["Respiration (PaO₂/FiO₂, mmHg)",[["≥400 (0)",0],["&lt;400 (1)",1],["&lt;300 (2)",2],["&lt;200 + resp support (3)",3],["&lt;100 + resp support (4)",4]]],
     ["Coagulation (platelets ×10³/µL)",[["≥150 (0)",0],["&lt;150 (1)",1],["&lt;100 (2)",2],["&lt;50 (3)",3],["&lt;20 (4)",4]]],
     ["Liver (bilirubin, mg/dL)",[["&lt;1.2 (0)",0],["1.2–1.9 (1)",1],["2.0–5.9 (2)",2],["6.0–11.9 (3)",3],["≥12 (4)",4]]],
     ["Cardiovascular",[["mean arterial pressure (MAP) ≥70 (0)",0],["mean arterial pressure &lt;70 (1)",1],["Dopamine ≤5 or dobutamine (2)",2],["Dopa &gt;5 / epi ≤0.1 / norepi ≤0.1 (3)",3],["Dopa &gt;15 / epi &gt;0.1 / norepi &gt;0.1 (4)",4]]],
     ["central nervous system (CNS) (Glasgow Coma Scale)",[["15 (0)",0],["13–14 (1)",1],["10–12 (2)",2],["6–9 (3)",3],["&lt;6 (4)",4]]],
     ["Renal (creatinine, mg/dL)",[["&lt;1.2 (0)",0],["1.2–1.9 (1)",1],["2.0–3.4 (2)",2],["3.5–4.9 (3)",3],["≥5.0 (4)",4]]]
    ];
    const sels=fields.map(f=>selField(card,f[0],f[1]));card.append(r);sels.forEach(s=>s.onchange=upd);
    function upd(){const s=sels.reduce((a,x)=>a+(+x.value),0);const cls=s>=12?"bad":(s>=6?"warn":"ok");
      out(r,s,"/24","Higher scores track higher intensive care unit mortality — follow the trend and the rise from baseline (≥2 = sepsis).",cls);}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("qSOFA — quick SOFA","Rapid bedside screen outside the intensive care unit.");const state={};
    chipsRow(card,[["Respiratory rate ≥22/min","rr"],["Altered mentation (Glasgow Coma Scale (GCS) &lt;15)","ams"],["Systolic blood pressure (BP) ≤100 mmHg","sbp"]],state,upd);card.append(r);
    function upd(){const s=["rr","ams","sbp"].reduce((a,k)=>a+(state[k]?1:0),0);
      out(r,s,"/3",s>=2?"≥2: higher risk of death / prolonged intensive care unit stay — evaluate for sepsis and escalate.":"Under 2: lower risk by qSOFA, but it does not rule out sepsis.",s>=2?"warn":"");}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("SIRS — Systemic Inflammatory Response Syndrome","Sensitive but nonspecific; ≥2 criteria = SIRS.");const state={};
    chipsRow(card,[["Temp >38°C or <36°C","temp"],["Heart rate >90/min","hr"],["respiratory rate (RR) >20/min or PaCO₂ <32 mmHg","rr"],["white blood cell count (WBC) >12k, <4k, or >10% bands","wbc"]],state,upd);card.append(r);
    function upd(){const s=["temp","hr","rr","wbc"].reduce((a,k)=>a+(state[k]?1:0),0);
      out(r,s,"/4",s>=2?"≥2: SIRS present. With suspected infection, assess for sepsis (Sepsis-3 favors SOFA/qSOFA).":"Under 2: does not meet SIRS.",s>=2?"warn":"");}
    upd();c.append(card);})();

  /* ===== 2. Pneumonia Severity & Disposition ===== */
  mkCat("2 · Pneumonia Severity & Disposition");

  (function(){const {card,r}=newCard("CURB-65 — community-acquired pneumonia (CAP) severity");const state={};
    chipsRow(card,[["Confusion (new)","conf"],["Urea / blood urea nitrogen (BUN) >19 mg/dL (7 mmol/L)","urea"],["Respiratory rate ≥30","rr"],["systolic blood pressure (SBP) <90 or diastolic blood pressure (DBP) ≤60 mmHg","bp"],["Age ≥65","age"]],state,upd);card.append(r);
    function upd(){const s=["conf","urea","rr","bp","age"].reduce((a,k)=>a+(state[k]?1:0),0);
      let txt,cls;if(s<=1){txt="Low risk — consider outpatient treatment.";cls="ok";}else if(s===2){txt="Moderate — short admission / observation.";cls="warn";}else{txt="Severe — inpatient; assess for intensive care unit (≥3, especially 4–5).";cls="bad";}
      out(r,s,"/5",txt,cls);}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("PSI / PORT — Pneumonia Severity Index","Best for finding low-risk community-acquired pneumonia safe for outpatient care. Enter age & sex, then check all that apply. Class I = age ≤50 with no comorbidity / abnormal vitals.");
    const age=numField(card,"Age (years)","68");const sex=selField(card,"Sex",[["Male",0],["Female",1]]);
    const state={},pts={};
    const groups=[["Demographics & comorbidities",[["Nursing-home resident (+10)","nh",10],["Neoplastic disease (+30)","neo",30],["Liver disease (+20)","liver",20],["Heart failure (+10)","chf",10],["Cerebrovascular disease (+10)","cva",10],["Renal disease (+10)","renal",10]]],
     ["Exam",[["Altered mental status (+20)","ams",20],["Respiratory rate ≥30 (+20)","rr",20],["systolic blood pressure <90 mmHg (+20)","sbp",20],["Temp <35 or ≥40°C (+15)","temp",15],["Pulse ≥125 (+10)","hr",10]]],
     ["Labs / imaging",[["Arterial pH <7.35 (+30)","ph",30],["blood urea nitrogen ≥30 mg/dL (+20)","bun",20],["Sodium <130 (+20)","na",20],["Glucose ≥250 mg/dL (+10)","glu",10],["Hematocrit <30% (+10)","hct",10],["PaO₂ <60 / SpO₂ <90% (+10)","o2",10],["Pleural effusion (+10)","eff",10]]]];
    groups.forEach(g=>{const w=ce("div");const h=ce("div","small muted");h.style.cssText="font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:8px 0 4px";h.textContent=g[0];w.append(h);const box=ce("div","chips");g[1].forEach(it=>{pts[it[1]]=it[2];chip(box,it[0],it[1],state,upd);});w.append(box);card.append(w);});
    card.append(r);age.oninput=upd;sex.onchange=upd;
    function upd(){const a=parseInt(age.value)||0;if(a<=0){out(r,"—","","Enter age to compute.","");return;}
      let s=a-(parseInt(sex.value)?10:0);Object.keys(pts).forEach(k=>{if(state[k])s+=pts[k];});
      const anyPred=Object.keys(state).some(k=>state[k]);
      let cl,mort,disp,cls;
      if(a<=50&&!anyPred){cl="I";mort="~0.1%";disp="Outpatient";cls="ok";}
      else if(s<=70){cl="II";mort="~0.6%";disp="Outpatient";cls="ok";}
      else if(s<=90){cl="III";mort="~0.9–2.8%";disp="Outpatient or brief observation";cls="warn";}
      else if(s<=130){cl="IV";mort="~8–9%";disp="Inpatient";cls="warn";}
      else{cl="V";mort="~27–31%";disp="Inpatient — consider intensive care unit";cls="bad";}
      out(r,s,"pts → Class "+cl,"Class "+cl+" · 30-day mortality "+mort+" · "+disp+".",cls);}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("SMART-COP — predicts need for intensive respiratory/vasopressor support (intensive respiratory or vasopressor support (IRVS))","Points shown in each label; oxygen & respiratory rate thresholds depend on age.");const state={};
    chipsRow(card,[["S — systolic blood pressure <90 mmHg (2)","sbp"],["M — Multilobar infiltrates (1)","multi"],["A — Albumin <3.5 g/dL (1)","alb"],["R — respiratory rate ≥25 (age ≤50) or ≥30 (>50) (1)","rr"],["T — Tachycardia ≥125/min (1)","hr"],["C — Confusion, new (1)","conf"],["O — SpO₂ ≤93%/PaO₂ <70 (≤50y) or ≤90%/<60 (>50y) (2)","o2"],["P — Arterial pH <7.35 (2)","ph"]],state,upd);card.append(r);
    const w={sbp:2,multi:1,alb:1,rr:1,hr:1,conf:1,o2:2,ph:2};
    function upd(){const s=Object.keys(w).reduce((a,k)=>a+(state[k]?w[k]:0),0);
      let txt,cls;if(s<=2){txt="0–2: low risk of needing intensive respiratory or vasopressor support.";cls="ok";}else if(s<=4){txt="3–4: moderate — ~1 in 8 need intensive respiratory or vasopressor support.";cls="warn";}else if(s<=6){txt="5–6: high — ~1 in 3 need intensive respiratory or vasopressor support.";cls="bad";}else{txt="≥7: very high — ~2 in 3 need intensive respiratory or vasopressor support.";cls="bad";}
      out(r,s,"pts",txt,cls);}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("Infectious Diseases Society of America (IDSA) / American Thoracic Society (ATS) Severe community-acquired pneumonia criteria","Severe community-acquired pneumonia (→ intensive care unit) = ≥1 major OR ≥3 minor criteria.");const state={};
    const mk=(label,items)=>{const w=ce("div");const h=ce("div","small muted");h.style.cssText="font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:8px 0 4px";h.textContent=label;w.append(h);const box=ce("div","chips");items.forEach(it=>chip(box,it[0],it[1],state,upd));w.append(box);card.append(w);};
    mk("Major (any 1)",[["Mechanical ventilation","maj1"],["Septic shock requiring vasopressors","maj2"]]);
    mk("Minor (need ≥3)",[["respiratory rate ≥30/min","r1"],["PaO₂/FiO₂ ≤250","r2"],["Multilobar infiltrates","r3"],["Confusion / disorientation","r4"],["Uremia (blood urea nitrogen ≥20 mg/dL)","r5"],["Leukopenia (white blood cell count <4k)","r6"],["Thrombocytopenia (plt <100k)","r7"],["Hypothermia (<36°C)","r8"],["Hypotension needing aggressive fluids","r9"]]);
    card.append(r);
    function upd(){const maj=(state.maj1?1:0)+(state.maj2?1:0);const minor=["r1","r2","r3","r4","r5","r6","r7","r8","r9"].reduce((a,k)=>a+(state[k]?1:0),0);
      const severe=maj>=1||minor>=3;
      r.innerHTML='<span class="tag b">Major: '+maj+'</span> <span class="tag b">Minor: '+minor+'</span><div class="callout '+(severe?"bad":"ok")+' small">'+(severe?"<b>Severe community-acquired pneumonia</b> — admit to intensive care unit.":"Does not meet severe-community-acquired pneumonia criteria.")+'</div>';}
    upd();c.append(card);})();

  /* ===== 3. Endocarditis, central nervous system & Bone/Joint ===== */
  mkCat("3 · Endocarditis, central nervous system & Bone/Joint Infections");

  (function(){const {card,r}=newCard("Modified Duke Criteria — infective endocarditis");
    const majors=[["Typical infective endocarditis (IE) organism in 2 separate cultures (or persistently positive)","m1"],["Endocardial involvement: echocardiography (echo) vegetation/abscess/new dehiscence, or new regurgitation","m2"]];
    const minors=[["Predisposition (heart condition or injection drug use (IVDU))","n1"],["Fever ≥38°C","n2"],["Vascular phenomena (emboli, septic infarct, Janeway, mycotic aneurysm)","n3"],["Immunologic phenomena (glomerulonephritis (GN), Osler nodes, Roth spots, RF)","n4"],["Microbiologic evidence not meeting a major criterion","n5"]];
    const state={};
    const mk=(arr,label)=>{const w=ce("div");const h=ce("div","small muted");h.style.cssText="font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:8px 0 4px";h.textContent=label;w.append(h);const box=ce("div","chips");arr.forEach(it=>chip(box,it[0],it[1],state,upd));w.append(box);return w;};
    card.append(mk(majors,"Major criteria"));card.append(mk(minors,"Minor criteria"));card.append(r);
    function upd(){const M=majors.reduce((a,it)=>a+(state[it[1]]?1:0),0);const m=minors.reduce((a,it)=>a+(state[it[1]]?1:0),0);
      let cl,cls;if(M>=2||(M===1&&m>=3)||m>=5){cl="DEFINITE clinical infective endocarditis";cls="bad";}else if(M>=1||m>=3){cl="POSSIBLE infective endocarditis";cls="warn";}else{cl="Insufficient — not possible/definite";cls="";}
      r.innerHTML='<span class="tag b">Major: '+M+'</span> <span class="tag b">Minor: '+m+'</span><div class="callout '+cls+' small"><b>'+cl+'</b>. (Definite = 2 major, or 1 major + 3 minor, or 5 minor.)</div>';}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("Bacterial Meningitis Score (Nigrovic) — pediatric","For children >29 days with cerebrospinal fluid (CSF) pleocytosis. A score of 0 = very low risk of bacterial (vs aseptic) meningitis.");const state={};
    chipsRow(card,[["cerebrospinal fluid Gram stain positive (2)","gram"],["cerebrospinal fluid absolute neutrophil count (ANC) ≥1000 cells/µL (1)","csfanc"],["cerebrospinal fluid protein ≥80 mg/dL (1)","prot"],["Peripheral blood absolute neutrophil count ≥10,000 (1)","panc"],["Seizure at/before presentation (1)","sz"]],state,upd);card.append(r);
    const w={gram:2,csfanc:1,prot:1,panc:1,sz:1};
    function upd(){const s=Object.keys(w).reduce((a,k)=>a+(state[k]?w[k]:0),0);
      out(r,s,"pts",s===0?"0: very low risk of bacterial meningitis (NPV ~99.9% in validation) — supports observation off antibiotics in selected children.":"≥1: not low-risk — manage as possible bacterial meningitis.",s===0?"ok":"warn");}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("Kocher Criteria — pediatric septic hip vs transient synovitis");const state={};
    chipsRow(card,[["Non–weight-bearing","wb"],["erythrocyte sedimentation rate (ESR) ≥40 mm/h","esr"],["Fever >38.5°C","fev"],["white blood cell count >12,000/µL","wbc"]],state,upd);card.append(r);
    const prob=["0.2%","3%","40%","93%","99%"];
    function upd(){const s=["wb","esr","fev","wbc"].reduce((a,k)=>a+(state[k]?1:0),0);
      out(r,s,"/4 → "+prob[s],"Predicted probability of septic arthritis ≈ "+prob[s]+". ≥3 predictors → strongly consider arthrocentesis / ortho.",s>=3?"bad":(s===2?"warn":"ok"));}
    upd();c.append(card);})();

  /* ===== 4. Skin / Soft-tissue & Intra-abdominal ===== */
  mkCat("4 · Skin, Soft-Tissue & Intra-abdominal Infections");

  (function(){const {card,r}=newCard("LRINEC — Laboratory Risk Indicator for Necrotizing Fasciitis","A low score does NOT exclude necrotizing fasciitis — it is a surgical diagnosis.");
    const fs=[["C-reactive protein (CRP) (mg/L)",[["&lt;150 (0)",0],["≥150 (+4)",4]]],["white blood cell count (×10³/µL)",[["&lt;15 (0)",0],["15–25 (+1)",1],["&gt;25 (+2)",2]]],["Hemoglobin (g/dL)",[["&gt;13.5 (0)",0],["11–13.5 (+1)",1],["&lt;11 (+2)",2]]],["Sodium (mmol/L)",[["≥135 (0)",0],["&lt;135 (+2)",2]]],["Creatinine (mg/dL)",[["≤1.6 (0)",0],["&gt;1.6 (+2)",2]]],["Glucose (mg/dL)",[["≤180 (0)",0],["&gt;180 (+1)",1]]]];
    const sels=fs.map(f=>selField(card,f[0],f[1]));card.append(r);sels.forEach(s=>s.onchange=upd);
    function upd(){const s=sels.reduce((a,x)=>a+(+x.value),0);
      let txt,cls;if(s<6){txt="0–5: lower risk — but does NOT rule out necrotizing fasciitis (NF); if suspected clinically, explore surgically.";cls="";}else if(s<8){txt="6–7: intermediate risk — heightened suspicion, urgent surgical evaluation.";cls="warn";}else{txt="≥8: high risk for necrotizing fasciitis.";cls="bad";}
      out(r,s,"/13",txt,cls);}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("Alvarado Score — acute appendicitis (MANTRELS)");const state={};
    chipsRow(card,[["Migration of pain to RLQ (1)","m"],["Anorexia (1)","a"],["Nausea / vomiting (1)","n"],["Tenderness in RLQ (2)","t"],["Rebound tenderness (1)","r"],["Elevated temp ≥37.3°C (1)","e"],["Leukocytosis >10,000 (2)","l"],["Left shift (neutrophils >75%) (1)","s"]],state,upd);card.append(r);
    const w={m:1,a:1,n:1,t:2,r:1,e:1,l:2,s:1};
    function upd(){const s=Object.keys(w).reduce((a,k)=>a+(state[k]?w[k]:0),0);
      let txt,cls;if(s<=4){txt="1–4: appendicitis unlikely — consider observation / alternative dx.";cls="ok";}else if(s<=6){txt="5–6: compatible — imaging (computed tomography/ultrasound) recommended.";cls="warn";}else if(s<=8){txt="7–8: probable appendicitis — surgical consultation.";cls="bad";}else{txt="9–10: very probable appendicitis.";cls="bad";}
      out(r,s,"/10",txt+" Imaging is often still indicated, especially in women and children.",cls);}
    upd();c.append(card);})();

  /* ===== 5. Upper Respiratory & ear, nose, and throat (ENT) ===== */
  mkCat("5 · Upper Respiratory & ear, nose, and throat Infections");

  (function(){const {card,r}=newCard("Centor (McIsaac) — Group A strep pharyngitis");const state={};
    chipsRow(card,[["Tonsillar exudate / swelling","ex"],["Tender anterior cervical nodes","ln"],["Fever >38°C (history)","fev"],["Absence of cough","cough"]],state,upd);
    const age=selField(card,"Age",[["15–44 y (0)",0],["3–14 y (+1)",1],["≥45 y (−1)",-1]]);age.onchange=upd;card.append(r);
    function upd(){const s=["ex","ln","fev","cough"].reduce((a,k)=>a+(state[k]?1:0),0)+(+age.value);
      let txt;if(s<=0)txt="≤0: no testing or antibiotics — viral likely.";else if(s===1)txt="1: no testing/antibiotics in most.";else if(s<=3)txt="2–3: rapid strep test (rapid antigen detection test (RADT)); treat if positive.";else txt="≥4: high probability — rapid antigen detection test; some treat empirically.";
      out(r,s,"",txt,s>=4?"warn":"");}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("FeverPAIN — acute sore throat (antibiotic stewardship)");const state={};
    chipsRow(card,[["Fever in last 24h (1)","f"],["Purulent tonsils (1)","p"],["Attend rapidly — within 3 days of onset (1)","a"],["severely Inflamed tonsils (1)","i"],["No cough or coryza (1)","n"]],state,upd);card.append(r);
    function upd(){const s=["f","p","a","i","n"].reduce((a,k)=>a+(state[k]?1:0),0);
      let txt,cls;if(s<=1){txt="0–1: ~13–18% strep — antibiotics not recommended.";cls="ok";}else if(s<=3){txt="2–3: ~34–40% strep — consider a delayed/backup antibiotic.";cls="warn";}else{txt="4–5: ~62–65% strep — consider an antibiotic.";cls="bad";}
      out(r,s,"/5",txt,cls);}
    upd();c.append(card);})();

  /* ===== 6. Opportunistic & Viral ===== */
  mkCat("6 · Opportunistic & Viral Infections");

  (function(){const {card,r}=newCard("4C Mortality Score — COVID-19 in-hospital mortality (ISARIC)");
    const ageS=selField(card,"Age",[["<50 (0)",0],["50–59 (2)",2],["60–69 (4)",4],["70–79 (6)",6],["≥80 (7)",7]]);
    const com=selField(card,"Number of comorbidities",[["0 (0)",0],["1 (+1)",1],["≥2 (+2)",2]]);
    const rr=selField(card,"Respiratory rate",[["<20 (0)",0],["20–29 (+1)",1],["≥30 (+2)",2]]);
    const urea=selField(card,"Urea / blood urea nitrogen",[["Urea <7 mmol/L (blood urea nitrogen <20) (0)",0],["7–14 mmol/L (blood urea nitrogen 20–39) (+1)",1],["Urea >14 mmol/L (blood urea nitrogen >39) (+3)",3]]);
    const crp=selField(card,"C-reactive protein (mg/L)",[["<50 (0)",0],["50–99 (+1)",1],["≥100 (+2)",2]]);
    const state={};chipsRow(card,[["Male (+1)","male"],["SpO₂ <92% on room air (+2)","spo2"],["Glasgow Coma Scale <15 (+2)","gcs"]],state,upd);card.append(r);
    [ageS,com,rr,urea,crp].forEach(s=>s.onchange=upd);
    function upd(){let s=(+ageS.value)+(+com.value)+(+rr.value)+(+urea.value)+(+crp.value)+(state.male?1:0)+(state.spo2?2:0)+(state.gcs?2:0);
      let txt,cls;if(s<=3){txt="Low (0–3): ~1.2% mortality.";cls="ok";}else if(s<=8){txt="Intermediate (4–8): ~9.9% mortality.";cls="warn";}else if(s<=14){txt="High (9–14): ~31% mortality.";cls="bad";}else{txt="Very high (≥15): ~62% mortality.";cls="bad";}
      out(r,s,"/21",txt,cls);}
    upd();c.append(card);})();

  (function(){const card=ce("div","card");card.innerHTML='<h3>COVID-GRAM — critical-illness risk (reference)</h3>'+
    '<p class="small">Predicts development of <b>critical illness</b> (intensive care unit admission, mechanical ventilation, or death) in hospitalized COVID-19 patients (Liang et al., JAMA Intern Med 2020; area under the curve (AUC) ≈ 0.88). It is a <b>logistic nomogram</b>, so the exact probability comes from the published model rather than simple point-addition.</p>'+
    '<div class="small muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:6px 0 3px">Ten admission predictors</div>'+
    '<ul style="margin:4px 0;padding-left:18px" class="small"><li>Chest-radiograph abnormality</li><li>Age</li><li>Hemoptysis</li><li>Dyspnea</li><li>Unconsciousness</li><li>Number of comorbidities</li><li>Cancer history</li><li>Neutrophil-to-lymphocyte ratio</li><li>Lactate dehydrogenase (lactate dehydrogenase (LDH))</li><li>Direct bilirubin</li></ul>'+
    '<div class="callout small">Risk tiers: <b>low</b> (&lt;1.7%), <b>medium</b> (1.7–40.4%), <b>high</b> (&gt;40.4%) probability of critical illness. Compute the exact percentage with the published nomogram / online calculator (e.g., MDCalc “COVID-GRAM”).</div>';
    c.append(card);})();

  (function(){const {card,r}=newCard("MASCC — febrile neutropenia risk");
    const items=[["Burden: no/mild symptoms (+5)",5,"b5"],["Burden: moderate symptoms (+3)",3,"b3"],["No hypotension (systolic blood pressure >90) (+5)",5,"hypo"],["No chronic obstructive pulmonary disease (COPD) (+4)",4,"copd"],["Solid tumor / no prior fungal infection (+4)",4,"tumor"],["No dehydration needing intravenous (IV) fluids (+3)",3,"dehy"],["Outpatient at fever onset (+3)",3,"outpt"],["Age <60 (+2)",2,"age"]];
    const box=ce("div","chips");const state={};items.forEach(it=>{const b=ce("span","chip");b.textContent=it[0];b.onclick=()=>{state[it[2]]=!state[it[2]];b.classList.toggle("on");upd();};box.append(b);});card.append(box);card.append(r);
    function upd(){let s=items.reduce((a,it)=>a+(state[it[2]]?it[1]:0),0);if(s>26)s=26;
      out(r,s,"(max 26)",s>=21?"≥21: LOW risk — selected patients may be eligible for oral / outpatient therapy with close follow-up.":"Under 21: HIGH risk — admit for intravenous antipseudomonal therapy.",s>=21?"ok":"warn");}
    upd();c.append(card);})();

  /* ===== 7. Pharmacokinetics & Dosing ===== */
  mkCat("7 · Pharmacokinetics & Antimicrobial Dosing");

  (function(){const {card,r}=newCard("Cockcroft-Gault — creatinine clearance","Estimates creatinine clearance (CrCl) to renally dose antimicrobials. Use ideal or adjusted body weight in obesity; unreliable in unstable renal function.");
    const ageI=numField(card,"Age (years)","68");const wt=numField(card,"Weight (kg)","80");const scr=numField(card,"Creatinine (mg/dL)","1.0");const sex=selField(card,"Sex",[["Male",1],["Female",0.85]]);
    card.append(r);[ageI,wt,scr].forEach(i=>i.oninput=upd);sex.onchange=upd;
    function upd(){const a=parseFloat(ageI.value),w=parseFloat(wt.value),s=parseFloat(scr.value),f=parseFloat(sex.value);
      if(!a||!w||!s||a<=0||w<=0||s<=0){out(r,"—","mL/min","Enter age, weight, and creatinine.","");return;}
      const crcl=((140-a)*w*f)/(72*s);
      out(r,crcl.toFixed(0),"mL/min",crcl<30?"Markedly reduced — many agents need renal dose adjustment or avoidance (e.g., nitrofurantoin if <30).":(crcl<60?"Reduced — adjust renally-cleared agents.":"Use to adjust dosing/intervals; verify against the package insert."),crcl<30?"bad":(crcl<60?"warn":"ok"));}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("Vancomycin area under the curve₂₄ — population estimate","Quick estimate only. Prefer Bayesian software or a two-level PK calculation. Target area under the curve₂₄/minimum inhibitory concentration (MIC) ≈ 400–600 (minimum inhibitory concentration 1) for serious methicillin-resistant Staphylococcus aureus (MRSA) infection — see the Vancomycin area under the curve module.");
    const dose=numField(card,"Total daily dose (mg)","3000");const crcl=numField(card,"creatinine clearance (mL/min)","90");
    card.append(r);[dose,crcl].forEach(i=>i.oninput=upd);
    function upd(){const d=parseFloat(dose.value),cr=parseFloat(crcl.value);
      if(!d||!cr||d<=0||cr<=0){out(r,"—","mg·h/L","Enter total daily dose and creatinine clearance.","");return;}
      const cl=0.045*cr; const auc=d/cl; // cutaneous leishmaniasis (CL)(L/h) ≈ 0.75×creatinine clearance(mL/min); AUC24 = daily dose / cutaneous leishmaniasis
      let txt,cls;if(auc<400){txt="Below target (400–600) — likely underdosed; increase dose or shorten interval, then re-estimate.";cls="warn";}else if(auc<=600){txt="In target range (400–600).";cls="ok";}else{txt="Above 600 — higher nephrotoxicity risk; reduce dose. Watch concurrent piperacillin-tazobactam.";cls="bad";}
      out(r,auc.toFixed(0),"mg·h/L (est.)",txt+" Population estimate (vancomycin cutaneous leishmaniasis ≈ 0.75 × creatinine clearance) — confirm with levels / Bayesian dosing.",cls);}
    upd();c.append(card);})();

  (function(){const {card,r}=newCard("Colistin (colistimethate) — intravenous dosing by creatinine clearance","Doses are colistin BASE activity (per 2019 polymyxin consensus / Nebraska Medicine). intravenous colistin is favored for urinary sources; polymyxin B is preferred for most systemic infections. Nephro-/neurotoxic.");
    const crcl=numField(card,"creatinine clearance (mL/min)","60");card.append(r);crcl.oninput=upd;
    function maint(cr){if(cr>=90)return"180 mg every 12 hours (q12h) (360 mg/day)";if(cr>=80)return"170 mg every 12 hours (340 mg/day)";if(cr>=70)return"150 mg every 12 hours (300 mg/day)";if(cr>=60)return"275 mg/day";if(cr>=50)return"245 mg/day";if(cr>=40)return"220 mg/day";if(cr>=30)return"195 mg/day";if(cr>=20)return"175 mg/day";if(cr>=10)return"160 mg/day";if(cr>=5)return"145 mg/day";return"130 mg/day";}
    function upd(){const cr=parseFloat(crcl.value);
      if(isNaN(cr)||cr<0){r.innerHTML='<div class="callout small">Enter creatinine clearance to compute maintenance dosing.</div>';return;}
      const start=cr<=40?"24 h after the loading dose":"12 h after the loading dose";
      r.innerHTML='<div class="rx"><div class="drug">Loading dose: 300 mg colistin base intravenous ×1</div><div class="small muted">Begin maintenance '+start+'.</div></div>'+
        '<div class="rx"><div class="drug">Maintenance: '+maint(cr)+'</div><div class="small muted">For creatinine clearance '+(cr>=90?"≥90":cr.toFixed(0))+' mL/min.</div></div>'+
        '<div class="callout small">Conversions: 1 mg colistin base = 2.67 mg colistimethate ≈ 33,000 IU. renal replacement therapy (RRT): hemodialysis (HD) ≈130 mg/day + 50 mg after dialysis on hemodialysis days; continuous renal replacement therapy (CRRT) ≈220 mg every 12 hours. Confirm against your institutional protocol.</div>';}
    upd();c.append(card);})();

  c.append(ce("div","callout small","Sources: Sepsis-3 (SOFA/qSOFA), 1992 American College of Chest Physicians (ACCP)/Society of Critical Care Medicine (SCCM) (SIRS); CURB-65, PSI (Fine), SMART-COP, 2007/2019 Infectious Diseases Society of America-American Thoracic Society severe community-acquired pneumonia; Modified Duke (American Heart Association (AHA)); Bacterial Meningitis Score (Nigrovic); Kocher; LRINEC (Wong); Alvarado; Centor/McIsaac, FeverPAIN; 4C Mortality (ISARIC, Knight 2020), COVID-GRAM (Liang 2020), MASCC (European Society for Medical Oncology (ESMO)); Cockcroft-Gault; vancomycin area under the curve consensus (Rybak 2020); colistin (2019 polymyxin consensus). Verify all dosing and apply clinical judgment."));
};

/* ---------- GLOBAL SEARCH ---------- */
(function(){
  const inp=$("#globalSearch");
  const dd=ce("div");dd.style.cssText="position:absolute;top:40px;right:0;width:360px;max-height:60vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);z-index:50;display:none";
  document.querySelector(".search").append(dd);
  const index=[];
  SYN.forEach(s=>index.push({t:s.name,sub:"Syndrome · "+s.cat,go:()=>{SYNSEL=s.id;go("syndromes");}}));
  DRUGS.forEach(d=>index.push({t:d.n,sub:"Drug · "+d.cls,go:()=>go("drugs")}));
  [...ABG.systemic.gramneg,...ABG.systemic.grampos,...ABG.urine.gramneg].forEach(o=>{if(!index.some(i=>i.t===o.o))index.push({t:o.o,sub:"Organism · antibiogram",go:()=>go("abg")});});
  [["SOFA","Score"],["qSOFA","Score"],["SIRS","Score"],["CURB-65","Score"],["PSI / PORT","Score"],["SMART-COP","Score"],["IDSA/ATS Severe CAP","Score"],["Modified Duke","Score"],["Bacterial Meningitis Score","Score"],["Kocher Criteria","Score"],["LRINEC","Score"],["Alvarado","Score"],["Centor","Score"],["FeverPAIN","Score"],["4C Mortality","Score"],["COVID-GRAM","Score"],["MASCC","Score"],["Cockcroft-Gault","Calculator"],["Vancomycin AUC","Calculator"],["Colistin dosing","Calculator"]].forEach(x=>index.push({t:x[0],sub:x[1],go:()=>go("scores")}));
  index.push({t:"Penicillin Allergy",sub:"Beta-lactam allergy · alternatives",go:()=>go("pcn")});
  index.push({t:"Cephalosporin Allergy",sub:"Beta-lactam allergy · side chains",go:()=>go("ceph")});
  function render(q){q=q.toLowerCase().trim();if(!q){dd.style.display="none";return;}
    const m=index.filter(i=>i.t.toLowerCase().includes(q)||i.sub.toLowerCase().includes(q)).slice(0,12);
    if(!m.length){dd.style.display="none";return;}
    dd.innerHTML="";m.forEach(i=>{const row=ce("div");row.style.cssText="padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line)";row.innerHTML='<div style="font-weight:600;font-size:13.5px">'+esc(i.t)+'</div><div class="small muted">'+esc(i.sub)+'</div>';row.onmouseenter=()=>row.style.background="var(--soft)";row.onmouseleave=()=>row.style.background="";row.onclick=()=>{i.go();dd.style.display="none";inp.value="";};dd.append(row);});
    dd.style.display="block";}
  inp.oninput=()=>render(inp.value);
  inp.onblur=()=>setTimeout(()=>dd.style.display="none",180);
  document.addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement!==inp){e.preventDefault();inp.focus();}});
})();

/* ---------- INIT ---------- */
go("dx");
</script>
</body>
