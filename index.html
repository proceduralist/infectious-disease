<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Rotation Companion — Saint Vincent Hospital</title>
<style>
:root{
  --bg:#0f172a; --panel:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --brand:#0d6e6e; --brand2:#0b5563; --accent:#1d4ed8; --soft:#f1f5f9; --softer:#f8fafc;
  --good:#15803d; --goodbg:#dcfce7; --ok:#a16207; --okbg:#fef9c3; --warn:#c2410c; --warnbg:#ffedd5;
  --bad:#b91c1c; --badbg:#fee2e2; --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--softer);line-height:1.5;font-size:15px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.app{display:flex;min-height:100vh}
/* Sidebar */
.side{width:248px;flex:0 0 248px;background:linear-gradient(180deg,#0d6e6e,#0b5563);color:#e6fffb;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 18px 12px;border-bottom:1px solid rgba(255,255,255,.14)}
.brand h1{font-size:16px;margin:0;letter-spacing:.2px;font-weight:700}
.brand .sub{font-size:11.5px;opacity:.85;margin-top:3px}
.nav{padding:10px 8px;flex:1}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:0;color:#d7fbf6;padding:10px 12px;border-radius:9px;font-size:14px;cursor:pointer;font-weight:500;margin:2px 0}
.nav button:hover{background:rgba(255,255,255,.10)}
.nav button.active{background:#ffffff;color:var(--brand2);font-weight:700;box-shadow:var(--shadow)}
.nav .ic{font-size:16px;width:20px;text-align:center}
.side .foot{padding:12px 16px;font-size:10.5px;opacity:.8;border-top:1px solid rgba(255,255,255,.14)}
/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:10px 22px;display:flex;align-items:center;gap:14px}
.topbar .pg{font-weight:700;font-size:15px}
.search{margin-left:auto;position:relative}
.search input{width:300px;max-width:42vw;padding:8px 12px 8px 32px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fff}
.search:before{content:"\1F50D";position:absolute;left:10px;top:7px;font-size:13px;opacity:.5}
.wrap{padding:22px;max-width:1180px;width:100%;margin:0 auto}
.page{display:none}
.page.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h2.sec{font-size:21px;margin:2px 0 4px}
.lead{color:var(--muted);margin:0 0 18px;font-size:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h3{margin:0 0 10px;font-size:16px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
label.fld{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:0 0 5px}
select,input[type=text],textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:#fff}
textarea{resize:vertical}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--brand);color:#fff;border:0;padding:9px 15px;border-radius:9px;font-weight:600;cursor:pointer;font-size:14px}
.btn:hover{background:var(--brand2)}
.btn.ghost{background:#fff;color:var(--brand2);border:1px solid var(--brand)}
.btn.sm{padding:6px 11px;font-size:13px}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#334155}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;position:sticky;top:0;background:#fff}
.sb{display:inline-block;min-width:38px;text-align:center;padding:2px 6px;border-radius:6px;font-weight:700;font-size:12.5px}
.s-good{background:var(--goodbg);color:var(--good)}
.s-ok{background:var(--okbg);color:var(--ok)}
.s-warn{background:var(--warnbg);color:var(--warn)}
.s-bad{background:var(--badbg);color:var(--bad)}
.s-na{color:#cbd5e1}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--soft);color:#475569;margin-right:5px}
.tag.r{background:var(--badbg);color:var(--bad)}
.tag.g{background:var(--goodbg);color:var(--good)}
.tag.b{background:#dbeafe;color:#1e40af}
.callout{border-left:4px solid var(--brand);background:var(--softer);padding:11px 14px;border-radius:0 9px 9px 0;margin:10px 0;font-size:13.5px}
.callout.warn{border-color:var(--warn);background:var(--warnbg)}
.callout.bad{border-color:var(--bad);background:var(--badbg)}
.callout.ok{border-color:var(--good);background:var(--goodbg)}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.kv{display:flex;gap:8px;margin:3px 0;font-size:13.5px}
.kv b{flex:0 0 130px;color:var(--muted);font-weight:600}
.rx{background:#ecfeff;border:1px solid #a5f3fc;border-radius:9px;padding:12px 14px;margin:8px 0}
.rx .drug{font-weight:700;color:#0e7490}
.step{display:flex;gap:12px;margin:0 0 4px}
.step .n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.step .bd{flex:1;padding-top:2px}
.acc{border:1px solid var(--line);border-radius:11px;margin-bottom:10px;overflow:hidden;background:#fff}
.acc>summary{padding:13px 16px;cursor:pointer;font-weight:700;font-size:15px;list-style:none;display:flex;align-items:center;gap:10px}
.acc>summary::-webkit-details-marker{display:none}
.acc>summary:before{content:"\25B8";color:var(--brand);font-size:13px;transition:.15s}
.acc[open]>summary:before{transform:rotate(90deg)}
.acc .body{padding:4px 16px 16px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:8px 0}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block}
.scorebox{font-size:34px;font-weight:800;color:var(--brand)}
.note-out{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:10px;max-height:520px;overflow:auto}
.flag{font-size:11px;color:var(--warn);font-weight:700}
.hide{display:none!important}
@media print{.side,.topbar{display:none}.page{display:block!important}.card{break-inside:avoid}}
</style>
</head>

/* ---------- ANTIMICROBIAL REFERENCE ---------- */
/* cov flags used by Bug-Drug matrix & engine: mssa,mrsa,strep,enteroAmp,enteroVRE,hnpek(enterobacterales),pseudo,esbl,anaerobe,atypical */
const DRUGS = [
 {n:"Penicillin G",cls:"Penicillin",route:"IV",dose:"2–4 MU IV q4h (18–24 MU/d for endocarditis/neurosyphilis)",cov:["strep"],pearls:"Drug of choice for susceptible viridans strep / S. pyogenes, neurosyphilis, susceptible enterococcus (with gent or ceftriaxone). Local pneumococcus: 78% S meningeal / 100% non-meningeal."},
 {n:"Ampicillin",cls:"Aminopenicillin",route:"IV/PO",dose:"2 g IV q4h (Listeria/endocarditis); 2 g q6h",cov:["strep","enteroAmp"],pearls:"Adds Listeria & Enterococcus coverage — reason ampicillin is added to ceftriaxone in meningitis >50y/immunocompromised. Local E. faecalis 100% S; E. faecium only 17%."},
 {n:"Amoxicillin",route:"PO",cls:"Aminopenicillin",dose:"500–875 mg PO BID; 1 g TID (high-dose)",cov:["strep"],pearls:"First-line for acute bacterial rhinosinusitis & otitis; high-dose amox for pneumococcus. Component of amox-clavulanate."},
 {n:"Amoxicillin-clavulanate",route:"PO",cls:"Aminopenicillin/BLI",dose:"875/125 mg PO BID or 2000/125 mg ER BID",cov:["mssa","strep","hnpek","anaerobe"],pearls:"Adds anaerobes + many Enterobacterales + MSSA. First-line: bite wounds, sinusitis, mild diabetic foot, outpatient diverticulitis (with/without FQ)."},
 {n:"Ampicillin-sulbactam",route:"IV",cls:"Aminopenicillin/BLI",dose:"3 g IV q6h",cov:["mssa","strep","enteroAmp","hnpek","anaerobe"],pearls:"Anaerobe + MSSA + Enterococcus + many GNR. Note high E. coli ampicillin resistance regionally. High-dose used for Acinetobacter."},
 {n:"Piperacillin-tazobactam",route:"IV",cls:"Antipseudomonal PCN/BLI",dose:"4.5 g IV q6h (or extended 4h infusion)",cov:["mssa","strep","enteroAmp","hnpek","pseudo","anaerobe"],pearls:"Broad: GNR incl Pseudomonas + anaerobes + MSSA + enterococcus. Workhorse for HAP, intra-abdominal, neutropenic fever, sepsis (no MRSA). Avoid relying on it for ESBL bacteremia."},
 {n:"Cefazolin",route:"IV",cls:"1st-gen cephalosporin",dose:"2 g IV q8h",cov:["mssa","strep","hnpek"],pearls:"Drug of choice for MSSA bacteremia/endocarditis & surgical prophylaxis. Local urine E. coli 93% S → predicts cephalexin for cystitis. No enterococcus/MRSA/Pseudomonas."},
 {n:"Cephalexin",route:"PO",cls:"1st-gen cephalosporin",dose:"500 mg PO QID",cov:["mssa","strep"],pearls:"PO step-down for MSSA SSTI & cystitis. Cefazolin susceptibility predicts cephalexin."},
 {n:"Cefoxitin",route:"IV",cls:"Cephamycin (2nd-gen)",dose:"2 g IV q6–8h",cov:["mssa","strep","hnpek","anaerobe"],pearls:"Has anaerobe coverage. Cephamycins stay active vs many ESBL in vitro but NOT recommended for ESBL infections (AmpC inoculum effect)."},
 {n:"Ceftriaxone",route:"IV",cls:"3rd-gen cephalosporin",dose:"1 g IV q24h; 2 g q12h (meningitis); 2 g q24h (endocarditis)",cov:["mssa","strep","hnpek"],pearls:"Backbone of CAP, meningitis, pyelonephritis, gonorrhea, viridans/enterococcal (with amp) endocarditis. No Pseudomonas/enterococcus/anaerobe. Local E. coli 85% (systemic)."},
 {n:"Ceftazidime",route:"IV",cls:"3rd-gen (antipseudomonal)",dose:"2 g IV q8h",cov:["hnpek","pseudo"],pearls:"Antipseudomonal but weak gram-positive — don't use alone empirically when Staph/Strep possible. Pairs with vancomycin for HCAP, etc."},
 {n:"Cefepime",route:"IV",cls:"4th-gen cephalosporin",dose:"2 g IV q8h (q12h some); 2 g q8h for febrile neutropenia/meningitis",cov:["mssa","strep","hnpek","pseudo"],pearls:"Antipseudomonal + good gram-positive (not MRSA/enterococcus). First-line monotherapy for febrile neutropenia, HAP/VAP. Watch neurotoxicity in renal impairment. Preferred over 3rd-gen for AmpC organisms (Enterobacter/Serratia/Citrobacter)."},
 {n:"Ceftaroline",route:"IV",cls:"5th-gen cephalosporin",dose:"600 mg IV q8–12h",cov:["mrsa","mssa","strep","hnpek"],pearls:"The MRSA-active cephalosporin. Salvage for MRSA bacteremia; no Pseudomonas/enterococcus."},
 {n:"Cefdinir / Cefpodoxime",route:"PO",cls:"3rd-gen cephalosporin (PO)",dose:"Cefdinir 300 mg BID; Cefpodoxime 200 mg BID",cov:["strep","hnpek"],pearls:"PO options for sinusitis, pyelonephritis step-down, pediatric/penicillin-allergic respiratory infections."},

const $=s=>document.querySelector(s);
const ce=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function sClass(v){if(v==null)return"s-na";if(v>=90)return"s-good";if(v>=80)return"s-ok";if(v>=70)return"s-warn";return"s-bad";}
function sCell(v){if(v==null)return'<span class="sb s-na">–</span>';return'<span class="sb '+sClass(v)+'">'+v+'</span>';}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function refLink(key){const L=LIBRARY[key];if(!L)return"";const href="references/"+encodeURIComponent(L.file);return'<a href="'+href+'" target="_blank" title="'+esc(L.src)+'">'+esc(L.t)+'</a>';}
function refTag(key){const L=LIBRARY[key];if(!L)return"";return '<a class="tag b" href="references/'+encodeURIComponent(L.file)+'" target="_blank">&#128196; '+esc(L.src)+'</a>';}

/* Best local agents for an organism (from antibiogram): returns sorted list */
function bestAgents(panel,orgName,min){
  const sec=[...ABG[panel].gramneg,...ABG[panel].grampos].find(x=>x.o===orgName);
  if(!sec)return[];
  return Object.entries(sec.s).filter(([d,v])=>v!=null&&v>=(min||80)).sort((a,b)=>b[1]-a[1]);
}

  const fields=[
    ["type","Note type","select",["Initial consult","Follow-up / progress"]],
    ["one","One-liner (age, sex, key comorbidities)","text"],
    ["reason","Reason for consult","text"],
    ["hpi","HPI / interval history","area"],
    ["host","Host factors (immune status, diabetes, devices/lines, recent antibiotics, prior resistant organisms)","area"],
    ["allergy","Allergies (reaction)","text"],
    ["exposure","Epidemiologic / exposure history (travel, animals, ticks, sick contacts, TB risk)","area"],
    ["exam","Pertinent exam (vitals, source-directed findings)","area"],
    ["labs","Key labs (WBC, Cr, lactate, inflammatory markers)","text"],

    ["org","Likely / confirmed organism(s)","text"],

    ["fu","Follow-up / recommendations to primary team","area"]
  ];
  const form=ce("div","card");const grid=ce("div","grid g2");

  fields.forEach(f=>{
    const w=ce("div");if(f[2]==="area"||["one","reason","hpi","host","exam","micro","abx","fu","exposure"].includes(f[0]))w.style.gridColumn="1 / -1";
    w.append(ce("label","fld",f[1]));

    else if(f[2]==="area"){el=ce("textarea");el.rows=2;}

      n+=blk("PERTINENT EXAM:",v("exam"));

      n+=blk("EXAM / VITALS:",v("exam"));
    }
    n+=blk("KEY LABS:",v("labs"));
    n+=blk("MICROBIOLOGY:",v("micro"));
    n+=blk("IMAGING:",v("imaging"));
    n+="\nASSESSMENT\n"+"-".repeat(20)+"\n";
    if(v("one"))n+=v("one")+"\n";
    if(v("syndrome"))n+="• Syndrome / site: "+v("syndrome")+"\n";
    if(v("org"))n+="• Likely / confirmed organism(s): "+v("org")+"\n";
    if(v("host")&&isFu)n+="• Host factors: "+v("host")+"\n";
    if(v("source"))n+="• Source control: "+v("source")+"\n";
    n+="\nPLAN\n"+"-".repeat(20)+"\n";
    if(v("abx"))n+="• Antimicrobials: "+v("abx")+"\n";
    if(v("source"))n+="• Source control: "+v("source")+"\n";
    if(v("workup"))n+="• Additional workup: "+v("workup")+"\n";
    if(v("deesc"))n+="• De-escalation / stop date: "+v("deesc")+"\n";
    if(v("fu"))n+="• Recommendations: "+v("fu")+"\n";
    n+="\nWill follow with the primary team. Thank you for the consult.\n";
    pre.textContent=n;
  };
  copy.onclick=()=>{const t=pre.textContent;navigator.clipboard&&navigator.clipboard.writeText(t).then(()=>{copy.textContent="Copied!";setTimeout(()=>copy.textContent="Copy",1200);},()=>{});};
  clr.onclick=()=>{Object.values(inputs).forEach(el=>{if(el.tagName!=="SELECT")el.value="";});pre.textContent="Fill the form and click Generate.";};
};

/* ---------- SCORES & CALCULATORS ---------- */
PAGES.scores=(c)=>{
  c.append(ce("h2","sec","Scores & Calculators"));
  c.append(ce("p","lead","Bedside risk tools used on the ID/medicine service. Educational support — apply clinical judgment."));

  // CURB-65
  (function(){
    const card=ce("div","card");card.innerHTML='<h3>CURB-65 — CAP severity</h3>';
    const items=[["Confusion (new)","conf"],["Urea / BUN > 19 mg/dL (7 mmol/L)","urea"],["Respiratory rate ≥ 30","rr"],["SBP < 90 or DBP ≤ 60 mmHg","bp"],["Age ≥ 65","age"]];
    const box=ce("div","chips");const state={};
    items.forEach(it=>{const b=ce("span","chip",it[0]);b.onclick=()=>{state[it[1]]=!state[it[1]];b.classList.toggle("on");upd();};box.append(b);});
    card.append(box);const r=ce("div");r.style.marginTop="10px";card.append(r);
    function upd(){const s=items.reduce((a,it)=>a+(state[it[1]]?1:0),0);
      let txt;if(s<=1)txt="Low risk — consider outpatient treatment.";else if(s===2)txt="Moderate — consider short inpatient stay / observation.";else txt="Severe — inpatient; assess for ICU (CURB-65 ≥3, esp 4–5).";
      r.innerHTML='<span class="scorebox">'+s+'</span> <span class="muted">/5</span><div class="callout small">'+txt+'</div>';}
    upd();c.append(card);
  })();

  // Centor / McIsaac
  (function(){
    const card=ce("div","card");card.innerHTML='<h3>Centor (McIsaac) — strep pharyngitis</h3>';
    const items=[["Tonsillar exudate/swelling","ex"],["Tender anterior cervical nodes","ln"],["Fever > 38°C (history)","fev"],["Absence of cough","cough"]];
    const box=ce("div","chips");const state={};
    items.forEach(it=>{const b=ce("span","chip",it[0]);b.onclick=()=>{state[it[1]]=!state[it[1]];b.classList.toggle("on");upd();};box.append(b);});
    card.append(box);
    const ageWrap=ce("div");ageWrap.style.margin="10px 0";ageWrap.innerHTML='<label class="fld">Age</label>';
    const age=ce("select");age.innerHTML='<option value="1">3–14 y (+1)</option><option value="0" selected>15–44 y (0)</option><option value="-1">≥45 y (−1)</option>';ageWrap.append(age);card.append(ageWrap);
    const r=ce("div");card.append(r);age.onchange=upd;
    function upd(){let s=items.reduce((a,it)=>a+(state[it[1]]?1:0),0)+parseInt(age.value);
      let txt;if(s<=0)txt="≤0: no testing or antibiotics — viral likely.";else if(s===1)txt="1: no testing/antibiotics in most.";else if(s<=3)txt="2–3: rapid strep test (RADT) and treat if positive.";else txt="≥4: high probability — RADT; some treat empirically.";
      r.innerHTML='<span class="scorebox">'+s+'</span><div class="callout small">'+txt+'</div>';}
    upd();c.append(card);
  })();

  // Modified Duke
  (function(){
    const card=ce("div","card");card.innerHTML='<h3>Modified Duke Criteria — infective endocarditis</h3>';
    const majors=[["Typical IE organism in 2 separate blood cultures (or persistently positive)","m1"],["Endocardial involvement: echo vegetation/abscess/new dehiscence, OR new valvular regurgitation","m2"]];
    const minors=[["Predisposition (heart condition or IVDU)","n1"],["Fever ≥ 38°C","n2"],["Vascular phenomena (emboli, septic infarct, Janeway, mycotic aneurysm)","n3"],["Immunologic phenomena (GN, Osler nodes, Roth spots, RF)","n4"],["Microbiologic evidence not meeting a major criterion","n5"]];
    const state={};
    const mk=(arr,label)=>{const w=ce("div");w.innerHTML='<div class="small muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:8px 0 4px">'+label+'</div>';const box=ce("div","chips");arr.forEach(it=>{const b=ce("span","chip",it[0]);b.onclick=()=>{state[it[1]]=!state[it[1]];b.classList.toggle("on");upd();};box.append(b);});w.append(box);return w;};
    card.append(mk(majors,"Major criteria"));card.append(mk(minors,"Minor criteria"));
    const r=ce("div");r.style.marginTop="10px";card.append(r);
    function upd(){const M=majors.reduce((a,it)=>a+(state[it[1]]?1:0),0);const m=minors.reduce((a,it)=>a+(state[it[1]]?1:0),0);
      let cl;if(M>=2||(M===1&&m>=3)||m>=5)cl="DEFINITE clinical IE";else if(M>=1||m>=3)cl="POSSIBLE IE";else cl="Insufficient — does not meet possible/definite";
      r.innerHTML='<span class="tag b">Major: '+M+'</span> <span class="tag b">Minor: '+m+'</span><div class="callout small"><b>'+cl+'</b>. (Definite = 2 major, or 1 major + 3 minor, or 5 minor.)</div>';}
    upd();c.append(card);
  })();

  // MASCC
  (function(){
    const card=ce("div","card");card.innerHTML='<h3>MASCC — febrile neutropenia risk</h3>';
    const items=[["Burden: no/mild symptoms (+5)",5,"b5"],["Burden: moderate symptoms (+3) — pick one burden",3,"b3"],["No hypotension (SBP>90) (+5)",5,"hypo"],["No COPD (+4)",4,"copd"],["Solid tumor / no prior fungal infection (+4)",4,"tumor"],["No dehydration needing IV fluids (+3)",3,"dehy"],["Outpatient at fever onset (+3)",3,"outpt"],["Age < 60 (+2)",2,"age"]];
    const box=ce("div","chips");const state={};
    items.forEach(it=>{const b=ce("span","chip",it[0]);b.onclick=()=>{state[it[2]]=!state[it[2]];b.classList.toggle("on");upd();};box.append(b);});
    card.append(box);const r=ce("div");r.style.marginTop="10px";card.append(r);
    function upd(){let s=items.reduce((a,it)=>a+(state[it[2]]?it[1]:0),0);if(s>26)s=26;
      const txt=s>=21?"≥21: LOW risk — selected patients may be eligible for oral / outpatient therapy with close follow-up.":"<21: HIGH risk — admit for IV antipseudomonal therapy.";
      r.innerHTML='<span class="scorebox">'+s+'</span> <span class="muted">(max 26)</span><div class="callout small">'+txt+'</div>';}
    upd();c.append(card);
  })();

  c.append(ce("div","callout small","Sources: CURB-65 & Centor (see CAP review); Modified Duke (AHA IE statement); MASCC (ESMO febrile neutropenia). Open the Reference Library for citations."));
};

/* ---------- GLOBAL SEARCH ---------- */
(function(){
  const inp=$("#globalSearch");
  const dd=ce("div");dd.style.cssText="position:absolute;top:40px;right:0;width:360px;max-height:60vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);z-index:50;display:none";
  document.querySelector(".search").append(dd);
  const index=[];
  SYN.forEach(s=>index.push({t:s.name,sub:"Syndrome · "+s.cat,go:()=>{go("syndromes");setTimeout(()=>{const el=document.getElementById("syn-"+s.id);if(el){el.open=true;el.scrollIntoView({behavior:"smooth"});}},80);}}));
  DRUGS.forEach(d=>index.push({t:d.n,sub:"Drug · "+d.cls,go:()=>go("drugs")}));
  [...ABG.systemic.gramneg,...ABG.systemic.grampos,...ABG.urine.gramneg].forEach(o=>{if(!index.some(i=>i.t===o.o))index.push({t:o.o,sub:"Organism · antibiogram",go:()=>go("abg")});});
  [["CURB-65","Score"],["Centor","Score"],["Modified Duke","Score"],["MASCC","Score"]].forEach(x=>index.push({t:x[0],sub:x[1],go:()=>go("scores")}));
  function render(q){q=q.toLowerCase().trim();if(!q){dd.style.display="none";return;}
    const m=index.filter(i=>i.t.toLowerCase().includes(q)||i.sub.toLowerCase().includes(q)).slice(0,12);
    if(!m.length){dd.style.display="none";return;}
    dd.innerHTML="";m.forEach(i=>{const row=ce("div");row.style.cssText="padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line)";row.innerHTML='<div style="font-weight:600;font-size:13.5px">'+esc(i.t)+'</div><div class="small muted">'+esc(i.sub)+'</div>';row.onmouseenter=()=>row.style.background="var(--soft)";row.onmouseleave=()=>row.style.background="";row.onclick=()=>{i.go();dd.style.display="none";inp.value="";};dd.append(row);});
    dd.style.display="block";}
  inp.oninput=()=>render(inp.value);
  inp.onblur=()=>setTimeout(()=>dd.style.display="none",180);
  document.addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement!==inp){e.preventDefault();inp.focus();}});
})();

/* ---------- INIT ---------- */
go("home");
</script>
