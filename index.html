  workup:["magnetic resonance imaging (MRI) brain (preferred) AND noncontrast computed tomography (CT) (best for calcifications) to count viable cysts, stage disease, and detect hydrocephalus/extraparenchymal involvement. For suspected extraparenchymal disease, use magnetic resonance imaging with 3D volumetric sequencing to find intraventricular and subarachnoid cysticerci.","Confirm with serology by enzyme-linked immunoelectrotransfer blot (EITB); antigen-detection assays (serum or cerebrospinal fluid (CSF)) can also confirm and gauge viable burden. AVOID crude-antigen enzyme-linked immunosorbent assay (ELISA) — poor sensitivity/specificity.","BEFORE antiparasitic therapy: funduscopic exam to exclude ocular cysticercosis; screen for latent tuberculosis (TB) and Strongyloides if prolonged corticosteroids are planned. Monitor liver enzymes and complete blood count (leukopenia) if albendazole runs >14 days."],
  empiric:[
   {set:"Raised intracranial pressure FIRST — untreated hydrocephalus or diffuse cerebral edema (cysticercal encephalitis)",rx:"Control the intracranial pressure first: corticosteroids for diffuse edema, surgical cerebrospinal fluid (CSF) diversion for hydrocephalus — do NOT give antiparasitics yet",why:"Antiparasitic drugs WORSEN cerebral edema — defer them until the intracranial pressure is controlled."},
   {set:"1–2 viable parenchymal cysts",rx:"Albendazole 15 mg/kg/day (÷ twice daily (BID), max 1200 mg/day, with food) ×10–14 days, WITH corticosteroids started before the antiparasitic",why:"Antiparasitic accelerates radiologic resolution; steroids first blunt the inflammatory reaction to dying cysts."},
   {set:">2 viable parenchymal cysts",rx:"Albendazole 15 mg/kg/day + praziquantel 50 mg/kg/day, plus corticosteroids",why:"Combination clears multiple viable cysts better than albendazole alone."},
   {set:"Seizures (any form)",rx:"Antiepileptic drugs for all patients presenting with seizures",why:"Seizure control is essential, given alongside antiparasitic/steroid therapy."}],
  definitive:["Calcified-only (dead) cysts: do NOT give antiparasitics — manage seizures only; corticosteroids are not routinely needed for isolated calcified disease with perilesional edema (consider epilepsy-surgery evaluation for refractory seizures).","Intraventricular cysts (lateral/third ventricle): minimally invasive NEUROENDOSCOPIC removal is preferred — do NOT give antiparasitics preoperatively (cyst disruption provokes inflammation that prevents removal). Fourth-ventricle cysts: surgical removal preferred. Adherent or technically difficult cysts: shunt for hydrocephalus rather than risky removal.","Subarachnoid (basilar cistern/Sylvian fissure) disease: antiparasitics PLUS high-dose corticosteroids (e.g., dexamethasone 8–24 mg/day) started before the antiparasitic; continue antiparasitics until radiologic resolution — often >1 year. Consider methotrexate as a steroid-sparing agent for prolonged anti-inflammatory therapy; shunt for hydrocephalus.","Retreat with antiparasitics if a parenchymal cyst persists at 6 months. Repeat magnetic resonance imaging at least every ~6 months until resolution."],
  duration:"Parenchymal: albendazole 10–14 days (max 1200 mg/day); retreat if cysts persist at 6 months. Subarachnoid disease often needs >1 year of antiparasitic therapy until radiologic resolution.",
  pearls:["Always start corticosteroids before (or with) antiparasitic therapy, and do an eye exam first. Typical dosing: dexamethasone ~0.1 mg/kg/day (or prednisone 1–1.5 mg/kg/day), begun 3–4 days before and continued during therapy.","Antiparasitics WORSEN edema — never give them with untreated hydrocephalus or diffuse cerebral edema; control the intracranial pressure first.","Do not give antiparasitics for calcified-only disease — the cysts are already dead.","Subarachnoid/ventricular neurocysticercosis (NCC) is the life-threatening form — think hydrocephalus and involve neurosurgery.","Consider stopping antiepileptic drugs once the lesion has resolved AND the patient is seizure-free for ~24 months (single enhancing lesion: ~6 months, if no residual cyst/calcification or other recurrence risk factors)."],
  consult:["infectious disease (ID)/neurology/neurosurgery: confirm the form, sequence steroids → antiparasitics, manage hydrocephalus, and treat the household tapeworm carrier."]},

 {id:"leishmaniasis",name:"Leishmaniasis (Cutaneous, Mucosal, Visceral)",cat:"Skin, Soft Tissue, and Bone",src:"leish",
  suspect:["Cutaneous (cutaneous leishmaniasis (CL)): chronic painless papule → nodule → ulcer with a raised border at a sandfly-bite site (travelers, military, endemic residents) — the form most often seen in North America.","Mucosal (mucosal leishmaniasis (ML)): destructive naso-oropharyngeal lesions, may follow New World cutaneous leishmaniasis (especially L. (Viannia) braziliensis) months to years later.","Visceral (visceral leishmaniasis (VL), kala-azar): fever, hepatosplenomegaly, pancytopenia, wasting — fatal untreated; an opportunistic infection in human immunodeficiency virus (HIV) in co-endemic areas."],
  workup:["Parasitologic confirmation: sample the lesion edge (cutaneous/mucosal) or bone marrow/spleen (visceral) for smear, histopathology, culture, and polymerase chain reaction (PCR; best for species identification).","Visceral leishmaniasis: an rK39 immunochromatographic serology is SUPPORTIVE (can direct invasive sampling) but is not a stand-alone diagnostic, and serology is NOT useful as a test of cure.","Classify cutaneous leishmaniasis as SIMPLE (low mucosal-risk species, immunocompetent, few small lesions away from cosmetically/functionally sensitive sites) vs COMPLEX (Viannia/'mucosal-belt' species, multiple or large lesions, lesions on the face/ears/genitalia/over joints, immunocompromise, or local-therapy failure). Species identification guides therapy and mucosal risk; evaluate for mucosal involvement in New World disease and test for human immunodeficiency virus in suspected visceral leishmaniasis."],
  empiric:[
   {set:"Visceral leishmaniasis (first-line)",rx:"Liposomal amphotericin B intravenous (IV) — immunocompetent: 3 mg/kg/day on days 1–5, 14, and 21 (total 21 mg/kg); East-African visceral leishmaniasis may need a total ≥40 mg/kg; immunosuppressed: ~4 mg/kg/day on days 1–5, 10, 17, 24, 31, 38 (total 40 mg/kg)",why:"Liposomal amphotericin is preferred; pentavalent antimonials are alternatives where resistance is low. In human immunodeficiency virus, optimize antiretroviral therapy and consider secondary prophylaxis (relapse is common)."},
   {set:"Simple cutaneous leishmaniasis",rx:"Observation (many self-heal) OR LOCAL therapy — cryotherapy, thermotherapy (heat), intralesional pentavalent antimonials, or topical paromomycin",why:"Not every simple cutaneous leishmaniasis needs systemic therapy; choose by species, lesion number/size/location, and host."},
   {set:"Complex cutaneous or mucosal leishmaniasis",rx:"Systemic therapy: oral miltefosine (species-dependent), pentavalent antimonials, or liposomal amphotericin B. Mucosal disease ALWAYS needs systemic therapy + ear, nose, and throat (ENT) evaluation",why:"Complex disease (Viannia species, large/multiple lesions, sensitive sites, immunocompromise) and any mucosal involvement warrant systemic therapy."}],
  definitive:["Tailor the regimen to species and syndrome; ensure mucosal evaluation for New World disease; co-manage human immunodeficiency virus in visceral leishmaniasis. Miltefosine is TERATOGENIC — contraindicated in pregnancy (ensure reliable contraception); use liposomal amphotericin B if treatment is needed in pregnancy.","Coordinate antimonial/agent access through specialty channels (e.g., Centers for Disease Control and Prevention (CDC)); provide wound care, lesion documentation, and follow-up for relapse/mucosal disease."],
  duration:"Regimen-specific (e.g., liposomal amphotericin visceral leishmaniasis over the dosing days above; miltefosine ~28 days).",
  pearls:["Liposomal amphotericin B is first-line for visceral leishmaniasis; oral miltefosine is a key oral option for cutaneous/mucosal disease (but is TERATOGENIC — avoid in pregnancy).","Simple cutaneous leishmaniasis may be observed or treated LOCALLY (cryotherapy, heat, intralesional antimonials, topical paromomycin) — reserve systemic therapy for complex or mucosal disease.","New World cutaneous disease (Viannia species; the 'mucosal belt' of Bolivia/Peru/Brazil) can later cause destructive mucosal leishmaniasis — evaluate, counsel, and follow up.","Confirm and speciate by polymerase chain reaction — species drives drug choice and prognosis; rK39 serology is only supportive for visceral leishmaniasis."],
  consult:["infectious disease (ID)/tropical medicine (and Centers for Disease Control and Prevention for agent access) for speciation, regimen selection, and mucosal/visceral management."]},

 {id:"asb",name:"Asymptomatic Bacteriuria",cat:"Genitourinary",src:"asb",
  suspect:["Positive urine culture (≥10^5 CFU/mL; for women, two consecutive specimens) WITHOUT urinary symptoms or signs attributable to urinary tract infection (UTI).","Pyuria does NOT define infection — pyuria with bacteriuria but no symptoms is not an indication to treat."],
  treatWhen:[
   "TREAT — Pregnant women: screen once early in pregnancy and treat (reduces pyelonephritis and preterm birth) with 4–7 days of a culture-directed, pregnancy-safe agent.",
   "TREAT — Before an endoscopic urologic procedure with anticipated mucosal trauma (e.g., transurethral resection of the prostate (TURP)): screen, then give culture-directed therapy starting 30–60 minutes before the procedure.",
   "DON'T SCREEN/TREAT — Healthy non-pregnant women (pre- or post-menopausal); people with diabetes; older community-dwelling or long-term-care residents.",
   "DON'T SCREEN/TREAT — Short- or long-term indwelling/suprapubic urinary catheters; spinal cord injury; functionally impaired older adults.",
   "DON'T SCREEN/TREAT — Renal transplant >1 month out; non-renal solid-organ transplant; elective non-urologic surgery; urologic device implantation or indwelling urologic devices (standard perioperative prophylaxis only); infants/children.",
   "NEUTROPENIA — Low-risk neutropenia: manage like the general population (don't treat asymptomatic bacteriuria). High-risk neutropenia (absolute neutrophil count <100 for ≥7 days): no recommendation (knowledge gap).",
   "DELIRIUM / FALLS PEARL — In a functionally/cognitively impaired older adult with bacteriuria and only delirium or a fall (no localizing genitourinary symptoms, fever, or hemodynamic instability), assess for other causes and observe — do NOT treat the urine. BUT if fever or hemodynamic instability (possible sepsis) is present without a localizing source, DO start empiric broad-spectrum therapy covering urinary and non-urinary sources."
  ],
  workup:["Confirm the patient is truly asymptomatic before acting on a culture.","For a chronically catheterized patient, only culture (from a freshly replaced catheter) when treating a true symptomatic catheter-associated urinary tract infection (CAUTI) — do not 'treat the urine.'"],
  empiric:[
   {set:"Pregnancy (culture-directed)",rx:"4–7 days of a pregnancy-safe agent per susceptibilities (e.g., nitrofurantoin, amoxicillin, cephalexin); use the shortest effective course",why:"One of the few settings where treating asymptomatic bacteriuria clearly helps. Evidence is insufficient to recommend routine repeat (test-of-cure) screening."},
   {set:"Pre-endourologic procedure (mucosal trauma)",rx:"Culture-directed (targeted) antibiotic started 30–60 minutes before the procedure",why:"Prevents post-procedure bacteremia/sepsis in a heavily contaminated field; targeted therapy is preferred over empiric."}],
  definitive:["Outside pregnancy and pre-urologic procedures, the correct action is NO antibiotics — a major stewardship win."],
  duration:"Pregnancy: 4–7 days culture-directed (shortest effective course); pre-procedure: start 30–60 min before, peri-procedural only.",
  pearls:["Only pregnant patients and those about to undergo an invasive (mucosa-traumatizing) urologic procedure should be screened and treated.","Do not treat for cloudy or malodorous urine, pyuria alone, or non-localizing delirium or falls.","The 2019 update reaffirms NO screening/treatment for diabetes, spinal cord injury, indwelling catheters, renal and non-renal transplant, non-urologic surgery, and urologic devices.","Stopping reflexive treatment of positive urine cultures is one of the highest-yield stewardship interventions."],
  consult:["Stewardship target — infectious disease (ID)/pharmacy can help stop reflexive antibiotics for asymptomatic positive urine cultures."]},

 {id:"surgprophx",name:"Surgical Antimicrobial Prophylaxis",cat:"Other",src:"surgprophx",
  suspect:["Goal: bactericidal drug levels in tissue at the time of incision to prevent surgical site infection. Indicated for clean-contaminated procedures and for clean procedures involving prosthetic material or high surgical site infection (SSI) consequence."],
  workup:["Choose the agent by procedure and likely surgical site infection flora; cover skin flora (staph/strep) for most cases, and add anaerobic/gram-negative coverage for colorectal, gastrointestinal (GI), and genitourinary (GU) procedures.","Screen for methicillin-resistant Staphylococcus aureus (MRSA) colonization and beta-lactam allergy to decide on vancomycin."],
  empiric:[
   {set:"Most procedures (default)",rx:"Cefazolin 2 g intravenous (IV) (3 g if ≥120 kg) within 60 minutes before incision",why:"Cefazolin covers the staph/strep skin flora responsible for most SSIs; dose by weight."},
   {set:"Colorectal / appendectomy / gastrointestinal with luminal entry",rx:"Cefazolin + metronidazole (or cefoxitin, or ertapenem) ± oral antibiotic bowel prep",why:"Adds anaerobic and enteric gram-negative coverage."},
   {set:"methicillin-resistant Staphylococcus aureus colonized / high methicillin-resistant Staphylococcus aureus risk / beta-lactam anaphylaxis",rx:"Add or substitute vancomycin 15 mg/kg (infuse within 120 minutes before incision); clindamycin is an alternative",why:"Vancomycin and fluoroquinolones need the longer 120-minute infusion window. Vancomycin/clindamycin cover only gram-positives — for procedures also needing gram-negative/anaerobic coverage (colorectal, gastrointestinal (GI), genitourinary (GU)), pair with aztreonam or an aminoglycoside (+ metronidazole) in beta-lactam-allergic patients."}],
  definitive:["Redose intraoperatively for long cases (cefazolin about every 4 h — roughly 2× the half-life) or with major blood loss.","Dose by actual body weight; increase the dose for obesity."],
  duration:"A single preoperative dose is usually sufficient; if continued, STOP within 24 hours of surgery end — extending prophylaxis does not reduce surgical site infection and drives resistance and Clostridioides difficile (C. difficile).",
  pearls:["Timing is everything: infuse within 60 minutes before incision (120 minutes for vancomycin or a fluoroquinolone).","Do not run prophylaxis past 24 hours, including 'until drains or lines are out' — it adds harm, not benefit.","Redose for long operations and large blood loss, and dose by weight."],
  consult:["Pharmacy/surgery/stewardship for agent selection, weight-based dosing, intraoperative redosing, and stopping within 24 hours."]},

 {id:"ssitrauma",name:"Extremity Trauma (Open-Fracture SSI Prevention)",cat:"Skin, Soft Tissue, and Bone",src:"ssitrauma",
  suspect:["Open fracture or major extremity trauma — high risk of deep infection. Antibiotic prophylaxis plus surgical debridement is the foundation of prevention (AAOS 2022).","Modifiable surgical site infection (SSI) risk factors to counsel/optimize: smoking, diabetes, obesity, significant alcohol use (>14 units/week), low albumin (<36 g/L), and elevated postoperative glucose (>125 mg/dL). High perioperative FiO2, preoperative transfusion, and preoperative methicillin-resistant Staphylococcus aureus (MRSA) positivity have NOT been shown to change SSI risk."],
  workup:["Grade the open fracture (Gustilo–Anderson); assess perfusion, contamination, and soft-tissue injury.","Get the patient to the OR for debridement, irrigation, and fracture stabilization as soon as reasonable — ideally before 24 hours post-injury (the old 'within 6 hours' rule is not evidence-based).","Irrigate with SALINE WITHOUT additives at LOW pressure (FLOW trial: soap and antibiotic-containing irrigation solutions add no benefit and may harm)."],
  empiric:[
   {set:"Open fracture — systemic prophylaxis",rx:"Systemic cefazolin (or clindamycin if beta-lactam allergy) started as EARLY as possible after injury",why:"Early systemic prophylaxis lowers deep infection after open fracture (AAOS: strong recommendation)."},
   {set:"Gustilo type III (and possibly type II) / heavily contaminated",rx:"Add gram-negative coverage (e.g., an aminoglycoside); consider anti-anaerobic coverage for farm/soil/fecal contamination",why:"Gram-negative coverage is preferred for type III (and possibly type II) open fractures."},
   {set:"Local adjunct",rx:"Consider local antibiotics — vancomycin powder, tobramycin-impregnated beads, or gentamicin-coated nails",why:"Local delivery may further lower surgical site infection after open-fracture fixation (AAOS: may be beneficial)."}],
  definitive:["Repeat debridement as needed; achieve definitive fixation and soft-tissue coverage promptly — wound coverage within <7 days of injury is suggested. Close the open wound when feasible without gross contamination (primary closure is acceptable in selected patients; temporizing external fixation remains an option).","Negative-pressure wound therapy: after CLOSED-fracture fixation it may reduce revision surgery/SSI, but after OPEN-fracture fixation it offers NO advantage over sealed dressings. Silver-coated dressings are not suggested."],
  duration:"Short systemic courses around injury and fixation (per local protocol); local adjuncts remain as placed.",
  pearls:["Antibiotics as soon as possible after injury plus prompt irrigation and debridement are the two highest-yield interventions.","Cefazolin is the backbone; escalate to gram-negative coverage for Gustilo type III (and possibly type II) fractures.","Local antibiotic strategies are useful adjuncts — not substitutes for systemic prophylaxis plus debridement.","Give tetanus prophylaxis (toxoid ± tetanus immune globulin) for tetanus-prone wounds.","Optimize modifiable risk factors (glycemia, smoking, nutrition/albumin) — they measurably raise surgical site infection risk."],
  consult:["Orthopedic trauma leads; infectious disease (ID) for complex contamination, established infection, or antibiotic selection."]},

 {id:"vancauc",name:"Vancomycin area under the curve (AUC)-Guided Dosing & Monitoring",cat:"Other",src:"vancauc",
  suspect:["The area under the curve (AUC) 400–600 target is validated ONLY for serious/invasive methicillin-resistant Staphylococcus aureus (MRSA) infection: bacteremia, sepsis, infective endocarditis, pneumonia, osteomyelitis, and meningitis.","NOT validated for — and should be extrapolated to only with caution — methicillin-susceptible Staphylococcus aureus (MSSA), coagulase-negative staphylococci (CoNS), other organisms, and non-bacteremic skin/skin-structure or urinary tract infections."],
  workup:["Target an AUC24/minimum inhibitory concentration (MIC) of 400–600 mg·h/L, ASSUMING a minimum inhibitory concentration of 1 mg/L by broth microdilution (BMD) — the PK/PD goal balancing efficacy against nephrotoxicity.","Estimate area under the curve with Bayesian software (one or two levels — at least one trough; two levels are more accurate) OR first-order PK using two steady-state levels (post-distributional peak at 1–2 h + end-of-interval trough). Trough-only targeting (15–20 mg/L) is NO LONGER recommended.","Achieve the target EARLY — within the first 24–48 h. Bayesian dosing is preferred for this because it does not require steady-state levels.","Assume the minimum inhibitory concentration is 1 mg/L for empiric dosing (automated methods are imprecise; Etest reads ~1–2 dilutions high). In a critically ill patient, verify the minimum inhibitory concentration by a standardized method (preferably broth microdilution) as soon as possible."],
  empiric:[
   {set:"Loading dose (seriously ill / critically ill)",rx:"20–35 mg/kg intravenous (actual body weight), NOT to exceed 3,000 mg",why:"Reaches target exposure faster; prolong the infusion to ≥2 h to limit infusion reaction."},
   {set:"Maintenance (normal renal function)",rx:"15–20 mg/kg intravenous every 8 to 12 hours (q8–12h), then titrate to an area under the curve of 400–600",why:"Adjust by area under the curve, not by trough alone."},
   {set:"Obesity",rx:"Load 20–25 mg/kg actual body weight (max 3,000 mg); maintenance usually ≤4,500 mg/day per renal function, single doses capped at 3,000 mg",why:"Monitor area under the curve early and frequently — especially once empiric doses exceed 4,000 mg/day."},
   {set:"Intermittent hemodialysis",rx:"Dose after dialysis; target a PRE-dialysis level of 15–20 mg/L (a practical surrogate for an area under the curve of 400–600)",why:"Check a predialysis level at least weekly and let it drive subsequent dosing rather than a fixed weight-based rule."},
   {set:"Continuous renal replacement therapy (CRRT)",rx:"Load 20–25 mg/kg actual body weight, then maintenance 7.5–10 mg/kg every 12 hours (at effluent 20–25 mL/kg/h)",why:"Check a level within the first 24 h to confirm the area under the curve target; continuous-infusion vancomycin is an increasingly used alternative on CRRT."},
   {set:"Continuous infusion (alternative when the area under the curve target can't be met with intermittent dosing)",rx:"Load 15–20 mg/kg, then 30–40 mg/kg/day (up to 60) as a continuous infusion, targeting a steady-state level of 20–25 mg/L",why:"AUC24 ≈ steady-state level × 24; easy to adjust by infusion rate. Requires a dedicated line (vancomycin is incompatible with many co-infused drugs)."}],
  definitive:["Re-estimate the area under the curve after any dose change or shift in renal function; keep it at or below ~600 to limit nephrotoxicity (acute kidney injury (AKI) risk climbs steeply as the daily area under the curve exceeds ~650–1,300).","If the minimum inhibitory concentration is >1 mg/L by broth microdilution, conventional dosing is unlikely to reach an AUC/MIC ≥400 — do NOT simply escalate the dose (toxicity); reassess and consider an alternative agent per clinical judgment. If the minimum inhibitory concentration is <1 mg/L, do NOT decrease the dose.","Switch off vancomycin for a minimum inhibitory concentration >2 mg/L (vancomycin-intermediate/resistant Staphylococcus aureus) or when there is no clinical/microbiologic response despite adequate source control, regardless of minimum inhibitory concentration.","acute kidney injury risk rises with concurrent piperacillin-tazobactam and with sustained high area under the curve/troughs."],
  duration:"Monitor throughout therapy; the pathogen and syndrome determine total course length. Monitor at least weekly when stable, and daily if hemodynamically unstable, on concurrent nephrotoxins, with changing renal function, or on a prolonged (>3–5 day) course.",
  pearls:["Dose to an area under the curve of 400–600, not to a trough of 15–20 — trough-only monitoring is obsolete (2020 ASHP/IDSA/PIDS/SIDP consensus).","Hit the target EARLY (24–48 h); give a weight-based loading dose (20–35 mg/kg, max 3 g) in the critically ill.","Assume a minimum inhibitory concentration of 1 mg/L; if it is truly >1 don't just push the dose — change the drug. If <1, don't cut the dose.","The area under the curve target applies to SERIOUS MRSA infection — not MSSA, CoNS, or simple skin/urinary infections.","Vancomycin + piperacillin-tazobactam raises acute kidney injury risk — watch renal function and consider alternatives."],
  consult:["Pharmacy for Bayesian area under the curve dosing, level timing, and renal-adjusted titration (including dialysis/CRRT)."]},

 {id:"icvax",name:"Vaccination of the Immunocompromised Host",cat:"Other",src:"icvax",
  suspect:["Patients with planned or current immunosuppression: chemotherapy, biologics (e.g., anti-CD20/rituximab, TNF inhibitors), transplant (hematopoietic stem cell transplant (HSCT)/solid organ transplant (SOT)), advanced human immunodeficiency virus (HIV), asplenia, or high-dose corticosteroids.","'HIGH-LEVEL' immunosuppression (live vaccines contraindicated): cancer chemotherapy; <2 months after solid organ transplant; HIV with CD4 <200 (or <15% in children); prednisone ≥20 mg/day (or >2 mg/kg/day if <10 kg) for ≥14 days; a tumor necrosis factor (TNF)-α blocker or rituximab; or combined primary immunodeficiency. 'LOW-LEVEL' = HIV CD4 200–499, lower-dose/alternate-day steroids, methotrexate ≤0.4 mg/kg/week, or azathioprine ≤3 mg/kg/day."],
  treatWhen:[
   "LIVE vaccines: give ≥4 weeks BEFORE starting immunosuppression, and AVOID during significant immunosuppression (generally contraindicated).",
   "INACTIVATED vaccines: give ≥2 weeks before immunosuppression for best response; they are safe (if less immunogenic) during immunosuppression.",
   "ASPLENIA / complement deficiency: ensure pneumococcal, meningococcal (ACWY + B), and Haemophilus influenzae type b vaccination. Pneumococcal SEQUENCE: a conjugate vaccine (PCV) FIRST, then PPSV23 ≥8 weeks later, with a second PPSV23 5 years later (if PPSV23 was given first, give PCV ≥1 year later).",
   "ANTI-B-CELL therapy (rituximab): expect a poor vaccine response — defer vaccination until ≥6 months after the last dose when feasible.",
   "ROUTINE: annual inactivated influenza vaccine; complete hepatitis B virus (HBV), HPV, and (age-appropriate) recombinant zoster vaccine (RZV is inactivated and safe).",
   "hematopoietic stem cell transplant: re-immunize on the post-transplant schedule (inactivated vaccines from ~6 months); live vaccines (MMR, varicella) only ≥24 months after transplant, IF seronegative/non-immune, no graft-versus-host disease (GVHD), and off immunosuppression."
  ],
  workup:["Review immunization history and the planned immunosuppression timeline; vaccinate during the window of opportunity before therapy.","Household contacts should receive inactivated vaccines and most routine live vaccines (MMR, varicella, rotavirus); avoid oral polio vaccine, and generally avoid LAIV around severely immunocompromised contacts."],
  definitive:["Document and complete catch-up immunizations; recheck titers where indicated (e.g., hepatitis B)."],
  duration:"Per Centers for Disease Control and Prevention (CDC)/ACIP schedule and transplant-specific re-immunization timelines.",
  pearls:["Plan ahead: live vaccines ≥4 weeks before immunosuppression; inactivated vaccines ≥2 weeks before.","Live vaccines are generally contraindicated during significant immunosuppression.","Vaccinate the household ('cocooning') — use inactivated influenza for close contacts and avoid the oral polio vaccine."],
  consult:["infectious disease (ID)/transplant and primary care to sequence vaccines around immunosuppression and re-immunize after hematopoietic stem cell transplant."]},

 {id:"covid",name:"COVID-19 — Testing & Infection Prevention",cat:"Respiratory",src:"covid",src2:"covidipc",
  suspect:["Fever, cough, dyspnea, anosmia, or an exposure consistent with SARS-CoV-2; spectrum from asymptomatic to viral pneumonia/ARDS, with higher risk in older and immunocompromised patients."],
  workup:["Diagnosis: reverse transcription polymerase chain reaction (RT-PCR) or a laboratory-based nucleic acid amplification test (NAAT) is the testing method of choice (highest sensitivity).","Rapid antigen tests are useful when molecular testing is not promptly available (NAAT delayed >1 day); they perform best within the first 5 days of symptoms. For a symptomatic patient, Infectious Diseases Society of America (IDSA) prefers a single nucleic acid amplification test over two serial antigen tests — but if nucleic acid amplification test is not timely and the first antigen test is negative, repeat the antigen test. Point-of-care and laboratory-based antigen tests perform comparably.","A POSITIVE antigen test in a symptomatic person has a high positive predictive value — act on it (treat, isolate). A NEGATIVE antigen test has a lower negative predictive value and does NOT exclude infection in a symptomatic or exposed person — confirm with a nucleic acid amplification test (or repeat the antigen test) when it matters.","Infection prevention: staff caring for suspected/known COVID-19 should use appropriate personal protective equipment (PPE) — gown, gloves, eye protection, and a mask; use an N95/N99 or powered air-purifying respirator (PAPR) for aerosol-generating procedures."],
  definitive:["Isolate per current institutional and public-health guidance; de-isolate by symptom/time criteria.","Therapeutics change rapidly — match antiviral/immunomodulator choice (e.g., nirmatrelvir-ritonavir, remdesivir, dexamethasone for hypoxemia) to the CURRENT Infectious Diseases Society of America (IDSA) treatment guidance and disease severity."],
  duration:"Testing and isolation per current guidance; treatment course is therapy-specific.",
  pearls:["Molecular testing (reverse transcription polymerase chain reaction/nucleic acid amplification test) is the method of choice; antigen tests are most sensitive within 5 days of symptom onset.","A positive rapid antigen test in a symptomatic person is reliable (high positive predictive value) — it is the NEGATIVE result that should be repeated or confirmed by nucleic acid amplification test; don't rule out COVID on one negative antigen test in a symptomatic or exposed patient.","For routine care of a COVID-19 patient, either a surgical mask OR an N95 is acceptable (plus eye protection, gown, gloves) — use an N95 (or powered air-purifying respirator) specifically for aerosol-generating procedures."],
  consult:["Infection prevention/infectious disease (ID) for isolation, exposure management, and current antiviral eligibility (therapeutics change frequently)."]},

 {id:"septarth",name:"Septic Arthritis (Native Joint)",cat:"Skin, Soft Tissue, and Bone",src:"mksap",
  suspect:["Acute monoarthritis — warm, swollen, painful joint with restricted motion ± fever — a joint emergency (cartilage destruction within days).","Staphylococcus aureus (S. aureus) (incl. methicillin-resistant Staphylococcus aureus (MRSA)) is the most common cause; β-hemolytic streptococci (groups A/B/C/G) next. Gram-negatives in injection drug use, immunocompromise, and older adults.","Disseminated gonococcal infection (young, sexually active): arthritis-dermatitis syndrome (migratory polyarthralgia, tenosynovitis, pustular rash) OR purulent monoarthritis. Risk: terminal complement deficiency, eculizumab, pregnancy, menses."],
  workup:["Arthrocentesis BEFORE antibiotics: cell count (septic usually >50,000/µL and often >100,000, neutrophil-predominant — but overlap with crystal disease), Gram stain, culture, and crystals.","Blood cultures; in suspected disseminated gonococcus, nucleic acid amplification test (NAAT) for Neisseria gonorrhoeae (N. gonorrhoeae) from genital/extragenital sites plus blood and joint cultures.","Imaging for prosthetic joints or to assess concomitant osteomyelitis — don't anchor, since crystal arthritis can coexist."],
  empiric:[
   {set:"Empiric — cover methicillin-resistant Staphylococcus aureus + gram-negatives",rx:"Vancomycin + ceftriaxone (use cefepime or ceftazidime if Pseudomonas risk — injection drug use (IDU), immunocompromise) PLUS joint drainage",why:"methicillin-resistant Staphylococcus aureus is common; broaden gram-negative coverage by host risk. Antibiotics alone do not cure a septic joint."},
   {set:"Suspected gonococcal arthritis",rx:"Ceftriaxone 1 g intravenous (IV)/intramuscular (IM) daily; also treat chlamydia (doxycycline)",why:"Disseminated gonococcus responds well to ceftriaxone; step down to oral once improving per susceptibility."}],
  definitive:["Narrow to pathogen-directed therapy on cultures; joint drainage (serial needle aspiration, arthroscopic, or open) is essential and often repeated."],
  duration:"Typically 3–4 weeks (organism- and response-dependent); gonococcal arthritis often ~7–14 days.",
  pearls:["Drainage + antibiotics — antibiotics alone do not cure a septic joint.","A markedly inflammatory synovial fluid can be septic OR crystal-induced; send Gram stain, culture, AND crystals (they can coexist).","Think disseminated gonococcus in a young, sexually active patient with tenosynovitis + pustular rash + polyarthralgia."],
  consult:["infectious disease (ID) + orthopedics for drainage strategy, pathogen-directed therapy, and duration; evaluate for endocarditis/seeding when Staphylococcus aureus is isolated."]},

 {id:"brainabscess",name:"Brain Abscess",cat:"Neurological",src:"mksap",
  suspect:["Headache, focal neurologic deficit, seizures, and raised intracranial pressure — fever in only ~50%.","Source is contiguous (otitis/sinusitis/dental), hematogenous (endocarditis, lung abscess, right-to-left shunt), or post-neurosurgical/penetrating trauma; often polymicrobial (streptococci + anaerobes)."],
  workup:["magnetic resonance imaging (MRI) WITH CONTRAST is the imaging of choice (ring-enhancing lesion with restricted diffusion). Obtain blood cultures BEFORE antibiotics.","Stereotactic aspiration/excision for culture is usually needed (Gram stain; aerobic, anaerobic, fungal, mycobacterial) — drain abscesses larger than ~2.5 cm. Look for the source (echocardiography for endocarditis; sinus/dental imaging)."],
  empiric:[
   {set:"Community, source unknown",rx:"Vancomycin + ceftriaxone + metronidazole (use cefepime instead of ceftriaxone if Pseudomonas risk)",why:"Covers streptococci, Staphylococcus aureus, Enterobacterales, and anaerobes; metronidazole is essential for anaerobes."},
   {set:"Post-neurosurgical / penetrating trauma",rx:"Vancomycin + cefepime (or meropenem) ± metronidazole",why:"Adds nosocomial gram-negatives including Pseudomonas, plus staph."}],
  definitive:["Pathogen-directed therapy after aspiration culture; repeat imaging to confirm response; treat the predisposing source (endocarditis, sinusitis, dental).","Documented methicillin-resistant Staphylococcus aureus: vancomycin ×4–6 weeks ± rifampin; linezolid or trimethoprim-sulfamethoxazole are cerebrospinal fluid-penetrant alternatives (IDSA MRSA 2011).","Adjunctive corticosteroids only for significant mass effect/edema (taper as able)."],
  duration:"Usually 6–8 weeks intravenous (IV) (longer if undrained or post-neurosurgical).",
  pearls:["magnetic resonance imaging with contrast + blood cultures before antibiotics; get an aspirate culture whenever feasible.","Drain abscesses larger than ~2.5 cm; pursue and treat the source (sinus/dental/endocarditis)."],
  consult:["infectious disease (ID) + neurosurgery: timing of aspiration/excision, pathogen-directed therapy, source control, and duration."]},

 {id:"epiduralabscess",name:"Spinal Epidural Abscess",cat:"Neurological",src:"mksap",
  suspect:["The classic triad of back pain → radicular pain → neurologic deficit (motor/sensory, bowel/bladder) — progression can be rapid and is a surgical emergency.","Risk factors: Staphylococcus aureus (S. aureus) bacteremia (the classic seed), injection drug use, indwelling vascular catheters, diabetes, and recent spinal procedures/epidural catheters. Often with vertebral osteomyelitis/discitis."],
  workup:["magnetic resonance imaging (MRI) of the whole spine WITH CONTRAST is the imaging of choice (skip lesions occur). Obtain blood cultures BEFORE antibiotics and trend erythrocyte sedimentation rate and C-reactive protein (ESR/CRP).","EMERGENT surgical decompression/drainage for any neurologic deficit or spinal instability — time is cord. Every case warrants a source hunt and echocardiography (echo) for Staphylococcus aureus seeding."],
  empiric:[{set:"Spinal epidural abscess",rx:"Vancomycin (methicillin-resistant Staphylococcus aureus (MRSA)) + ceftriaxone or cefepime (gram-negatives / Pseudomonas by risk)",why:"Staphylococcus aureus causes ~50%; broaden by risk. Hold antibiotics until cultures are obtained if the patient is stable and a biopsy is planned."}],
  definitive:["Pathogen-directed therapy after culture; decompress/drain as needed; treat coexisting vertebral osteomyelitis and the bacteremic source.","Documented methicillin-resistant Staphylococcus aureus: vancomycin ×4–6 weeks ± rifampin (alternatives linezolid or trimethoprim-sulfamethoxazole) (IDSA MRSA 2011)."],
  duration:"At least 6 weeks of effective therapy (longer with vertebral osteomyelitis).",
  pearls:["Decompress a spinal epidural abscess with ANY neurologic deficit — time is cord.","Every spinal epidural abscess deserves a source hunt and echocardiography — Staphylococcus aureus bacteremia is the classic seed.","Image the WHOLE spine (skip lesions) with contrast-enhanced magnetic resonance imaging."],
  consult:["infectious disease (ID) + neurosurgery/spine: timing of decompression, pathogen-directed therapy, source control, and duration."]},

 {id:"tss",name:"Toxic Shock Syndrome & Clostridial Myonecrosis",cat:"Skin, Soft Tissue, and Bone",src:"mksap",src2:"sstiIDSA",
  suspect:["Toxin-mediated shock: fever, diffuse macular erythroderma (later desquamation), hypotension, and multiorgan involvement — the toxin acts as a superantigen.","Staph toxic shock syndrome (TSS): tampons, nasal packing, surgical wounds/packing, burns — often without obvious pus. Strep toxic shock syndrome: complicates skin/soft-tissue infection (especially necrotizing fasciitis) with higher bacteremia and mortality.","Clostridial myonecrosis (gas gangrene): abrupt pain out of proportion, bronze/violaceous skin, bullae, crepitus, rapid shock — trauma (Clostridium perfringens (C. perfringens)) or spontaneous (Clostridium septicum (C. septicum) — think occult colon cancer)."],
  workup:["Clinical diagnosis with shock + organ dysfunction; blood and wound cultures, creatine kinase (CK), lactate. Surgical exploration is both diagnostic and therapeutic for necrotizing/clostridial disease.","Remove the source (tampon, packing); image for tissue gas but do NOT delay the OR for necrotizing infection."],
  empiric:[
   {set:"Streptococcal toxic shock syndrome",rx:"Penicillin + clindamycin; consider intravenous immunoglobulin (IVIG) in refractory shock",why:"Clindamycin suppresses toxin production at high inoculum (Eagle effect); penicillin is definitive for group A strep."},
   {set:"Staphylococcal toxic shock syndrome",rx:"methicillin-susceptible Staphylococcus aureus (MSSA): nafcillin or cefazolin + clindamycin. methicillin-resistant Staphylococcus aureus (MRSA): vancomycin + clindamycin (linezolid is an alternative anti-toxin agent)",why:"Pair the beta-lactam/vancomycin with a protein-synthesis inhibitor for toxin suppression."},
   {set:"Clostridial myonecrosis (gas gangrene)",rx:"Emergent surgical debridement + high-dose penicillin + clindamycin",why:"Source control is life-saving; penicillin + clindamycin (toxin suppression) is the antibiotic backbone."}],
  definitive:["Aggressive source control (debridement, device/packing removal); de-escalate per cultures; supportive intensive care unit (ICU) care."],
  duration:"Pathogen- and source-dependent; continue until debridement is complete and the patient is clinically stable.",
  pearls:["Add clindamycin (or linezolid) for its anti-toxin effect in strep/staph toxic shock — not a beta-lactam alone.","Source control is essential — remove tampons/packing and debride necrotic tissue urgently.","Spontaneous (atraumatic) gas gangrene from Clostridium septicum should trigger a colon-cancer evaluation."],
  consult:["infectious disease (ID) + surgery (and gyn/ear, nose, and throat (ENT) for a retained foreign body) for source control, anti-toxin therapy, and intravenous immunoglobulin decisions."]},

 {id:"rmsf",name:"Rocky Mountain Spotted Fever (Spotted Fever Rickettsiosis)",cat:"Systemic",src:"mksap",src2:"lyme",
  suspect:["Fever and severe headache 2–14 days after a tick bite in an endemic area, then a maculopapular rash spreading from the wrists/ankles to the palms/soles (and centrally). Can be fulminant; the rash is often ABSENT early or in adults.","Don't wait for the rash — the classic triad (fever, rash, tick exposure) is frequently incomplete at presentation."],
  workup:["TREAT EMPIRICALLY on suspicion — acute serology is usually negative early. Confirm with acute + convalescent serology (4-fold rise) or skin-biopsy immunohistochemistry. Expect thrombocytopenia, hyponatremia, and transaminitis."],
  empiric:[{set:"Rocky Mountain spotted fever / spotted fever",rx:"Doxycycline 100 mg twice daily (BID) — start IMMEDIATELY on suspicion at ALL ages, including children",why:"Doxycycline is first-line and life-saving; delay increases mortality and it is correct even in young children (short courses don't stain teeth)."}],
  definitive:["Continue doxycycline; look for Ixodes-borne co-infection (Lyme, anaplasma) where ranges overlap."],
  duration:"Doxycycline for ≥3 days after defervescence, typically 7–14 days.",
  pearls:["Suspect Rocky Mountain spotted fever clinically and give doxycycline NOW — don't wait for the rash or serology; doxycycline is correct even in children.","Rash spreads from wrists/ankles to palms/soles but is often absent early."],
  consult:["infectious disease (ID) for severe/fulminant disease or diagnostic uncertainty."]},

 {id:"ehrlichanaplasma",name:"Ehrlichiosis & Anaplasmosis",cat:"Systemic",src:"mksap",src2:"lyme",
  suspect:["Nonspecific fever, headache, and myalgia 1–2 weeks after a tick bite, usually WITHOUT a rash, with leukopenia, thrombocytopenia, and elevated transaminases.","Ehrlichiosis (Lone Star tick, Ehrlichia chaffeensis) — south-central/southeastern US; Anaplasmosis (Ixodes, Anaplasma phagocytophilum) — upper Midwest/Northeast (shares the Lyme/babesia tick)."],
  workup:["Treat empirically on suspicion. Blood smear may show morulae in leukocytes; confirm with whole-blood polymerase chain reaction (PCR) and acute/convalescent serology. Check for Lyme/babesia co-infection."],
  empiric:[{set:"Ehrlichiosis / anaplasmosis",rx:"Doxycycline 100 mg twice daily (BID)",why:"Doxycycline is first-line and also covers anaplasma co-infection with Lyme."}],
  definitive:["Doxycycline; evaluate for Ixodes co-infection (Lyme, babesia)."],
  duration:"Doxycycline 7–14 days (≥3 days after defervescence).",
  pearls:["Fever + leukopenia + thrombocytopenia + transaminitis after a tick bite, usually WITHOUT a rash = ehrlichiosis/anaplasmosis.","Morulae in leukocytes on the smear are a clue — start doxycycline empirically."],
  consult:["infectious disease (ID) for severe or immunocompromised disease and co-infection management."]},

 {id:"babesia",name:"Babesiosis",cat:"Systemic",src:"mksap",src2:"lyme",
  suspect:["Malaria-like illness (fever, chills, sweats, myalgia) with HEMOLYTIC ANEMIA after Ixodes-tick exposure in the Northeast/upper Midwest; can be transfusion-transmitted.","Severe/fulminant in asplenia, age >50, and immunocompromise (high parasitemia, ARDS, DIC)."],
  workup:["Thin blood smear: intraerythrocytic ring forms and the tetrad 'Maltese cross'; confirm/quantify with Babesia polymerase chain reaction (PCR). Measure parasitemia and check for Lyme/anaplasma co-infection."],
  empiric:[
   {set:"Mild–moderate babesiosis",rx:"Atovaquone + azithromycin",why:"Preferred for mild–moderate disease."},
   {set:"Severe babesiosis",rx:"Clindamycin + quinine; exchange transfusion for very high parasitemia (≥10%) or severe hemolysis/organ failure",why:"Severe disease; exchange transfusion for very high parasitemia."}],
  definitive:["Extended courses (≥6 weeks, with repeat smears) in severely immunocompromised/asplenic patients; treat co-infections."],
  duration:"7–10 days (longer, with repeat smears, in the immunocompromised).",
  pearls:["Hemolytic anemia + tick exposure (or recent transfusion) = babesiosis; asplenic patients can be fulminant.","High parasitemia → consider exchange transfusion."],
  consult:["infectious disease (ID) for severe/immunocompromised disease, high parasitemia (exchange transfusion), and co-infection."]},

 {id:"cocci",name:"Coccidioidomycosis (Valley Fever)",cat:"Respiratory",src:"mksap",
  suspect:["Desert Southwest US (and expanding); the most common symptomatic form is community-acquired pneumonia ± erythema nodosum/arthralgia ('desert rheumatism'). Disseminates (skin, bone, MENINGITIS) in immunocompromise, third-trimester pregnancy, and certain ancestries (Filipino, African)."],
  workup:["Serology (enzyme immunoassay → immunodiffusion/complement fixation; the complement-fixation titer tracks severity) — may be negative early; culture/histopathology shows spherules. Lumbar puncture if meningitis is suspected."],
  empiric:[
   {set:"Mild–moderate immunocompetent pulmonary",rx:"Often NO treatment — observe with follow-up",why:"Most primary pulmonary coccidioidomycosis self-resolves."},
   {set:"Severe/disseminated or high-risk host",rx:"Fluconazole (amphotericin B for severe); coccidioidal MENINGITIS = LIFELONG fluconazole",why:"Azoles for severe/disseminated/at-risk hosts; meningitis requires lifelong suppression."}],
  definitive:["Reverse host factors; prolonged azole courses; monitor complement-fixation titers and azole levels."],
  duration:"Months; coccidioidal meningitis is lifelong fluconazole.",
  pearls:["Mild primary coccidioidomycosis in a healthy host may simply be observed — but coccidioidal MENINGITIS needs lifelong fluconazole.","Erythema nodosum/arthralgia with pneumonia in the desert Southwest is classic."],
  consult:["infectious disease (ID) for severe/disseminated/meningeal disease and azole management."]},

 {id:"blasto",name:"Blastomycosis",cat:"Respiratory",src:"mksap",
  suspect:["Mississippi/Ohio River valleys and the Great Lakes; acute or chronic pneumonia (can mimic malignancy/tuberculosis) PLUS verrucous or ulcerative skin lesions and bone disease. Can disseminate to the central nervous system."],
  workup:["Culture and histopathology (broad-based budding yeast); urine/serum Blastomyces antigen (cross-reacts with Histoplasma)."],
  empiric:[
   {set:"Mild–moderate",rx:"Itraconazole (with a drug level)",why:"Itraconazole is the workhorse azole for non-severe disease."},
   {set:"Severe / central nervous system (CNS) / disseminated",rx:"Liposomal amphotericin B, then step down to an azole (voriconazole/fluconazole for central nervous system disease)",why:"Amphotericin for severe or central nervous system disease, then azole step-down."}],
  definitive:["Azole step-down after amphotericin; monitor itraconazole levels and interactions."],
  duration:"6–12 months (longer for bone/central nervous system disease).",
  pearls:["Pulmonary blastomycosis can mimic cancer or tuberculosis — look for accompanying skin/bone disease.","Broad-based budding yeast on histopathology is the clue."],
  consult:["infectious disease (ID) for severe, central nervous system, or disseminated disease and azole management."]},

 {id:"sporotrichosis",name:"Sporotrichosis",cat:"Skin, Soft Tissue, and Bone",src:"mksap",
  suspect:["'Rose-gardener's' disease: subcutaneous nodules that ulcerate and spread along lymphatics (lymphocutaneous) after thorn/plant/sphagnum-moss inoculation. Pulmonary disease in chronic lung disease/alcohol use; disseminated in immunocompromise."],
  workup:["Culture of tissue/aspirate (most sensitive); histopathology may show cigar-shaped yeast (often sparse)."],
  empiric:[
   {set:"Lymphocutaneous",rx:"Itraconazole for 3–6 months (continue 2–4 weeks after lesions resolve)",why:"Itraconazole is first-line for the common lymphocutaneous form."},
   {set:"Severe / pulmonary / disseminated",rx:"Liposomal amphotericin B, then step down to itraconazole",why:"Amphotericin for severe/disseminated disease."}],
  definitive:["Itraconazole step-down; monitor levels."],
  duration:"3–6 months (lymphocutaneous); longer for severe disease.",
  pearls:["Lymphocutaneous nodules tracking up an extremity after a thorn/plant injury = sporotrichosis.","Itraconazole is first-line; verify a drug level."],
  consult:["infectious disease (ID) for pulmonary/disseminated disease or treatment failure."]},

 {id:"mucormycosis",name:"Mucormycosis",cat:"Respiratory",src:"mksap",
  suspect:["Rhino-orbital-cerebral disease in poorly controlled diabetes (especially diabetic ketoacidosis (DKA)), hematologic malignancy/neutropenia, or iron overload/deferoxamine: facial pain/numbness, a black necrotic nasal/palatal eschar, orbital involvement, and rapid angioinvasion. Pulmonary in the profoundly immunocompromised."],
  workup:["URGENT tissue biopsy: broad, ribbon-like, aseptate (pauci-septate) hyphae with angioinvasion. Imaging to define extent — but do not delay surgery/therapy. A high index of suspicion is essential."],
  empiric:[{set:"Mucormycosis (emergency)",rx:"URGENT wide surgical debridement + liposomal amphotericin B + REVERSE the predisposing condition (correct diabetic ketoacidosis, stop deferoxamine, reduce immunosuppression). Isavuconazole or posaconazole for step-down/salvage",why:"Surgery + amphotericin + host reversal — delay is fatal; echinocandins and voriconazole are NOT active."}],
  definitive:["Step down to isavuconazole/posaconazole after response; repeat surgical debridement as needed."],
  duration:"Prolonged (months), individualized to surgical clearance and immune recovery.",
  pearls:["Mucormycosis is a surgical emergency in a diabetic with diabetic ketoacidosis or a neutropenic host — amphotericin alone will not cure it.","Voriconazole does NOT cover mucorales (a breakthrough mold on voriconazole prophylaxis suggests mucormycosis)."],
  consult:["infectious disease (ID) + surgery (ENT/ophthalmology/neurosurgery) urgently for the combined surgical + antifungal + host-reversal plan."]},

 {id:"malaria",name:"Malaria",cat:"Systemic",src:"mksap",
  suspect:["Malaria is the most common cause of fever in a returning traveler (especially sub-Saharan Africa): fever, headache, myalgia, and gastrointestinal (GI) symptoms, often cyclical — but periodicity is unreliable early.","Plasmodium falciparum (P. falciparum) (and Plasmodium knowlesi (P. knowlesi)) cause severe disease — high parasitemia, cerebral malaria, ARDS, acute kidney injury (AKI), acidosis, hypoglycemia — usually within weeks of return."],
  workup:["Thick and thin blood smears are diagnostic (species + % parasitemia) — repeat every 12–24 h up to 3 times if negative and suspicion persists; rapid antigen tests are adjunctive.","Assess severity: parasitemia ≥5%, impaired consciousness, seizures, shock, acidosis, acute kidney injury, ARDS, DIC, or hypoglycemia = severe (treat as falciparum)."],
  empiric:[
   {set:"Uncomplicated, chloroquine-resistant Plasmodium falciparum (most regions)",rx:"Artemether-lumefantrine (Coartem) OR atovaquone-proguanil",why:"Chloroquine resistance is widespread; artemisinin combinations / atovaquone-proguanil are first-line for uncomplicated falciparum."},
   {set:"Uncomplicated, chloroquine-sensitive species/region",rx:"Chloroquine (or hydroxychloroquine)",why:"Use only where the species/region remains chloroquine-sensitive."},
   {set:"Plasmodium vivax (P. vivax) or Plasmodium ovale (P. ovale)",rx:"Add primaquine (or tafenoquine) for liver hypnozoites AFTER checking G6PD",why:"Radical cure eradicates the dormant liver stage to prevent relapse; contraindicated in G6PD deficiency."},
   {set:"Severe malaria",rx:"intravenous (IV) artesunate (intensive care unit (ICU) admission); treat empirically as falciparum",why:"intravenous artesunate is first-line for severe malaria of any species."}],
  definitive:["Confirm species and clearance; complete radical cure (primaquine/tafenoquine) for vivax/ovale; manage complications."],
  duration:"Regimen-specific (e.g., artemether-lumefantrine 3 days; atovaquone-proguanil 3 days; primaquine 14 days).",
  pearls:["Any returning traveler with fever has malaria until proven otherwise — order thick/thin smears urgently and repeat if negative.","Treat severe malaria with intravenous artesunate; do not rely on chloroquine for falciparum (resistance).","Check G6PD before primaquine/tafenoquine; vivax/ovale need radical cure to clear liver hypnozoites."],
  consult:["infectious disease (ID)/travel medicine for species-directed therapy, severe malaria (intravenous artesunate access), and prophylaxis counseling."]},

 {id:"typhoid",name:"Enteric (Typhoid) Fever",cat:"Gastrointestinal",src:"mksap",src2:"diarrhea",
  suspect:["Returning traveler (especially South Asia) with sustained fever, headache, abdominal pain, relative bradycardia (pulse-temperature dissociation), rose spots, and either constipation or diarrhea. Caused by Salmonella Typhi/Paratyphi."],
  workup:["Blood cultures (higher early yield than stool) plus stool culture for Salmonella Typhi/Paratyphi; bone-marrow culture is the most sensitive if already on antibiotics."],
  empiric:[{set:"Enteric (typhoid) fever",rx:"Ceftriaxone OR azithromycin (carbapenem for extensively drug-resistant (XDR) strains); do NOT use fluoroquinolones empirically",why:"Widespread fluoroquinolone resistance and XDR typhoid (South Asia) — choose by travel region and susceptibility."}],
  definitive:["Tailor to susceptibilities; treat relapse; vaccinate travelers to endemic areas."],
  duration:"~7–14 days (longer for complications/abscess).",
  pearls:["Don't use empiric fluoroquinolones for typhoid — resistance is high and XDR strains circulate; use ceftriaxone or azithromycin.","Relative bradycardia and rose spots are classic clues."],
  consult:["infectious disease (ID)/travel medicine for resistant strains or complications."]},

 {id:"travelersdiarrhea",name:"Travelers' Diarrhea",cat:"Gastrointestinal",src:"mksap",src2:"diarrhea",
  suspect:["Abrupt watery (sometimes bloody) diarrhea during or after travel — usually enterotoxigenic Escherichia coli (E. coli); also Campylobacter, Salmonella, Shigella, norovirus; protozoa if prolonged (>14 days)."],
  workup:["Usually clinical. Test (culture/multiplex polymerase chain reaction (PCR), ova & parasites) if severe, bloody, febrile, prolonged (>14 days → protozoa), or immunocompromised."],
  empiric:[
   {set:"Moderate–severe",rx:"Azithromycin (preferred, especially South/Southeast Asia) or a fluoroquinolone; loperamide adjunct only if NOT dysenteric",why:"Azithromycin covers resistant Campylobacter; avoid antimotility agents in dysentery/suspected STEC."},
   {set:"Mild",rx:"Oral rehydration ± loperamide; antibiotics not required",why:"Most cases are self-limited."}],
  definitive:["For prolonged diarrhea, evaluate protozoa (Giardia, Cryptosporidium, Cyclospora, Entamoeba)."],
  duration:"1–3 days when treated.",
  pearls:["Azithromycin is the preferred drug for South/Southeast Asia (Campylobacter fluoroquinolone resistance).","Avoid antibiotics/antimotility agents when STEC/O157 is possible (bloody diarrhea without fever)."],
  consult:["infectious disease (ID)/travel medicine for prolonged, dysenteric, or immunocompromised cases."]},

 {id:"dengue",name:"Dengue",cat:"Systemic",src:"mksap",
  suspect:["Aedes-borne febrile illness during/after tropical travel: high fever, severe myalgia/arthralgia ('breakbone'), retro-orbital headache, flushing/rash, with leukopenia and thrombocytopenia.","Warning signs of SEVERE dengue appear around defervescence (days 3–7): abdominal pain, persistent vomiting, mucosal bleeding, lethargy, and plasma leakage (rising hematocrit with falling platelets)."],
  workup:["Early: NS1 antigen and/or reverse-transcription polymerase chain reaction (RT-PCR); later: immunoglobulin M (IgM)/immunoglobulin G serology. Serial complete blood count for thrombocytopenia and hemoconcentration."],
  empiric:[
   {set:"Dengue",rx:"Supportive care — careful fluid management and acetaminophen; AVOID nonsteroidal anti-inflammatory drugs (NSAIDs)/aspirin (bleeding risk)",why:"No specific antiviral; meticulous fluid management during the critical phase is lifesaving."},
   {set:"Severe dengue",rx:"Hospitalize for close hemodynamic/fluid management during the critical (defervescence) phase",why:"Plasma leakage and shock occur as the fever breaks."}],
  definitive:["Counsel on mosquito avoidance; a dengue vaccine is available for selected seropositive people in endemic areas."],
  duration:"Self-limited (supportive).",
  pearls:["Avoid nonsteroidal anti-inflammatory drugs/aspirin until dengue is excluded; watch for warning signs as the fever defervesces.","A second (heterotypic) infection carries a higher risk of severe dengue."],
  consult:["infectious disease (ID)/travel medicine for severe dengue or diagnostic uncertainty."]},

 {id:"chikungunya",name:"Chikungunya",cat:"Skin, Soft Tissue, and Bone",src:"mksap",
  suspect:["Aedes-borne febrile illness with prominent, often severe and PROLONGED symmetric polyarthralgia/polyarthritis ± maculopapular rash, during/after tropical travel. Arthritis can persist for months to years."],
  workup:["Reverse-transcription polymerase chain reaction (RT-PCR) in the first ~week, then serology (immunoglobulin M (IgM)/immunoglobulin G). Overlaps with dengue/Zika — co-test for dengue (they co-circulate)."],
  empiric:[{set:"Chikungunya",rx:"Supportive care — fluids and analgesia; nonsteroidal anti-inflammatory drugs once dengue is excluded; manage chronic arthritis symptomatically",why:"No specific antiviral; the main burden is prolonged arthritis."}],
  definitive:["Counsel on mosquito avoidance; a chikungunya vaccine is available for travelers to outbreak areas."],
  duration:"Acute illness self-limited; arthritis may persist for months.",
  pearls:["Persistent or relapsing symmetric polyarthritis after tropical travel suggests chikungunya.","Always co-test for dengue (similar exposure/presentation but different fluid management)."],
  consult:["infectious disease (ID)/rheumatology for persistent post-chikungunya arthritis."]},

 {id:"zika",name:"Zika Virus",cat:"Systemic",src:"mksap",
  suspect:["Usually mild or asymptomatic: low-grade fever, maculopapular rash, conjunctivitis, and arthralgia after travel to an endemic area. The major concerns are TERATOGENICITY (congenital Zika syndrome/microcephaly) and SEXUAL transmission; also associated with Guillain-Barré syndrome."],
  workup:["Reverse-transcription polymerase chain reaction (RT-PCR) of serum/urine (acute) and immunoglobulin M (IgM) serology with confirmatory neutralizing antibodies (cross-reacts with dengue). Test pregnant travelers with possible exposure."],
  empiric:[{set:"Zika",rx:"Supportive care; counsel on preventing sexual transmission and on pregnancy risk",why:"No antiviral — prevention and counseling are central."}],
  definitive:["Pregnancy: fetal ultrasound surveillance and specialist referral. Prevent sexual transmission (condoms) and delay conception after exposure per current guidance."],
  duration:"Self-limited (supportive).",
  pearls:["Zika is teratogenic and sexually transmissible — counsel pregnant travelers and their partners.","Serology cross-reacts with dengue — interpret with confirmatory testing."],
  consult:["infectious disease (ID)/travel medicine and maternal-fetal medicine for exposed pregnant patients."]},

 {id:"yellowfever",name:"Yellow Fever",cat:"Systemic",src:"mksap",
  suspect:["Mosquito-borne febrile illness from sub-Saharan Africa or tropical South America. Classic biphasic course: fever/myalgia/headache → brief remission → a toxic phase with jaundice, hemorrhage, and renal failure (high mortality)."],
  workup:["Serology (immunoglobulin M (IgM)) and/or reverse-transcription polymerase chain reaction (RT-PCR) with compatible endemic exposure; transaminases are markedly elevated in the toxic phase. Report to public health."],
  empiric:[{set:"Yellow fever",rx:"Supportive/intensive care (no specific antiviral)",why:"Management is supportive; the toxic phase carries high mortality."}],
  definitive:["Prevention is a single dose of the live-attenuated yellow fever vaccine (required for entry to many endemic countries) — give ≥10 days before travel; caution in the immunocompromised, pregnant, and elderly."],
  duration:"Self-limited or fatal (supportive care).",
  pearls:["Vaccinate travelers to endemic areas — one dose gives long-lasting protection (live vaccine; avoid in significant immunocompromise/pregnancy).","A biphasic illness with jaundice + hemorrhage after endemic travel suggests the toxic phase."],
  consult:["infectious disease (ID)/travel medicine; public-health reporting."]},

 {id:"brucella",name:"Brucellosis & Zoonotic Infections",cat:"Systemic",src:"mksap",
  suspect:["Brucellosis: undulant fever, sweats, arthralgia/sacroiliitis, and hepatosplenomegaly after unpasteurized dairy, livestock/abattoir contact, or endemic travel (Mediterranean, Middle East, Latin America).","Focal disease: sacroiliitis/spondylitis, epididymo-orchitis, endocarditis (the leading cause of brucellosis death), and neurobrucellosis."],
  workup:["Blood/bone-marrow cultures — alert the lab (slow-growing, biohazard); Brucella serology (a strongly positive titer in the right setting is diagnostic, so biopsy is unnecessary).","Evaluate for focal disease (spine magnetic resonance imaging (MRI), echocardiography) when suspected."],
  empiric:[
   {set:"Uncomplicated brucellosis",rx:"Doxycycline + rifampin, OR doxycycline + an aminoglycoside (streptomycin/gentamicin), for ≥6 weeks",why:"Combination therapy and prolonged duration prevent relapse."},
   {set:"Focal disease (spondylitis, neurobrucellosis, endocarditis)",rx:"Doxycycline + aminoglycoside + rifampin, longer courses; surgery for endocarditis",why:"Triple therapy and extended duration for deep-seated infection."}],
  definitive:["Prolonged combination therapy; monitor for relapse; address the exposure source."],
  duration:"At least 6 weeks (longer for focal/deep infection).",
  pearls:["Brucellosis needs prolonged COMBINATION therapy — monotherapy relapses.","Ask about unpasteurized dairy and animal/abattoir exposure, and warn the lab (biosafety).","Look for focal disease — spondylitis and endocarditis change duration and management."],
  consult:["infectious disease (ID) for regimen selection, focal-disease workup, and endocarditis/neurobrucellosis management."]},

 {id:"anthrax",name:"Anthrax (Bacillus anthracis)",cat:"Respiratory",src:"mksap",
  suspect:["Inhalational anthrax: malaise, fever, cough, dyspnea, and chest pain with a WIDENED MEDIASTINUM (hemorrhagic mediastinitis) — any inhalational anthrax is bioterrorism until proven otherwise. Cutaneous anthrax: a painless black eschar with marked edema. Also gastrointestinal and injection forms. Report immediately to public health."],
  workup:["Blood/lesion Gram stain (gram-positive 'boxcar' rods) and culture, specific polymerase chain reaction (PCR); chest imaging for mediastinal widening; lumbar puncture if meningitis is suspected (hemorrhagic). Alert the laboratory (biosafety)."],
  empiric:[
   {set:"Systemic anthrax",rx:"Ciprofloxacin (or doxycycline) PLUS at least one other agent; ADD antitoxin (raxibacumab/obiltoxaximab) and broaden (e.g., meropenem + linezolid) for anthrax meningitis",why:"Multidrug therapy + antitoxin for systemic/meningeal disease."},
   {set:"Post-exposure prophylaxis",rx:"Ciprofloxacin or doxycycline + anthrax vaccine",why:"Prolonged prophylaxis (up to 60 days) plus vaccination after inhalational exposure."}],
  definitive:["Public-health-directed management; complete the prolonged course after exposure."],
  duration:"Systemic disease ~2–3 weeks+; post-exposure prophylaxis up to 60 days (with vaccination).",
  pearls:["Inhalational anthrax = widened mediastinum; treat with multidrug therapy ± antitoxin and notify public health immediately.","Cutaneous anthrax: a painless black eschar — still give systemic antibiotics."],
  consult:["infectious disease (ID) + public health/Centers for Disease Control and Prevention (CDC) for confirmation, antitoxin/vaccine access, and prophylaxis."]},

 {id:"plague",name:"Plague (Yersinia pestis)",cat:"Systemic",src:"mksap",
  suspect:["Bubonic plague: a tender regional lymph node (bubo) + fever after a flea bite/rodent exposure (endemic Southwest US). Pneumonic plague: fulminant pneumonia that spreads PERSON-TO-PERSON by respiratory droplets — a bioterrorism concern. Septicemic plague: shock/DIC. Report immediately."],
  workup:["Gram/Wright stain (bipolar 'safety-pin' gram-negative coccobacilli) and culture of blood/bubo aspirate/sputum; specific polymerase chain reaction (PCR). Droplet precautions for pneumonic plague. Alert the laboratory."],
  empiric:[
   {set:"Plague",rx:"Streptomycin or gentamicin (first-line for severe); ciprofloxacin/levofloxacin or doxycycline as alternatives",why:"An aminoglycoside is preferred for severe disease."},
   {set:"Post-exposure prophylaxis (pneumonic exposure)",rx:"A fluoroquinolone or doxycycline ×7 days",why:"Prophylaxis for close contacts of pneumonic plague."}],
  definitive:["Public-health-directed; isolate pneumonic cases (droplet)."],
  duration:"10–14 days treatment; 7 days post-exposure prophylaxis.",
  pearls:["Pneumonic plague spreads person-to-person — droplet isolation + prophylaxis of contacts.","An aminoglycoside (streptomycin/gentamicin) is first-line for severe disease."],
  consult:["infectious disease (ID) + public health for confirmation, isolation, and prophylaxis."]},

 {id:"tularemia",name:"Tularemia (Francisella tularensis)",cat:"Skin, Soft Tissue, and Bone",src:"mksap",
  suspect:["Abrupt fever with an ULCEROGLANDULAR lesion (skin ulcer + regional lymphadenopathy) after a tick/deerfly bite or handling rabbits/rodents; pneumonic form after aerosol exposure (bioterrorism). Very low infectious dose. Report to public health."],
  workup:["Serology (the usual diagnosis) and specific polymerase chain reaction (PCR); culture is hazardous — ALERT the laboratory (biosafety) before submitting specimens."],
  empiric:[
   {set:"Tularemia",rx:"Streptomycin or gentamicin (first-line for severe); ciprofloxacin or doxycycline as alternatives",why:"An aminoglycoside is preferred for severe disease."},
   {set:"Post-exposure prophylaxis",rx:"A fluoroquinolone or doxycycline",why:"For a known high-risk aerosol exposure."}],
  definitive:["Public-health-directed management."],
  duration:"Aminoglycoside 7–10 days; fluoroquinolone/doxycycline 14–21 days.",
  pearls:["Ulceroglandular fever after rabbit/rodent or tick exposure = tularemia; warn the lab (very low infectious dose, biohazard).","Aminoglycoside first-line; doxycycline/fluoroquinolone for prophylaxis/alternatives."],
  consult:["infectious disease (ID) + public health for confirmation and prophylaxis."]},

 {id:"botulism",name:"Botulism (Clostridium botulinum toxin)",cat:"Neurological",src:"mksap",
  suspect:["AFEBRILE, symmetric, DESCENDING flaccid paralysis with prominent bulbar signs (diplopia, dysarthria, dysphagia, ptosis) and a clear sensorium; foodborne (home-canned), wound (injection drug use), or intentional aerosol (bioterrorism). Infant botulism: a 'floppy baby' (honey). A cluster of descending paralysis suggests an outbreak — report immediately."],
  workup:["Clinical diagnosis — do not delay antitoxin for tests. Confirm with a toxin assay (serum/stool/food) at a public-health laboratory; electromyography (EMG) supports. Notify public health."],
  empiric:[{set:"Botulism",rx:"Equine botulinum ANTITOXIN as EARLY as possible + meticulous supportive care (monitor respiratory function; intubate/ventilate for respiratory failure). Infant botulism: human-derived botulism immune globulin (BIG-IV)",why:"Antitoxin halts progression but does NOT reverse existing paralysis — give early."}],
  definitive:["Supportive/ventilatory care until recovery; debride wounds and add antibiotics for wound botulism (AVOID aminoglycosides — they worsen the neuromuscular block)."],
  duration:"Prolonged supportive care/ventilation (weeks); antitoxin is a single course.",
  pearls:["Give antitoxin EARLY — it stops progression but won't reverse paralysis already present.","Botulism is afebrile with a clear sensorium and DESCENDING paralysis (vs ascending Guillain-Barré)."],
  consult:["Public health/Centers for Disease Control and Prevention (CDC) for antitoxin release; critical care for ventilatory support."]},

 {id:"smallpox",name:"Smallpox (Variola)",cat:"Skin, Soft Tissue, and Bone",src:"mksap",
  suspect:["Eradicated naturally — any case is bioterrorism. Prodrome of high fever and prostration, then a SYNCHRONOUS (all lesions in the same stage) centrifugal vesiculopustular rash involving the palms/soles (contrast with the asynchronous, centripetal rash of varicella). Report immediately and isolate."],
  workup:["Polymerase chain reaction (PCR) at a public-health/Centers for Disease Control and Prevention (CDC) laboratory; airborne + contact precautions in a negative-pressure room. Do NOT sample without authorization."],
  empiric:[{set:"Smallpox",rx:"Supportive care + tecovirimat (antiviral); vaccinate contacts (vaccinia) post-exposure (effective up to ~4 days)",why:"Tecovirimat for disease; ring vaccination controls spread."}],
  definitive:["Public-health-directed; strict isolation and ring vaccination of contacts."],
  duration:"Self-limited or fatal; isolate until all scabs separate.",
  pearls:["A synchronous, centrifugal vesiculopustular rash involving palms/soles distinguishes smallpox from varicella (asynchronous, centripetal).","Airborne + contact isolation and immediate public-health notification; vaccinate contacts."],
  consult:["Public health/Centers for Disease Control and Prevention (CDC) immediately for confirmation, tecovirimat, and vaccination."]},

 {id:"vhf",name:"Viral Hemorrhagic Fever (Ebola, Marburg, Lassa)",cat:"Systemic",src:"mksap",
  suspect:["Fever with bleeding/coagulopathy, capillary leak, and shock in a traveler from an endemic area (or a bioterrorism scenario). Ebola/Marburg (filovirus), Lassa (arenavirus), and others — high case-fatality and high person-to-person transmissibility. Take a travel/contact history; report immediately and isolate."],
  workup:["Specific polymerase chain reaction (PCR)/serology at a designated high-containment (biosafety level 4) laboratory. Use strict contact + droplet (and agent-specific) precautions in a designated isolation unit; protect staff."],
  empiric:[{set:"Viral hemorrhagic fever",rx:"Aggressive supportive/critical care (fluids, electrolytes, organ support); agent-specific therapy where available (monoclonal antibodies for Ebola; ribavirin for Lassa/some arenaviruses)",why:"Supportive care is central; specific antivirals/antibodies exist for some agents."}],
  definitive:["Public-health-directed management, contact tracing, and isolation; vaccination where available (e.g., Ebola)."],
  duration:"Agent-specific; isolate per protocol.",
  pearls:["Fever + bleeding/shock after travel to an endemic area → isolate immediately and call public health; protect healthcare workers.","Ribavirin helps Lassa and some arenaviruses; Ebola has specific monoclonal-antibody therapy and a vaccine."],
  consult:["Public health/Centers for Disease Control and Prevention (CDC) and a designated high-containment unit; infectious disease (ID) + critical care."]},

 {id:"giardia",name:"Giardiasis",cat:"Gastrointestinal",src:"mksap",src2:"diarrhea",
  suspect:["Prolonged greasy, malodorous diarrhea with bloating, flatulence, and malabsorption/weight loss after contaminated fresh water (camping/'beaver fever'), travel, daycare, or oral-anal exposure."],
  workup:["Stool Giardia antigen or multiplex gastrointestinal polymerase chain reaction (PCR) (more sensitive than ova & parasites); send multiple stool samples if using microscopy."],
  empiric:[{set:"Giardiasis",rx:"Tinidazole (single dose) OR metronidazole; nitazoxanide is an alternative",why:"Highly effective; tinidazole is a convenient single dose."}],
  definitive:["Treat symptomatic infection; address the water/exposure source."],
  duration:"Tinidazole single dose; metronidazole 5–7 days.",
  pearls:["Greasy, malodorous diarrhea with bloating after fresh-water exposure = giardia.","Antigen/polymerase chain reaction is more sensitive than stool microscopy."],
  consult:["infectious disease (ID)/gastrointestinal for refractory or relapsing disease."]},

 {id:"cryptosporidium",name:"Cryptosporidiosis",cat:"Gastrointestinal",src:"mksap",src2:"diarrhea",
  suspect:["Watery diarrhea after recreational/contaminated water (chlorine-resistant — classic pool outbreaks) — self-limited in the immunocompetent but SEVERE/CHRONIC in advanced human immunodeficiency virus (HIV) (low CD4) and other immunocompromise."],
  workup:["Stool Cryptosporidium antigen or multiplex gastrointestinal polymerase chain reaction (PCR); modified acid-fast stain shows oocysts."],
  empiric:[
   {set:"Immunocompetent",rx:"Nitazoxanide + rehydration",why:"Usually self-limited; nitazoxanide shortens illness."},
   {set:"Advanced human immunodeficiency virus",rx:"Start/optimize antiretroviral therapy (ART) — immune restoration is the key treatment (± nitazoxanide)",why:"Restoring CD4 count is the most effective therapy in advanced human immunodeficiency virus."}],
  definitive:["Immune restoration in human immunodeficiency virus; supportive care."],
  duration:"Nitazoxanide 3 days (immunocompetent); ongoing in human immunodeficiency virus until immune recovery.",
  pearls:["Cryptosporidiosis in advanced human immunodeficiency virus is controlled mainly by starting antiretroviral therapy (immune restoration).","Chlorine-resistant — a classic cause of swimming-pool diarrhea outbreaks."],
  consult:["infectious disease (ID) for severe/chronic disease in the immunocompromised."]},

 {id:"cyclospora",name:"Cyclosporiasis",cat:"Gastrointestinal",src:"mksap",src2:"diarrhea",
  suspect:["Prolonged, relapsing watery diarrhea with anorexia and fatigue — classically after imported fresh produce (berries, basil, cilantro) or travel."],
  workup:["Stool ova & parasites with modified acid-fast stain (oocysts autofluoresce) or multiplex gastrointestinal polymerase chain reaction (PCR); request Cyclospora specifically — routine testing can miss it."],
  empiric:[{set:"Cyclosporiasis",rx:"trimethoprim-sulfamethoxazole (TMP-SMX)",why:"First-line; consider in prolonged diarrhea after imported fresh produce."}],
  definitive:["trimethoprim-sulfamethoxazole; longer/suppressive courses in human immunodeficiency virus."],
  duration:"trimethoprim-sulfamethoxazole 7–10 days (longer in immunocompromise).",
  pearls:["Prolonged watery diarrhea after imported berries/produce → think Cyclospora and treat with trimethoprim-sulfamethoxazole.","Request the specific stain/polymerase chain reaction — routine testing misses it."],
  consult:["infectious disease (ID) for refractory or immunocompromised disease."]},

 {id:"amebiasis",name:"Amebiasis (Entamoeba histolytica)",cat:"Gastrointestinal",src:"mksap",src2:"diarrhea",
  suspect:["Subacute bloody diarrhea/dysentery with abdominal pain after travel to/residence in an endemic area; can cause an AMEBIC LIVER ABSCESS (right-upper-quadrant pain + fever + travel, often without diarrhea)."],
  workup:["Stool Entamoeba histolytica antigen or polymerase chain reaction (PCR) (distinguishes pathogenic E. histolytica from non-pathogenic E. dispar); serology is positive in invasive/liver disease; imaging for a liver abscess."],
  empiric:[
   {set:"Invasive amebiasis (colitis or liver abscess)",rx:"Metronidazole or tinidazole (tissue amebicide) FOLLOWED BY a luminal agent (paromomycin) to clear cysts",why:"Always follow the tissue agent with a luminal agent to eradicate intraluminal cysts."},
   {set:"Asymptomatic cyst passer",rx:"A luminal agent alone (paromomycin)",why:"Eradicate cysts to prevent transmission/invasive disease."}],
  definitive:["A large or refractory liver abscess may need drainage; otherwise metronidazole usually suffices without drainage."],
  duration:"Metronidazole 7–10 days, then paromomycin 7 days.",
  pearls:["Always follow tissue treatment of amebiasis with a luminal agent (paromomycin), and treat asymptomatic cyst passers.","An amebic liver abscess usually responds to metronidazole without drainage unless large or not improving."],
  consult:["infectious disease (ID)/gastrointestinal for invasive amebiasis and liver-abscess management."]},

 {id:"transplant",name:"Infections in Transplant Recipients (timeline)",cat:"Other",src:"mksap",src2:"icvax",
  suspect:["Immunosuppressed solid-organ or hematopoietic stem cell transplant recipient with fever or new symptoms; immunosuppression blunts classic signs — keep a broad differential and a high index of suspicion."],
  workup:["Anchor the differential to TIME since transplant and net immunosuppression; review prophylaxis, donor/recipient serologies (cytomegalovirus (CMV), Epstein-Barr virus (EBV)), and exposures.","Comprehensive cultures and pathogen-specific testing (cytomegalovirus polymerase chain reaction (PCR), galactomannan/β-D-glucan, respiratory viral panel); image by symptoms."],
  treatWhen:[
   "EARLY (<1 month): mostly nosocomial — surgical-site/wound, line, catheter-associated urinary tract infection (UTI), donor-derived infection, and reactivation (herpes simplex virus (HSV)); opportunistic infections are uncommon this early.",
   "INTERMEDIATE (1–6 months): peak opportunistic risk — cytomegalovirus, Pneumocystis (Pneumocystis jirovecii pneumonia (PJP)), invasive fungal (Aspergillus, endemic), Nocardia, reactivation tuberculosis (TB), BK virus, Listeria; prophylaxis (trimethoprim-sulfamethoxazole (TMP-SMX), valganciclovir) shifts the timing.",
   "LATE (>6 months): community-acquired infections predominate; opportunistic infections persist in those with chronic rejection or augmented immunosuppression."
  ],
  empiric:[
   {set:"Febrile transplant recipient",rx:"Broad empiric antibacterials by syndrome/severity with EARLY infectious disease (ID) involvement; tailor to timeline and prophylaxis; add antiviral/antifungal coverage by risk",why:"The post-transplant timeline plus net immunosuppression drive the differential and empiric choices."}],
  definitive:["Pathogen-directed therapy with transplant-team adjustment of immunosuppression; cytomegalovirus → ganciclovir/valganciclovir; Pneumocystis jirovecii pneumonia → trimethoprim-sulfamethoxazole; invasive mold → voriconazole/isavuconazole."],
  duration:"Pathogen-specific; opportunistic-infection prophylaxis per transplant protocols.",
  pearls:["Match the infection to the post-transplant timeline: nosocomial early, opportunistic at 1–6 months, community-acquired late.","Prophylaxis (trimethoprim-sulfamethoxazole for Pneumocystis jirovecii pneumonia, valganciclovir for cytomegalovirus) delays or prevents the classic 1–6 month opportunistic infections.","Immunosuppression masks signs — fever may be the only clue; involve infectious disease and the transplant team early.","Vaccinate BEFORE transplant when possible (live vaccines ≥4 weeks before); after transplant, re-immunize on schedule and give live vaccines (MMR, varicella) only ≥24 months out if off immunosuppression and graft-versus-host disease (GVHD)-free (see Vaccination of the Immunocompromised Host)."],
  consult:["infectious disease + transplant team for timeline-based workup, immunosuppression adjustment, and prophylaxis."]},
