  duration:"4 days after adequate source control (STOP-IT trial) for complicated intra-abdominal infection; longer if source control is inadequate.",
  pearls:["Source control timing/adequacy drives duration — once controlled, 4 days suffices (STOP-IT).","Culture the source at intervention — superficial/swab cultures mislead. Blood cultures are not routine for community intra-abdominal infection (Infectious Diseases Society of America 2024).","Colonoscopy 6–8 weeks after an episode (especially complicated disease or a first episode) to exclude colorectal malignancy.","Selected mild uncomplicated diverticulitis can be managed WITHOUT antibiotics. For prevention favor a high-fiber diet and avoid non-aspirin NSAIDs; mesalamine, rifaximin, and probiotics do NOT prevent recurrence."],
  consult:["Confirm source control adequacy and shorten duration accordingly; assess need for enterococcal/antifungal coverage."]},

 {id:"cdiff",name:"Clostridioides difficile Infection",cat:"Gastrointestinal",src:"cdiff",
  suspect:["≥3 unformed stools/24h + risk (recent antibiotics, healthcare exposure, PPI). Test only symptomatic patients (don't test formed stool / test of cure)."],
  workup:["Test only symptomatic patients (≥3 unformed stools/24h): nucleic acid amplification test (NAAT) plus toxin, or a glutamate dehydrogenase (GDH) + toxin algorithm — a toxin-based multistep algorithm is preferred when stool submission is not restricted (NAAT alone detects carriage). Do NOT repeat-test within 7 days or test for cure.","Severity (2017): SEVERE = white blood cell count (WBC) ≥15,000 cells/µL OR serum creatinine >1.5 mg/dL (absolute value, not 1.5× baseline); FULMINANT = hypotension/shock, ileus, or megacolon.","Stop the inciting antibiotic as soon as possible and avoid antiperistaltics; start empiric therapy before laboratory confirmation if there is a substantial testing delay or fulminant disease."],
  empiric:[
   {set:"Initial episode — non-severe OR severe",rx:"Fidaxomicin 200 mg by mouth (PO) twice daily (BID) ×10d (preferred) OR Vancomycin 125 mg by mouth four times daily (QID) ×10d. If neither is available (non-severe only): metronidazole 500 mg by mouth three times daily (TID) ×10d",why:"2017/2021 Infectious Diseases Society of America (IDSA)-Society for Healthcare Epidemiology of America (SHEA): oral vancomycin or fidaxomicin first-line; metronidazole is only a fallback for non-severe disease (avoid repeated/prolonged courses — irreversible neurotoxicity)."},
   {set:"Fulminant (hypotension/shock, ileus, megacolon)",rx:"Vancomycin 500 mg by mouth/NG four times daily + Metronidazole 500 mg intravenous (IV) every 8 hours (q8h); add rectal vancomycin (500 mg in ~100 mL normal saline per rectum every 6 hours) if ileus. Early surgical consult — subtotal colectomy (preserve the rectum) OR diverting loop ileostomy with colonic lavage + antegrade vancomycin",why:"High-dose oral/rectal vancomycin (vanc) + intravenous metronidazole; operate before lactate is very high or multiorgan failure develops."},
   {set:"First recurrence",rx:"Fidaxomicin 200 mg BID ×10d; OR a prolonged tapered-and-pulsed vancomycin regimen (if a standard course was used initially); OR vancomycin 125 mg QID ×10d (if metronidazole was used initially). Consider adding bezlotoxumab in high-risk patients",why:"Don't simply repeat an identical standard course; bezlotoxumab (anti-toxin B monoclonal) reduces further recurrence."},
   {set:"Second or subsequent recurrence",rx:"Tapered-and-pulsed vancomycin; OR vancomycin 125 mg QID ×10d THEN rifaximin 400 mg TID ×20d; OR fidaxomicin; OR fecal microbiota transplantation (FMT)",why:"FMT is recommended after appropriate antibiotic treatment of ≥2 recurrences (i.e., a 3rd episode)."}],
  definitive:["Treat the episode; do not 'test of cure'. by mouth vancomycin is for Clostridioides difficile infection (CDI) only (not absorbed)."],
  duration:"10 days (prolonged taper/pulse for recurrences).",
  pearls:["intravenous vancomycin does NOT treat Clostridioides difficile infection — must be oral or per rectum.","Contact precautions (gown + gloves) and soap-and-water hand hygiene (alcohol doesn't kill spores); continue precautions ≥48h after diarrhea resolves.","Highest-risk antibiotics are fluoroquinolones, clindamycin, and cephalosporins — restrict these and stop the inciting agent; proton pump inhibitors (PPIs) are associated but should not be stopped solely to prevent Clostridioides difficile infection.","Don't test infants ≤12 months (high asymptomatic carriage), asymptomatic patients, or for cure."],
  consult:["Confirm severity classification, recurrence strategy (FMT/bezlotoxumab), and isolation."]},

 {id:"diarrhea",name:"Infectious Diarrhea",cat:"Gastrointestinal",src:"diarrhea",
  suspect:["Acute (<14d) watery vs inflammatory (fever, blood, mucus, tenesmus). Note travel, food, animals, antibiotics, immune status."],
  workup:["Most acute watery diarrhea is self-limited — rehydrate, no testing/antibiotics.","Test (stool culture and/or multiplex molecular panel, + Clostridioides difficile) if: dysentery, severe/hospitalized, fever, immunocompromise, >7 days, or public-health concern. Reflex-CULTURE any positive culture-independent (molecular) test so an isolate is available for susceptibility and public-health subtyping.","Obtain BLOOD cultures in infants <3 months, signs of sepsis/systemic infection, suspected enteric fever, immunocompromise, or high-risk hosts (e.g., hemolytic anemia/hemoglobinopathy → Salmonella risk).","If a Shiga-toxin-producing organism is suspected, use testing that detects Shiga toxin (or its genes) AND distinguishes Escherichia coli (E. coli) O157 from non-O157 STEC; AVOID empiric antibiotics (↑hemolytic uremic syndrome (HUS) risk) and monitor for HUS."],
  empiric:[
   {set:"Most cases",rx:"Reduced-osmolarity oral rehydration solution (ORS); no antibiotics",why:"Self-limited; antibiotics rarely change course and may harm."},
   {set:"Severe/febrile dysentery, traveler's",rx:"Azithromycin 500 mg ×3d (preferred for traveler's/Campylobacter) or ciprofloxacin (resistance rising); children — a 3rd-gen cephalosporin or azithromycin",why:"Empiric only with inflammatory features/systemic illness; choose by local susceptibility and travel region."}],
  definitive:["Pathogen-directed. Do NOT give antibiotics for suspected STEC/O157 (HUS risk). Treat Giardia (tinidazole/metronidazole), etc."],
  duration:"Typically 3 days when treated.",
  pearls:["Bloody diarrhea + no fever → consider STEC; avoid antibiotics and antimotility agents.","Send Clostridioides difficile (C. difficile) if recent antibiotics/healthcare exposure.","Antimotility (loperamide) may be used in immunocompetent ADULTS with watery diarrhea, but NOT in children <18 and NOT with fever/dysentery or suspected Shiga-toxin Escherichia coli (toxic-megacolon/HUS risk). Probiotics may shorten symptoms in immunocompetent patients; zinc shortens diarrhea in young children (resource-limited settings).","Non-typhoidal Salmonella: do NOT treat uncomplicated cases (prolongs shedding); DO treat if severe, <12 months or >50 with atherosclerosis, immunocompromised, prosthetic material, or bacteremic (endovascular seeding risk).","Campylobacter: azithromycin is first-line (rising fluoroquinolone resistance); associated with Guillain-Barré and reactive arthritis. Shigella: very low infectious dose — azithromycin/ciprofloxacin and strict hygiene.","Vibrio: cholera is managed with aggressive rehydration; Vibrio vulnificus (V. vulnificus) causes fulminant wound infection/sepsis after raw oysters or seawater in liver disease/hemochromatosis → doxycycline + a 3rd-gen cephalosporin and surgical debridement.","Toxin-mediated food poisoning (preformed toxin): Staphylococcus aureus (S. aureus) and Bacillus cereus (B. cereus) cause vomiting within 1–6 h; Clostridium perfringens (C. perfringens) causes watery diarrhea ~8–16 h — all are self-limited and supportive (no antibiotics)."],
  consult:["Mostly outpatient; consult for immunocompromised, persistent, or systemic disease."]},

 {id:"sinusitis",name:"Acute Bacterial Rhinosinusitis",cat:"Respiratory",src:"sinus",src2:"sinusIDSA",
  suspect:["Bacterial favored if: symptoms ≥10 days without improvement, OR severe (fever ≥39, purulence, facial pain) ≥3–4 days, OR 'double-worsening' after initial improvement."],
  workup:["Clinical diagnosis — no imaging for uncomplicated disease. For suspected suppurative complications (orbital/intracranial extension), get contrast-enhanced computed tomography (CT) (axial + coronal views).","For treatment failure, culture by sinus aspiration or endoscopically-guided middle-meatus sampling — NOT a nasopharyngeal swab (unreliable)."],
  empiric:[
   {set:"First-line",rx:"Amoxicillin-clavulanate 875/125 twice daily (BID) (or high-dose 2000/125 twice daily)",why:"Covers Streptococcus pneumoniae (S. pneumoniae), Haemophilus influenzae (H. influenzae), Moraxella catarrhalis (M. catarrhalis) incl beta-lactamase producers. Use HIGH-DOSE (2 g twice daily in adults; 90 mg/kg/day in children) for: regions with ≥10% penicillin-nonsusceptible pneumococcus, severe infection, daycare attendance, age <2 or >65, recent hospitalization, antibiotics within the past month, or immunocompromise. A beta-lactam is preferred over a respiratory fluoroquinolone first-line, and routine Staphylococcus aureus (S. aureus)/methicillin-resistant Staphylococcus aureus (MRSA) coverage is NOT recommended."},
   {set:"Penicillin allergy",rx:"Doxycycline, or respiratory fluoroquinolone (FQ) (levofloxacin/moxifloxacin)",why:"Macrolides/trimethoprim-sulfamethoxazole (TMP-SMX) have high pneumococcal resistance — not preferred."}],
  definitive:["Most acute sinusitis is viral — give antibiotics only when bacterial criteria are met; watchful waiting is acceptable for mild/moderate disease.","Reassess if symptoms WORSEN after 48–72 h or fail to improve after 3–5 days on first-line therapy → consider resistant pathogens, a non-infectious cause, or a structural problem; broaden and/or culture.","Adjuncts: intranasal saline irrigation; intranasal corticosteroids (mainly with a history of allergic rhinitis); analgesics for pain. Decongestants and antihistamines are NOT recommended."],
  duration:"5–7 days (adults); 10–14 days (children).",
  pearls:["Don't reflexively prescribe antibiotics — most acute sinusitis is viral.","About 10–12% of maxillary sinusitis is odontogenic — think a dental source with unilateral maxillary symptoms or tooth pain, and treat the tooth.","Refer/image urgently for suppurative complications: orbital cellulitis (proptosis, painful/limited eye movements, vision change), cavernous sinus thrombosis, Pott's puffy tumor (frontal-bone osteomyelitis), or intracranial extension (severe headache, altered mental status, focal deficits)."],
  consult:["Rarely infectious disease (ID); involve ear, nose, and throat for complications or recurrent/chronic disease."]},

 {id:"pharyngitis",name:"Pharyngitis (Group A Strep)",cat:"Respiratory",src:"cap",
  suspect:["Sore throat; use Centor/McIsaac to estimate group A Streptococcus (GAS) probability and guide testing (see Scores)."],
  workup:["Centor/McIsaac score → rapid antigen detection test (RADT) ± culture for intermediate scores; don't test/treat very low scores. Avoid testing if viral features (cough, coryza, oral ulcers).",""],
  empiric:[
   {set:"Confirmed group A Streptococcus",rx:"Penicillin V 500 mg twice daily (BID)–three times daily (TID) or Amoxicillin 500 mg twice daily ×10d",why:"group A Streptococcus remains universally penicillin-susceptible; treatment prevents rheumatic fever & suppurative complications."},
   {set:"Penicillin allergy",rx:"Cephalexin (non-anaphylactic), azithromycin, or clindamycin",why:"Macrolide resistance possible; cephalexin if tolerated."}],
  definitive:["Treat only test-positive (or high pretest) patients to limit unnecessary antibiotics.",""],
  duration:"10 days (penicillin/amoxicillin).",
  pearls:["Consider peritonsillar abscess (trismus, 'hot potato' voice, uvular deviation) and Lemierre's (septic IJ thrombophlebitis) in toxic patients."],
  consult:["Rarely infectious disease (ID); ear, nose, and throat for abscess/airway concerns."]},

 {id:"tb",name:"Tuberculosis (Diagnosis & Treatment)",cat:"Respiratory",src:"tb",src2:"tbtx",
  suspect:["Cough >2–3 wk, fever, night sweats, weight loss, hemoptysis; risk: endemic exposure, human immunodeficiency virus (HIV), immunosuppression, homelessness, incarceration."],
  workup:["AIRBORNE isolation immediately. chest radiograph (CXR) (upper-lobe cavitation, reactivation). Collect 3 sputum specimens (5–10 mL each; use sputum induction or bronchoscopy if unable to expectorate) for acid-fast bacilli (AFB) smear, mycobacterial culture, and a nucleic acid amplification test (NAAT). Send BOTH liquid and solid cultures — culture is the gold standard.","NAAT on the initial specimen: in a smear-POSITIVE patient a negative NAAT makes tuberculosis unlikely; in a smear-NEGATIVE patient with intermediate-to-high suspicion a positive NAAT is presumptive tuberculosis, but a negative NAAT does NOT exclude it. NAAT also gives early rifampin-resistance data.","interferon-gamma release assay (IGRA) is preferred over the tuberculin skin test (TST) for latent tuberculosis (TB) — especially with prior BCG or if the patient is unlikely to return — and is for LATENT, not active, diagnosis.","human immunodeficiency virus (HIV) testing in ALL; drug-susceptibility testing on the culture isolate. If clinical/radiographic suspicion is high, START treatment even when smears are negative — culture-negative tuberculosis is still treated."],
  empiric:[{set:"Active pulmonary tuberculosis (drug-susceptible)",rx:"RIPE: Rifampin + Isoniazid (+B6) + Pyrazinamide + Ethambutol ×2 mo → isoniazid (INH) + Rifampin ×4 mo",why:"Standard 6-month regimen given by directly observed therapy (DOT; 5–7 days/week). Pyridoxine (vitamin B6) 25–50 mg/day with isoniazid for those at risk of neuropathy (pregnancy, HIV, diabetes, alcoholism, renal failure, malnutrition). Ethambutol can be stopped once the isolate is confirmed susceptible to isoniazid + rifampin. Adjust per susceptibilities & site."}],
  definitive:["Directly observed therapy (DOT) preferred. Manage with/through public health. Monitor sputum cultures monthly until 2 consecutive are negative.","EXTEND the continuation phase to 7 months (total 9 months) if there is cavitation on the initial chest radiograph AND a positive culture at 2 months.","Extrapulmonary: tuberculous MENINGITIS → 9–12 months PLUS adjunctive dexamethasone or prednisolone tapered over 6–8 weeks (mortality benefit); bone/joint/spinal → 6–9 months. Adjunctive corticosteroids are NOT routinely recommended for tuberculous PERICARDITIS.","HIV co-infection: start antiretroviral therapy (ART) within 2 weeks if CD4 <50 and by 8–12 weeks if CD4 ≥50 — EXCEPT in tuberculous meningitis, where early ART is NOT recommended (more adverse events). Avoid intermittent (twice-weekly) regimens in HIV.","Latent tuberculosis: isoniazid 9 months, isoniazid + rifapentine weekly ×3 months, or rifampin 4 months.","Hold hepatotoxic drugs for alanine aminotransferase (ALT) ≥3× the upper limit of normal WITH symptoms or ≥5× WITHOUT symptoms; watch for paradoxical worsening / immune reconstitution inflammatory syndrome (IRIS) — usually continue tuberculosis therapy, adding corticosteroids for severe cases."],
  duration:"6 months (drug-susceptible pulmonary); 9 months if cavitary + positive 2-month culture; central nervous system (CNS) 9–12 months; bone/joint/spinal 6–9 months; longer for multidrug-resistant (MDR).",
  pearls:["Isolate first, diagnose second — protect staff/patients.","Always test for human immunodeficiency virus; co-treatment has drug-interaction/immune reconstitution inflammatory syndrome (IRIS) considerations.","Adjunctive corticosteroids: YES for tuberculous meningitis (mortality benefit), NOT routine for pericarditis.","Cavitation on the initial film + a positive culture at 2 months → extend to a total of 9 months (a classic decision point).","Report to public health; arrange contact investigation."],
  consult:["infectious disease (ID) + public health co-management; confirm regimen, directly observed therapy, monitoring (liver function tests (LFTs), vision on ethambutol)."]},

 {id:"hiv",name:"Newly Diagnosed human immunodeficiency virus (HIV)",cat:"Systemic",src:"hiv",src2:"hivckd",
  suspect:["Screen everyone aged ≥13 at least once, more often with ongoing risk, and every pregnancy; offer pre-exposure prophylaxis (PrEP) to HIV-negative people at risk.","Positive 4th-gen Ag/Ab screen → confirmatory differentiation assay (+ RNA if acute suspected — viral load is very high in acute infection). Acute retroviral syndrome: mononucleosis-like illness (fever, rash, pharyngitis, lymphadenopathy, myalgia)."],
  workup:["Confirm with human immunodeficiency virus-1/2 differentiation immunoassay; if acute, human immunodeficiency virus RNA.","Baseline: CD4, human immunodeficiency virus RNA viral load, genotype resistance, HLA-B*5701 (if abacavir considered), complete blood count (CBC)/comprehensive metabolic panel (CMP), hepatitis A/B/C, sexually transmitted infection (STI) screen, tuberculosis (TB) (interferon-gamma release assay (IGRA)), pregnancy, lipids/glucose.","Stage opportunistic-infection risk by CD4 (Pneumocystis jirovecii pneumonia (PJP) <200, toxo <100, Mycobacterium avium complex (MAC) <50).","Kidney disease (Infectious Diseases Society of America (IDSA) 2014): check estimated glomerular filtration rate (eGFR) + urinalysis with a quantitative albumin/protein-to-creatinine ratio at baseline, when antiretroviral therapy is started or changed, and at least annually. If eGFR <60: AVOID tenofovir disoproxil fumarate and other nephrotoxins (e.g., NSAIDs) — prefer tenofovir alafenamide. Significant/unexplained proteinuria, an eGFR decline, or suspected human immunodeficiency virus-associated nephropathy (HIVAN) → nephrology referral."],
  empiric:[{set:"Start antiretroviral therapy (ART) rapidly (often same-day)",rx:"integrase strand transfer inhibitor (INSTI)-based, e.g., bictegravir/tenofovir alafenamide/emtricitabine (single tablet); dolutegravir-based alternatives",why:"Rapid antiretroviral therapy improves outcomes; choose per genotype, comorbidities, pregnancy."}],
  definitive:["Add opportunistic infection (OI) prophylaxis by CD4: trimethoprim-sulfamethoxazole (TMP-SMX) for Pneumocystis jirovecii pneumonia (<200) ± toxo (<100); azithromycin for Mycobacterium avium complex (<50, if not on suppressive antiretroviral therapy).","Treat/screen coinfections (hepatitis B virus (HBV)-active antiretroviral therapy, hepatitis C virus (HCV), latent tuberculosis, syphilis).","opportunistic infection treatment essentials: Pneumocystis jirovecii pneumonia → trimethoprim-sulfamethoxazole (add corticosteroids if PaO2 <70 mmHg or A-a gradient ≥35); cerebral toxoplasmosis → pyrimethamine + sulfadiazine + leucovorin; cryptococcal meningitis → liposomal amphotericin B + flucytosine; cytomegalovirus (CMV) retinitis → ganciclovir/valganciclovir; disseminated Mycobacterium avium complex → a macrolide + ethambutol."],
  duration:"Lifelong antiretroviral therapy. Stop primary/secondary opportunistic-infection prophylaxis once CD4 is sustained >200 for ≥3 months on antiretroviral therapy.",
  pearls:["Goal: undetectable viral load → untransmittable (undetectable equals untransmittable (U=U)).","Screen and vaccinate (pneumococcal, hepatitis B virus, HPV, influenza, COVID). LIVE vaccines (MMR, varicella) are acceptable ONLY if CD4 ≥200 (≥15% in children) and otherwise stable — contraindicated when CD4 <200; recombinant zoster vaccine (RZV) is inactivated and safe.","Watch for immune reconstitution inflammatory syndrome (IRIS) when starting antiretroviral therapy with low CD4 + active opportunistic infection.","HIV-associated nephropathy (HIVAN) — most common in people of African ancestry (APOL1 risk variants), low CD4: antiretroviral therapy is the key treatment and slows progression to end-stage renal disease (ESRD); add an ACE inhibitor/ARB for proteinuria and consider corticosteroids in biopsy-confirmed HIVAN. Avoid tenofovir DF with renal dysfunction — prefer tenofovir alafenamide (TAF).","HIV is NOT a contraindication to kidney transplantation — assess HIV-positive patients with end-stage renal disease for transplant candidacy (well-controlled HIV), watching antiretroviral–immunosuppressant interactions."],
  consult:["Link to human immunodeficiency virus care; choose antiretroviral therapy by genotype/comorbidity; ensure opportunistic infection prophylaxis & vaccinations."]},

 {id:"lyme",name:"Lyme Disease & Tick-Borne Illness",cat:"Systemic",src:"lyme",
  suspect:["Early localized: erythema migrans (often >5 cm, may central-clear) in endemic area — clinical diagnosis, treat without serology.","Early disseminated: multiple erythema migrans (EM), facial palsy, carditis (atrioventricular (AV) block), meningitis. Late: arthritis.","Co-infections: anaplasmosis, babesiosis (same Ixodes tick)."],
  treatWhen:[
   "TREAT — Erythema migrans: treat clinically on sight given a compatible exposure; do NOT wait for serology (often negative early).",
   "TREAT — Early disseminated disease: multiple erythema migrans, acute neuroborreliosis (facial palsy, meningitis, radiculopathy), or Lyme carditis (any-degree atrioventricular block).",
   "TREAT — Lyme arthritis or other objective late manifestation WITH a positive two-tier serology.",
   "PROPHYLAXIS — single dose doxycycline 200 mg (4.4 mg/kg, max 200, in children) only if ALL of: tick is an Ixodes scapularis (deer tick), attached ≥36 h (engorged), can start within 72 h of removal, local tick infection rate ≥20% (high-incidence areas incl. Massachusetts/New England), and no doxycycline contraindication.",
   "DON'T TREAT — Tick bite not meeting every prophylaxis criterion: observe for 30 days and treat only if erythema migrans or symptoms develop.",
   "DON'T TREAT — Asymptomatic person with a positive Lyme serology: seropositivity persists for years and is not active infection.",
   "DON'T TREAT — Persistent nonspecific symptoms after a completed, appropriate course ('post-treatment Lyme'/'chronic Lyme'): prolonged or repeated antibiotics are NOT recommended (no benefit, real harm).",
   "DON'T TEST/TREAT — People without compatible exposure or symptoms (low pretest probability → false-positive serology)."
  ],
  workup:["erythema migrans → treat clinically (serology often negative early). Otherwise two-tier serology (enzyme immunoassay (EIA) → Western blot or 2nd enzyme immunoassay).","Consider complete blood count (CBC)/smear (anaplasma morulae, babesia), liver function tests (LFTs). electrocardiogram (ECG) if cardiac symptoms (Lyme carditis)."],
  empiric:[
   {set:"Early Lyme (erythema migrans, facial palsy, mild)",rx:"Doxycycline 100 mg twice daily (BID) ×10–14d (also treats anaplasma)",why:"Doxycycline first-line and covers common co-infection anaplasmosis."},
   {set:"Lyme carditis (high-grade atrioventricular block) / neuroborreliosis",rx:"Ceftriaxone 2 g intravenous (IV) every 24 hours (q24h) (or doxycycline for many neuro cases) ×14–21d",why:"intravenous for high-grade carditis or central nervous system (CNS) involvement."},
   {set:"Lyme arthritis",rx:"Doxycycline or amoxicillin ×28d",why:"Longer oral course for arthritis."}],
  definitive:["Tailor by stage and response; doxycycline also treats anaplasmosis (common co-infection). Evaluate for babesiosis if hemolysis/severe illness.",""],
  duration:"erythema migrans/early 10–14 d; Lyme arthritis 28 d; neuroborreliosis/carditis 14–21 d. Prophylaxis is a single 200 mg dose.",
  pearls:["Treat erythema migrans clinically — don't wait for (often-negative) early serology.","A positive serology with no symptoms is NOT an indication to treat.","Doxycycline is first-line for nearly all tick-borne disease; suspect Rocky Mountain spotted fever (RMSF) empirically in the right setting (don't delay).","Erythema migrans is present in only ~70–80% of cases and the tick bite is often unrecalled — absence of a rash or remembered bite does NOT exclude Lyme.","Two-tier serology cannot distinguish active from past/treated infection and there is NO test of cure — a result alone neither proves nor disproves active infection; interpret against pretest probability.","Erythema migrans resolves on its own — its disappearance is not evidence of cure (treatment success is judged by symptom resolution and absence of late sequelae, not by the rash fading).","The minimum tick-attachment time needed for transmission is unproven in humans (the ~36–48 h figure is extrapolated from animal data) — remove attached ticks promptly regardless.","Prolonged or repeated antibiotic courses for 'chronic Lyme' (e.g., ILADS protocols) are NOT endorsed by major medical societies and are not recommended (no benefit, real harm)."],
  consult:["Confirm staging; infectious disease (ID)/Cardiology for carditis, Neurology for neuroborreliosis."]},

 {id:"candidemia",name:"Candidemia / Invasive Candidiasis",cat:"Systemic",src:"candida",
  suspect:["Candida from blood = never a contaminant. Risk: central lines, total parenteral nutrition (TPN), broad-spectrum antibiotics, abdominal surgery, neutropenia, hemodialysis, intensive care unit (ICU) stay.","Candida is a leading healthcare-associated bloodstream infection; non-albicans species (e.g., Candida glabrata (C. glabrata)) are now ~half of isolates and drive azole choice."],
  workup:["Repeat blood cultures every day or every other day until clearance. Remove central venous catheters early when the line is the presumed source (in NEUTROPENIC patients the gut is often the source — individualize line removal).","Dilated ophthalmologic exam for endophthalmitis: in NON-neutropenic patients within the first week of diagnosis; in NEUTROPENIC patients defer until the first week AFTER neutrophil recovery (chorioretinal lesions are minimal until counts recover). Echocardiogram if persistent candidemia. Identify species + azole/echinocandin susceptibilities.","Blood cultures are insensitive — a serum (1→3)-β-D-glucan (high negative predictive value) can support the diagnosis and help decide when to stop empiric therapy."],
  empiric:[
   {set:"Primary therapy (candidemia / invasive candidiasis)",rx:"Echinocandin: micafungin 100 mg intravenous (IV) every 24 hours (q24h), OR caspofungin 70 mg load then 50 mg daily, OR anidulafungin 200 mg load then 100 mg daily",why:"2016 Infectious Diseases Society of America (IDSA): echinocandin preferred initial therapy (incl. most Candida glabrata (C. glabrata)) — safe, fungicidal, and active against azole-resistant species while susceptibilities are pending."},
   {set:"Alternative initial therapy",rx:"Fluconazole 800 mg (12 mg/kg) load → 400 mg (6 mg/kg) daily (only if NOT critically ill, no recent azole, low resistance risk); OR liposomal amphotericin B 3–5 mg/kg/day if intolerance/resistance",why:"Fluconazole acceptable in stable patients; lipid amphotericin reserved for azole/echinocandin resistance or intolerance."},
   {set:"Empiric therapy (critically ill, non-neutropenic ICU)",rx:"Start an echinocandin in critically ill patients with risk factors and no other source of fever — as soon as possible if septic shock",why:"Reassess at 4–5 days; stop if there is no evidence of invasive candidiasis or a negative high-negative-predictive-value assay (β-D-glucan)."}],
  definitive:["Step down to fluconazole 400 mg (6 mg/kg) daily usually within 5–7 days if the isolate is susceptible (e.g., Candida albicans (C. albicans)), the patient is stable, and cultures have cleared. Candida glabrata: step down only to higher-dose fluconazole 800 mg (12 mg/kg) or voriconazole if proven susceptible; Candida krusei → voriconazole (fluconazole-resistant).","Echinocandins penetrate the eye, urine, and central nervous system (CNS) poorly — switch to fluconazole or amphotericin for those sites."],
  duration:"14 days from the first NEGATIVE blood culture (uncomplicated, after clearance + symptom resolution); endocarditis ≥6 weeks after valve replacement; chronic disseminated (hepatosplenic) candidiasis until lesions resolve on imaging (often months).",
  pearls:["Always remove the central line (when it is the source) and get an eye exam.","Candida glabrata/krusei: don't rely on fluconazole — use an echinocandin.","Count 14 days from the first negative culture, not from treatment start.","Candida grown from respiratory secretions is almost always colonization — do NOT treat.","Asymptomatic candiduria: don't treat unless the patient is neutropenic, a very-low-birth-weight infant, or about to undergo a urologic procedure — remove the catheter. Symptomatic Candida cystitis → fluconazole 200 mg daily ×2 weeks (echinocandins don't reach the urine).","Mucosal disease: oropharyngeal thrush → fluconazole 100–200 mg (or topical clotrimazole/nystatin); esophageal candidiasis (odynophagia, often human immunodeficiency virus (HIV)/immunocompromised) → systemic fluconazole 200–400 mg ×14–21 d (treat empirically before endoscopy); vulvovaginal → single fluconazole 150 mg or a topical azole."],
  consult:["infectious disease consult recommended for all candidemia; confirm line removal, eye exam, clearance, and duration."]},

 {id:"febneut",name:"Febrile Neutropenia",cat:"Systemic",src:"febneut",
  suspect:["absolute neutrophil count (ANC) <500 (or expected to fall <500) + a single oral temp ≥38.3°C or ≥38.0°C sustained ≥1h (European Society for Medical Oncology (ESMO): ≥38.0°C for 2h). A medical emergency.","Signs can be minimal — especially on corticosteroids or in the elderly (who may present only with confusion or hypotension); suspect Gram-negative sepsis in any unwell at-risk patient even if afebrile. Higher risk with older age, advanced disease, prior febrile neutropenia, mucositis, poor performance status, and comorbidities."],
  workup:["Blood cultures (peripheral + each lumen), complete blood count (CBC), comprehensive metabolic panel (CMP), lactate, C-reactive protein, urinalysis/culture, chest radiograph, site-directed cultures/imaging. Exam skin/perineum/lines/mucosa/oropharynx (avoid digital rectal exam). Check prior microbiology for resistant organisms.","Risk-stratify with MASCC score (see Scores): ≥21 = low risk (complication risk <5%; <15 → up to 40%). Oral/outpatient management only if low-risk AND hemodynamically stable, no acute leukaemia, no organ failure, no pneumonia, no indwelling-catheter infection, and no severe mucositis."],
  empiric:[
   {set:"High-risk (start within 1 hour)",rx:"Antipseudomonal monotherapy: Cefepime 2 g intravenous (IV) every 8 hours (q8h) (or pip-tazo or meropenem). Add an aminoglycoside (combination) for septic shock, documented Gram-negative/Pseudomonas bacteraemia, or where local Gram-negative β-lactam susceptibility is intermediate",why:"Antipseudomonal beta-lactam monotherapy equals combination in efficacy meta-analyses; reserve the aminoglycoside for the high-risk scenarios above. Local Pseudomonas cefepime 87%."},
   {set:"Add vancomycin only for specific indications",rx:"+ Vancomycin if: hemodynamic instability, pneumonia, line infection, skin and soft tissue infection (SSTI), methicillin-resistant Staphylococcus aureus (MRSA) colonization, severe mucositis",why:"Routine empiric vancomycin is NOT recommended; add for defined indications then stop at 48h if no gram-positive cocci (GPC)."},
   {set:"Low-risk (MASCC ≥21), selected",rx:"Ciprofloxacin + amoxicillin-clavulanate by mouth (PO) (outpatient with close follow-up) — do NOT use a fluoroquinolone-based oral regimen if the patient received fluoroquinolone prophylaxis",why:"European Society for Medical Oncology (ESMO)/Infectious Diseases Society of America (IDSA) permit oral outpatient therapy in carefully selected low-risk patients; an afebrile inpatient may also switch to oral after 48h."}],
  definitive:["Adjust per cultures and local epidemiology. If fever persists or recurs ≥4–7 days in prolonged neutropenia, add an empirical antifungal — liposomal amphotericin B or an echinocandin (caspofungin), especially with prior azole exposure or non-albicans Candida colonization; fluconazole only if aspergillosis risk is low.","Neutropenia + new lung infiltrates → start a MOULD-active antifungal (voriconazole or liposomal amphotericin B) early for possible aspergillosis."],
  duration:"Continue until afebrile and absolute neutrophil count recovering (≥500 rising); pathogen-directed courses as appropriate.",
  pearls:["Door-to-antibiotic <60 minutes saves lives — don't wait for the count to be confirmed if suspicion is high.","Don't add vancomycin reflexively; stop it at 48h if no gram-positive indication/culture.","Primary granulocyte colony-stimulating factor (G-CSF) prophylaxis is recommended when the chemotherapy regimen carries a febrile-neutropenia risk >20% (or 10–20% with patient risk factors such as age >65, prior febrile neutropenia, or comorbidities); G-CSF is not routine for established febrile neutropenia.","For a suspected catheter infection in a stable patient, give a glycopeptide (vancomycin) through the line rather than removing it immediately — remove the line for Staphylococcus aureus, Pseudomonas, Candida, a tunnel infection, or persistent bacteraemia."],
  consult:["Coordinate with Heme/Onc; time to antibiotics, MASCC risk, and antifungal escalation are key."]},

 {id:"crbsi",name:"Catheter-Related Bloodstream Infection",cat:"Systemic",src:"carb",src2:"catheter",
  suspect:["Bacteremia/fungemia with an intravascular catheter and no other source; ↑ probability with shorter time-to-positivity from the line vs peripheral."],
  workup:["Paired blood cultures (peripheral + catheter). Differential time-to-positivity ≥2h suggests catheter source.","Do NOT remove a central catheter for fever alone (use clinical judgment) — remove it for Staphylococcus aureus (S. aureus), Pseudomonas, Candida, severe sepsis, suppuration at the exit site, or persistent bacteremia. Echocardiography for Staphylococcus aureus/Candida."],
  empiric:[{set:"Empiric",rx:"Vancomycin (+ antipseudomonal e.g. cefepime if critically ill/neutropenic/femoral)",why:"coagulase-negative staphylococci (CoNS) & Staphylococcus aureus dominate; broaden for gram-negative rods (GNR)/Pseudomonas by risk."}],
  definitive:["Staphylococcus aureus → remove line, methicillin-susceptible Staphylococcus aureus (MSSA) cefazolin/nafcillin, ≥14 d, echocardiography (echo). coagulase-negative staphylococci → may treat 5–7 d (often remove line). Candida → echinocandin + remove line + eye exam.",""],
  duration:"coagulase-negative staphylococci 5–7 d; Staphylococcus aureus ≥14 d (longer if complicated); Candida 14 d from clearance.",
  pearls:["Line removal is therapeutic — required for Staphylococcus aureus, Pseudomonas, and Candida.","Document clearance with repeat cultures for Staphylococcus aureus/Candida.","Prevention bundle (Centers for Disease Control and Prevention (CDC)/Healthcare Infection Control Practices Advisory Committee (HICPAC) 2011): hand hygiene; maximal sterile barrier at insertion (cap, mask, sterile gown/gloves, full-body drape); >0.5% chlorhexidine-alcohol skin prep; ultrasound guidance and the fewest lumens needed; review line necessity DAILY and remove early.","Site selection: prefer the subclavian over jugular/femoral and AVOID the femoral to lower infection risk — but AVOID the subclavian in hemodialysis/advanced kidney disease (stenosis) and use an arteriovenous fistula/graft for permanent dialysis access.","Do NOT give routine systemic antibiotic prophylaxis to prevent catheter infection, and do NOT replace central catheters on a fixed schedule; use a guidewire exchange only for a malfunctioning line WITHOUT infection (never to replace a line suspected of infection). Replace an emergently placed line (broken asepsis) within 48h.","If catheter-associated bloodstream infection rates stay high despite the basic bundle: add chlorhexidine-impregnated dressings, daily 2% chlorhexidine bathing, and antimicrobial-impregnated (chlorhexidine/silver-sulfadiazine or minocycline/rifampin) catheters for lines expected to stay >5 days; consider an antibiotic-lock for long-term catheters with recurrent infection. Don't replace peripheral IVs more often than every 72–96h in adults (children: only when clinically indicated), and remove any catheter at the first sign of phlebitis."],
  consult:["Staphylococcus aureus & Candida line infections warrant infectious disease (ID) consult, echocardiography, and documented clearance."]},

 {id:"fuo",name:"Fever of Unknown Origin",cat:"Systemic",src:"carb",
  suspect:["≥38.3°C on several occasions, ≥3 weeks, no diagnosis after appropriate inpatient/outpatient evaluation."],
  workup:["Categories: infection, malignancy, non-infectious inflammatory (autoimmune), miscellaneous. Repeat a meticulous history (travel, exposures, meds, tuberculosis (TB)) & exam.","Staged testing: cultures (off antibiotics), human immunodeficiency virus (HIV), tuberculosis, computed tomography (CT) chest/abd/pelvis, cross-sectional imaging; PET-computed tomography for occult inflammation/malignancy; targeted serologies/biopsy of abnormal findings.","Stop unnecessary drugs (drug fever); review for endocarditis, abscess, osteomyelitis."],
  empiric:[{set:"Avoid empiric antibiotics",rx:"Generally do NOT give empiric antibiotics/steroids in stable FUO — they obscure diagnosis",why:"Empiric therapy delays diagnosis unless the patient is unstable or neutropenic."}],
  definitive:["Diagnosis-directed therapy once a cause is identified.",""],
  duration:"N/A — driven by underlying cause.",
  pearls:["Resist reflexive empiric antibiotics in stable FUO — pursue the diagnosis.","Re-take the history and re-examine repeatedly; the clue often emerges over time."],
  consult:["infectious disease (ID) often coordinates the staged workup and stewardship of empiric therapy."]},

 {id:"bites",name:"Animal & Human Bite Wounds",cat:"Skin, Soft Tissue, and Bone",src:"ssti",
  suspect:["Dog/cat bites (Pasteurella, anaerobes, Capnocytophaga), human bites (Eikenella, oral flora, 'fight bite' over MCP)."],
  workup:["Irrigate copiously; assess depth, joint/tendon/bone involvement; x-ray if deep/over joint. Generally do not primarily close (esp hand/cat).","Update tetanus; assess rabies risk for animal bites; hand-surgery referral for clenched-fist injuries."],
  empiric:[{set:"Prophylaxis & treatment (dog/cat/human)",rx:"Amoxicillin-clavulanate (by mouth (PO)) or Ampicillin-sulbactam (intravenous (IV))",why:"Covers Pasteurella, Eikenella, anaerobes, and skin flora. Penicillin-allergic: doxycycline or fluoroquinolone (FQ) + metronidazole (avoid 1st-gen cephalosporins/clindamycin alone — miss Pasteurella/Eikenella)."}],
  definitive:["Tailor to culture for established infection; surgical washout for joint/deep space.",""],
  duration:"Prophylaxis 3–5 d; established infection 5–14 d depending on depth.",
  pearls:["Amox-clav is the answer for almost every bite.","'Fight bite' over the MCP joint → hand surgery + cover Eikenella; never close primarily."],
  consult:["Hand surgery for clenched-fist/joint involvement; infectious disease (ID) for complicated/joint/bone infection."]},

 {id:"sti",name:"Sexually Transmitted Infections (overview)",cat:"Genitourinary",src:"hiv",src2:"mksap",
  suspect:["Urethritis/cervicitis (GC/chlamydia), genital ulcers (herpes simplex virus (HSV), syphilis, chancroid), pelvic inflammatory disease (PID), and syphilis staging."],
  workup:["nucleic acid amplification test (NAAT) for gonorrhea & chlamydia (genital + extragenital per exposure). Syphilis serology (RPR + treponemal). human immunodeficiency virus (HIV) & hepatitis screening. Wet mount for trich/BV.","Evaluate partners; report reportable infections; offer human immunodeficiency virus pre-exposure prophylaxis (PrEP)."],
  empiric:[
   {set:"Gonorrhea",rx:"Ceftriaxone 500 mg intramuscular (IM) ×1 (1 g if ≥150 kg); treat chlamydia with doxycycline if not excluded",why:"Rising cephalosporin MICs — single higher-dose ceftriaxone; azithromycin no longer co-given routinely."},
   {set:"Chlamydia",rx:"Doxycycline 100 mg twice daily (BID) ×7d (azithromycin 1 g if adherence/pregnancy concerns)",why:"Doxycycline now preferred over azithromycin (esp rectal)."},
   {set:"Syphilis",rx:"Benzathine penicillin G 2.4 million units (MU) intramuscular (×1 early; ×3 weekly for late/latent)",why:"Penicillin is the only recommended therapy in pregnancy — desensitize if allergic."},
   {set:"Genital herpes simplex virus",rx:"Acyclovir/valacyclovir per episodic or suppressive protocol",why:"Antivirals shorten episodes; suppression reduces transmission."}],
  definitive:["Treat partners; retest as indicated; counsel on prevention and pre-exposure prophylaxis.",""],
  duration:"Regimen-specific.",
  pearls:["Treat empirically at the visit when suspicion is high — follow-up is unreliable.","Always offer human immunodeficiency virus testing & pre-exposure prophylaxis; screen extragenital sites by exposure.","Syphilis staging drives therapy: benzathine penicillin G 2.4 million units intramuscular ×1 for primary/secondary/early-latent; ×3 weekly for late-latent/unknown-duration/tertiary; neurosyphilis (or ocular/otic) needs intravenous (IV) aqueous penicillin G 18–24 million units/day ×10–14 days. Follow nontreponemal titers (RPR/VDRL) for response.","Genital ulcer differential: painful = herpes simplex virus (vesicles, multiple) or chancroid (Haemophilus ducreyi, ragged + tender adenopathy); painless = syphilis (clean indurated chancre) or lymphogranuloma venereum (LGV) (Chlamydia L-serovars; later painful buboes/proctocolitis — treat with doxycycline 21 days).","Mycoplasma genitalium: persistent urethritis/cervicitis — use resistance-guided therapy (doxycycline then moxifloxacin, or azithromycin if macrolide-susceptible).","Secondary syphilis classically involves the palms and soles; condyloma lata and mucous patches are highly infectious."],
  consult:["Public health reporting; infectious disease (ID) for neurosyphilis, treatment failure, or penicillin-allergic pregnant patients (desensitization)."]},

 {id:"orchitis",name:"Epididymitis & Orchitis (acute scrotum)",cat:"Genitourinary",src:"hiv",
  suspect:["Unilateral scrotal pain & swelling, epididymal tenderness, often gradual onset ± dysuria/urethral discharge or fever.","FIRST exclude testicular torsion — sudden severe pain, younger patient, high-riding/transverse testis, absent cremasteric reflex → emergent Doppler ultrasound + Urology (don't anchor on infection).","Isolated orchitis (testis involved, epididymis spared) is often viral — mumps in post-pubertal males (days after parotitis); ask MMR status."],
  workup:["Color Doppler ultrasound if torsion cannot be excluded clinically — torsion is a surgical emergency (≈6h window).","First-void urine / urethral nucleic acid amplification test (NAAT) for Neisseria gonorrhoeae (N. gonorrhoeae) & Chlamydia trachomatis (C. trachomatis); urinalysis + urine culture.","Stratify likely organism by age/sexual history to choose regimen; screen for other STIs (human immunodeficiency virus (HIV), syphilis) when sexually transmitted."],
  empiric:[
   {set:"Sexually transmitted (≤35 y / at-risk): gonorrhea + chlamydia",rx:"Ceftriaxone 500 mg intramuscular (IM) ×1 + Doxycycline 100 mg by mouth (PO) twice daily (BID) ×10d",why:"Centers for Disease Control and Prevention (CDC) sexually transmitted infection (STI) guidance — GC + chlamydia dominate in younger / sexually active men."},
   {set:"sexually transmitted infection + enteric risk (insertive anal intercourse)",rx:"Ceftriaxone 500 mg intramuscular ×1 + Levofloxacin 500 mg by mouth daily ×10d",why:"Adds enteric gram-negative coverage to GC/chlamydia coverage."},
   {set:"Enteric only (>35 y, low sexually transmitted infection risk, benign prostatic hyperplasia (BPH) / post-instrumentation)",rx:"Levofloxacin 500 mg by mouth daily ×10d (or ofloxacin 300 mg by mouth twice daily)",why:"Enterobacterales (esp Escherichia coli (E. coli)) predominate; fluoroquinolone penetrates prostate/epididymis. Check local urine culture for susceptibility."},
   {set:"Mumps / viral orchitis",rx:"Supportive only — nonsteroidal anti-inflammatory drugs (NSAIDs), scrotal elevation, ice, analgesia (NO antibiotics)",why:"Viral; antibiotics not indicated. Confirm by exposure/serology."}],
  definitive:["Tailor to nucleic acid amplification test/culture; treat sexual partners and report STIs. Drain an abscess; evaluate for Fournier gangrene if rapidly progressive or systemically ill.","Chronic / granulomatous orchitis → consider tuberculosis (TB), brucellosis, or fungal causes."],
  duration:"10 days for bacterial epididymo-orchitis; swelling may lag — continue supportive care. Viral orchitis is self-limited.",
  pearls:["Rule out testicular torsion FIRST in the acute scrotum.","Sexually transmitted → ceftriaxone + doxycycline; enteric → a fluoroquinolone.","Mumps orchitis is viral and supportive — a classic cause of isolated post-pubertal orchitis (fertility counseling if bilateral)."],
  consult:["Urology for torsion, abscess, or Fournier gangrene; infectious disease (ID) for treatment failure, recurrence, or atypical organisms (tuberculosis/brucella). Report STIs and treat partners."]},

 {id:"hepb",name:"Chronic Hepatitis B",cat:"Gastrointestinal",src:"hepb",
  suspect:["Chronic hepatitis B virus (HBV) = hepatitis B surface antigen (HBsAg) positive ≥6 months. Screen all adults ≥18 once, every pregnancy, and high-risk groups (endemic-region birth, human immunodeficiency virus (HIV), hepatitis C virus (HCV), household/sexual contacts, injection drug use (IDU), dialysis, immunosuppression).","Phases by hepatitis B e antigen (HBeAg), hepatitis B virus DNA, and ALT (ULN 35 U/L men / 25 U/L women): immune-tolerant, immune-active, inactive carrier, indeterminate."],
  treatWhen:[
   "TREAT — Cirrhosis (compensated OR decompensated) with ANY detectable hepatitis B virus DNA.",
   "TREAT — Immune-active disease: ALT ≥2× ULN with elevated hepatitis B virus DNA (hepatitis B e antigen-positive ≥20,000 IU/mL; hepatitis B e antigen-negative ≥2,000 IU/mL).",
   "TREAT — Pregnancy with high viral load (hepatitis B virus DNA ≥200,000 IU/mL): start tenofovir (tenofovir disoproxil fumarate (TDF) or tenofovir alafenamide (TAF)) around week 28 to prevent mother-to-child transmission (plus infant hepatitis B immune globulin (HBIG) + vaccine at birth).",
   "TREAT (prophylaxis) — Before/with immunosuppression or chemotherapy (especially anti-CD20 such as rituximab) to prevent reactivation — including selected hepatitis B surface antigen-negative / anti-HBc-positive patients.",
   "CONSIDER (shared decision) — Indeterminate-phase patients without cirrhosis (2025 guidance increasingly favors treating to lower hepatocellular carcinoma (HCC) risk); also hepatitis B surface antigen-positive persons whose viremia is below treatment thresholds but who are at high risk of transmitting to others.",
   "IMMUNE-TOLERANT (hepatitis B e antigen-positive, hepatitis B virus DNA >10^7 IU/mL, normal ALT) — usually monitor, BUT treat if age >40, or significant inflammation (≥grade 2) / fibrosis (≥F2). Inactive carriers: surveil ALT/hepatitis B virus DNA and treat when criteria are met.",
   "ALWAYS — hepatocellular carcinoma surveillance (ultrasound ± AFP every 6 months) for cirrhosis and other high-risk groups, treated or not — and CONTINUE surveillance even after hepatitis B surface antigen loss if there is cirrhosis, a family history of hepatocellular carcinoma, or hepatitis B surface antigen loss in a man >40 or a woman >50."
  ],
  workup:["hepatitis B surface antigen, anti-HBs, anti-HBc; if hepatitis B surface antigen+ → hepatitis B e antigen/anti-HBe, hepatitis B virus DNA, ALT, and non-invasive fibrosis (FIB-4/elastography).","Test for human immunodeficiency virus, hepatitis C virus, hepatitis D virus (HDV) (anti-hepatitis D virus) coinfection; hepatitis A immunity; baseline renal function/phosphate before tenofovir."],
  empiric:[{set:"First-line oral antivirals (high genetic barrier)",rx:"Entecavir  •  Tenofovir disoproxil fumarate (tenofovir disoproxil fumarate)  •  Tenofovir alafenamide (tenofovir alafenamide) — single agent, long-term",why:"All three are American Association for the Study of Liver Diseases (AASLD)/Infectious Diseases Society of America (IDSA) first-line nucleos(t)ide analogues. Prefer tenofovir alafenamide or entecavir with renal/bone disease; tenofovir disoproxil fumarate not preferred when creatinine clearance (CrCl) is low; entecavir is taken on an empty stomach."}],
  definitive:["Pegylated interferon is an alternative finite-course option in selected hepatitis B e antigen-positive patients without cirrhosis.","Coinfection: use hepatitis B virus-active antiretroviral therapy (ART) for human immunodeficiency virus; manage hepatitis D virus/hepatitis C virus. Endpoint is durable viral suppression; hepatitis B surface antigen loss is the (rare) functional cure."],
  duration:"Long-term/indefinite for most (especially cirrhosis). In hepatitis B e antigen-negative non-cirrhotic patients with sustained undetectable hepatitis B virus DNA, do NOT withdraw nucleos(t)ide analogue therapy until hepatitis B surface antigen loss (2025 AASLD). Finite therapy only in select hepatitis B e antigen-positive seroconverters without cirrhosis (or a finite pegylated interferon course).",
  pearls:["Screen for hepatitis B virus BEFORE immunosuppression (especially rituximab) — reactivation can be fatal; give prophylactic entecavir/tenofovir.","Use only entecavir or tenofovir — never lamivudine (rapid resistance).","Vaccinate all non-immune adults 19–59 (and ≥60 with risk) against hepatitis B virus."],
  consult:["Hepatology/infectious disease (ID) for treatment selection, pregnancy timing, reactivation prophylaxis, and hepatocellular carcinoma surveillance."]},

 {id:"hepc",name:"Hepatitis C",cat:"Gastrointestinal",src:"hepc",src2:"hcv2023",
  suspect:["Screen ALL adults ≥18 at least once, every pregnancy, and repeatedly with ongoing risk (injection drug use). Usually asymptomatic until advanced liver disease."],
  treatWhen:["TREAT — essentially ALL patients with active hepatitis C virus (HCV) (detectable RNA), regardless of fibrosis stage; very few exceptions (e.g., very limited life expectancy). Active or recent drug use and concern for reinfection are NOT contraindications to treatment.","SIMPLIFIED algorithm (minimal monitoring, no specialist) — for treatment-naïve adults without cirrhosis OR with compensated cirrhosis. EXCLUDED from the simplified pathway (refer/specialist): prior hepatitis C virus treatment, hepatitis B surface antigen-positive, current or prior decompensated cirrhosis (Child-Pugh ≥7), compensated cirrhosis with end-stage renal disease (eGFR <30), pregnancy, known/suspected hepatocellular carcinoma, or prior liver transplant."],
  workup:["hepatitis C virus antibody → if positive, hepatitis C virus RNA to confirm active infection. Genotype and baseline resistance (RAS) testing are NOT required for first-line pangenotypic regimens.","Stage fibrosis and identify cirrhosis (e.g., FIB-4 >3.25, FibroScan >12.5 kPa, or platelets <150,000) via FIB-4/APRI/elastography; screen human immunodeficiency virus (HIV) and hepatitis B virus (HBV) (reactivation risk); review drug–drug interactions and prior treatment."],
  empiric:[{set:"Pangenotypic direct-acting antiviral (DAA) — treatment-naïve, no or compensated cirrhosis",rx:"Glecaprevir/pibrentasvir ×8 weeks  OR  Sofosbuvir/velpatasvir ×12 weeks",why:"Cure (sustained virologic response (SVR)) >95%; no baseline genotype/resistance testing needed. Generic fixed-dose sofosbuvir/daclatasvir gives high sustained virologic response across genotypes 1–4 (SD1000) and is a key LOW-COST option globally — but the 2023 American Association for the Study of Liver Diseases-Infectious Diseases Society of America (US) guidance no longer lists sofosbuvir/daclatasvir among recommended regimens (not marketed in the US; glecaprevir/pibrentasvir or sofosbuvir/velpatasvir preferred)."}],
  definitive:["Confirm cure with SVR12 (undetectable hepatitis C virus RNA 12 weeks after therapy).","Decompensated cirrhosis: AVOID protease inhibitors (no glecaprevir/pibrentasvir, no grazoprevir); use sofosbuvir/velpatasvir ± ribavirin with hepatology.","Acute hepatitis C virus: treat with the same pangenotypic direct-acting antivirals — do not wait for spontaneous clearance."],
  duration:"8–12 weeks for most; longer ± ribavirin for decompensated cirrhosis or prior direct-acting antiviral failure.",
  pearls:["Cure is the expectation — sustained virologic response >95% with oral DAAs.","Check interactions: protease inhibitors, acid suppressants, certain statins, and amiodarone + sofosbuvir (bradycardia).","Cure does NOT remove hepatocellular carcinoma (HCC) risk in cirrhosis — continue surveillance; reinfection is possible, so retest hepatitis C virus RNA at least annually in people who inject drugs with ongoing risk after cure.","If doses are missed, make them up — extend therapy so the patient receives the FULL planned number of pills rather than stopping early.","American Association for the Study of Liver Diseases (AASLD)-Infectious Diseases Society of America (IDSA) 2023 update: universal screening for all adults and every pregnancy; simplified treatment with minimal monitoring and expanded eligibility; treat children as young as 3 years; structured management of incomplete direct-acting antiviral adherence."],
  consult:["Refer for decompensated cirrhosis, prior direct-acting antiviral failure, hepatitis B virus coinfection, pregnancy, or severe renal disease."]},

 {id:"histo",name:"Histoplasmosis",cat:"Respiratory",src:"histo",
  suspect:["Endemic in Ohio/Mississippi River valleys (and expanding). Exposure: bird/bat droppings, caves, demolition/excavation.","Spectrum: asymptomatic pulmonary nodule (histoplasmoma) · acute pulmonary (flu-like, often self-limited) · chronic cavitary pulmonary · progressive disseminated (immunocompromised — fever, cytopenias, hepatosplenomegaly, oral ulcers, adrenal involvement)."],
  treatWhen:[
   "DON'T TREAT — Asymptomatic noncalcified Histoplasma pulmonary nodule (histoplasmoma), or known untreated prior infection, with no other active site — routine treatment to prevent reactivation is NOT recommended (2025 Infectious Diseases Society of America (IDSA) update).",
   "DON'T TREAT routinely — Mild acute pulmonary histoplasmosis (symptoms that do NOT interfere with normal activities) in immunocompetent patients: usually self-limited; treat only if illness is prolonged (>1 month) or infiltrates progress.",
   "OPTIONAL — Moderate acute pulmonary histoplasmosis (symptoms that DO interfere with normal activities) in immunocompetent patients: antifungal therapy OR no treatment is reasonable (weigh severity, duration, and drug harms).",
   "TREAT — Immunocompromised patients at moderate–high risk of progression to disseminated disease, and all moderate–severe acute pulmonary or progressive disseminated disease.",
   "TREAT (severe) — Severe acute pulmonary/disseminated disease (intensive care unit (ICU)/hypoxemia): start with liposomal amphotericin B, then step down to itraconazole."
  ],
  workup:["Urine + serum Histoplasma antigen (best yield in disseminated/severe acute disease); antibodies take weeks (complement fixation titer ≥1:32 or rising, or an H-band by immunodiffusion, suggests active/recent infection); culture/histopathology (narrow-based budding yeast).","'Active infection' (which would prompt treating a nodule or prior infection) = a new/progressive radiographic change, a positive urine/serum antigen, or positive serology as above. Chest imaging; grade severity — mild = symptoms do not interfere with normal activities; moderate = symptoms interfere with normal activities; severe = intensive care unit (ICU)/hypoxemia — and assess immune status (human immunodeficiency virus (HIV) test)."],
  empiric:[
   {set:"Mild–moderate, when treatment is indicated",rx:"Itraconazole (load 200 mg three times daily (TID) ×3 days → 200 mg twice daily (BID) for 6–12 weeks); SUBA-itraconazole 130 mg TID ×3 days → 130 mg BID is an alternative (adults); children 5 mg/kg/dose. Check a level (trough goal >1 and <3–4 mg/L)",why:"Itraconazole is the preferred azole; confirm absorption with a level and screen drug interactions."},
   {set:"Severe / disseminated",rx:"Liposomal amphotericin B induction (1–2 weeks) → step down to itraconazole",why:"Amphotericin for severe disease, then oral azole to complete the course."}],
  definitive:["Treat underlying human immunodeficiency virus/immunosuppression. Itraconazole has major CYP3A4 interactions — review all medications.","Pregnancy: AVOID azoles in the first trimester (teratogenic) — use liposomal amphotericin B if treatment is necessary."],
  duration:"Acute pulmonary (when treated) ~6–12 weeks; chronic cavitary and disseminated disease ≥12 months.",
  pearls:["Most mild acute pulmonary histoplasmosis and asymptomatic nodules do NOT need antifungals (2025 Infectious Diseases Society of America update).","When treating, itraconazole is preferred — verify a therapeutic drug level.","Disseminated histoplasmosis is an AIDS-defining illness — always test for human immunodeficiency virus."],
  consult:["infectious disease (ID) for moderate–severe, disseminated, immunocompromised, or pregnant patients and for itraconazole level/interaction management."]},

 {id:"crypto",name:"Cryptococcosis & Cryptococcal Meningitis",cat:"Neurological",src:"crypto",
  suspect:["Cryptococcal meningoencephalitis: subacute headache, fever, altered mental status ± cranial-nerve palsies; classic with human immunodeficiency virus (HIV) (CD4 <100), solid-organ transplant, cirrhosis, or steroids — but also occurs in non-human immunodeficiency virus/non-transplant 'immunocompetent' hosts.","Also pulmonary cryptococcosis (nodules/consolidation) and disseminated disease.","Cryptococcus neoformans predominates in human immunodeficiency virus; Cryptococcus gattii (Pacific Northwest, Australia) affects apparently immunocompetent hosts and causes larger brain/lung cryptococcomas."],
  workup:["Serum cryptococcal antigen (CrAg, lateral-flow assay) — highly sensitive screen; if positive, measure the titre and perform a lumbar puncture (LP) to exclude meningitis.","lumbar puncture WITH OPENING PRESSURE (critical), plus cerebrospinal fluid (CSF) CrAg, India ink, and fungal culture. Brain imaging before lumbar puncture if focal signs. In ANY cryptococcosis, do a lumbar puncture to exclude central nervous system (CNS) disease and test for an underlying immunodeficiency (human immunodeficiency virus serology, CD4 count).","Reflex CrAg screening in advanced human immunodeficiency virus (CD4 <200) detects pre-symptomatic antigenaemia. If asymptomatic CrAg-positive AND meningitis is excluded by lumbar puncture: pre-emptive fluconazole (1200 mg/day ×2 wk → 800 mg ×8 wk → 200 mg ×6 months) plus start antiretroviral therapy."],
  empiric:[
   {set:"Induction — cryptococcal meningitis (high-resource)",rx:"Liposomal amphotericin B 3–4 mg/kg/day + Flucytosine 25 mg/kg four times daily (QID) ×2 weeks",why:"Amphotericin + flucytosine is the backbone; flucytosine speeds cerebrospinal fluid sterilization and reduces relapse."},
   {set:"Induction — resource-limited (World Health Organization (WHO) / AMBITION-cm)",rx:"Single-dose Liposomal amphotericin B 10 mg/kg + flucytosine 25 mg/kg four times daily ×2 wk + fluconazole 1200 mg/day",why:"Single high-dose liposomal amphotericin B regimen is non-inferior (10-week mortality 24.8% vs 28.7%) and far more deliverable where sustained infusions are difficult."},
   {set:"Pulmonary cryptococcosis",rx:"Mild–moderate (no central nervous system disease): fluconazole 400 mg daily ×6–12 months. Severe (large/≥2 cm or multiple lesions, lobar/multilobar consolidation, cavitation, or hypoxaemia): treat as central nervous system/disseminated disease (amphotericin + flucytosine induction)",why:"Mild isolated pulmonary disease responds to fluconazole; severe pulmonary disease is treated like meningitis."}],
  definitive:["Consolidation: fluconazole 400–800 mg daily ×8 weeks. Maintenance: fluconazole 200 mg daily — ≥12 months in human immunodeficiency virus, 6–12 months in solid-organ transplant; central nervous system cryptococcomas (often Cryptococcus gattii) need PROLONGED therapy ± neurosurgery for mass effect.","human immunodeficiency virus: defer antiretroviral therapy (ART) to ~4–6 weeks after starting antifungals — do NOT start within the first 2 weeks (early antiretroviral therapy increases mortality / immune reconstitution inflammatory syndrome (IRIS)); stop maintenance after ≥1 year if CD4 >100 and virally suppressed; restart if CD4 falls.","Do NOT escalate antifungals for persistent CrAg positivity alone."],
  duration:"Induction ≥2 weeks → consolidation 8 weeks → maintenance ≥12 months (human immunodeficiency virus) or 6–12 months (transplant); cryptococcomas longer.",
  pearls:["Manage RAISED INTRACRANIAL PRESSURE aggressively with serial therapeutic lumbar punctures (drain to roughly halve a high opening pressure) — a major determinant of survival; refractory pressure needs a lumbar drain, ventriculostomy, or ventriculoperitoneal shunt.","Do NOT give adjunctive dexamethasone for cryptococcal meningitis — it worsened outcomes in trials. Reserve corticosteroids for immune reconstitution inflammatory syndrome or cryptococcoma-related mass effect/edema.","Immune reconstitution inflammatory syndrome (paradoxical worsening after antiretroviral therapy): continue antifungals, do NOT stop antiretroviral therapy, and add prednisolone/dexamethasone (weaned over 4–6 weeks) for severe disease.","Persistent symptoms usually reflect pressure, not drug failure; confirm cerebrospinal fluid sterilization before stepping down from induction. Cryptococcal antigen can stay positive long-term — don't re-test or escalate therapy based on antigen alone."],
  consult:["infectious disease (ID) essential: coordinate antiretroviral therapy timing (immune reconstitution inflammatory syndrome), ICP management (serial LPs ± shunt), and flucytosine level/toxicity monitoring."]},

 {id:"ntm",name:"Nontuberculous Mycobacterial (nontuberculous mycobacteria (NTM)) Pulmonary Disease",cat:"Respiratory",src:"ntm",
  suspect:["Chronic cough, fatigue, weight loss ± hemoptysis with nodular/bronchiectatic disease (often older non-smoking women — 'Lady Windermere') or fibrocavitary disease (older men with chronic obstructive pulmonary disease (COPD)).","Most common pathogens: Mycobacterium avium complex (Mycobacterium avium complex (MAC)), Mycobacterium kansasii (M. kansasii), Mycobacterium xenopi (M. xenopi) (slow growers); Mycobacterium abscessus (M. abscessus) (rapid grower — hardest to treat)."],
  workup:["Diagnosis requires ALL three (American Thoracic Society (ATS)/European Respiratory Society (ERS)/European Society of Clinical Microbiology and Infectious Diseases (ESCMID)/Infectious Diseases Society of America (IDSA) 2020): compatible pulmonary symptoms; nodular/cavitary opacities on chest radiograph (CXR) or bronchiectasis with multiple small nodules on HRCT; AND microbiologic confirmation.","Microbiology: ≥2 separate expectorated sputum cultures positive for the SAME species (or ≥1 positive bronchoalveolar lavage (BAL)/bronchial wash, or biopsy showing granulomas plus a positive culture). A single positive sputum is usually colonization/contamination.","Obtain macrolide and amikacin susceptibility; for Mycobacterium abscessus test inducible macrolide resistance (erm(41), 14-day incubation).","Decide whether to treat — isolation alone is not an indication; weigh symptoms, radiology, microbiologic burden, host risk, and the long, toxic course. Once criteria are met, FAVOR treatment over watchful waiting — especially with AFB smear-positive sputum and/or cavitary disease — but still individualize (recurrence/reinfection is common, particularly in nodular/bronchiectatic disease)."],
  empiric:[
   {set:"Mycobacterium avium complex — nodular/bronchiectatic (non-cavitary)",rx:"Three-drug macrolide regimen THREE times weekly: azithromycin 500 mg + rifampin 600 mg + ethambutol 25 mg/kg",why:"Intermittent therapy equals daily for non-cavitary disease and is better tolerated; a macrolide-containing 3-drug regimen is preferred, azithromycin over clarithromycin."},
   {set:"Mycobacterium avium complex — cavitary or advanced/severe",rx:"DAILY azithromycin + rifampin + ethambutol AND add parenteral amikacin (or streptomycin) for the first ≥2–3 months",why:"Daily therapy plus an initial aminoglycoside for cavitary, advanced/severe bronchiectatic, OR macrolide-resistant disease; do NOT use intermittent dosing for cavitary disease. Use ≥3 drugs including a macrolide + ethambutol."},
   {set:"Mycobacterium avium complex — refractory (culture-positive at ≥6 months on therapy)",rx:"Add amikacin liposome inhalation suspension (ALIS) to the guideline regimen",why:"ALIS improves culture conversion in treatment-refractory Mycobacterium avium complex."},
   {set:"Mycobacterium kansasii",rx:"Rifampin + ethambutol + (isoniazid or a macrolide); daily for cavitary or isoniazid-based regimens",why:"Rifampin-based therapy; far more treatable than Mycobacterium avium complex or Mycobacterium abscessus. Routine parenteral amikacin/streptomycin is NOT needed. Treat for a fixed 12 months (expect sputum conversion by ~4 months — get expert input if it hasn't). Moxifloxacin is the second-line companion for rifampin-resistant/intolerant disease."},
   {set:"Mycobacterium xenopi",rx:"Daily regimen of ≥3 drugs: rifampin + ethambutol + a macrolide and/or moxifloxacin; add parenteral amikacin for cavitary/advanced disease",why:"High mortality — treat aggressively. Rifampin/ethambutol are inactive alone in vitro, so a macrolide and/or fluoroquinolone anchors the regimen; continue ≥12 months after culture conversion."},
   {set:"Mycobacterium abscessus",rx:"Expert-guided, STAGED therapy with ≥3 active drugs: initial parenteral phase = intravenous (IV) amikacin + imipenem or cefoxitin (± tigecycline) + a macrolide → continuation oral phase = macrolide + companions (clofazimine, linezolid) ± inhaled amikacin",why:"Subspecies matters: massiliense usually has a NONfunctional erm(41) (macrolide-susceptible, better cure), while abscessus/bolletii are inducibly macrolide-resistant — then the macrolide is used only for immunomodulation and is NOT counted as an active drug. Manage with a nontuberculous mycobacteria expert."}],
  definitive:["Continue until cultures are negative on therapy for at least 12 months.","Adjuvant surgical resection (after expert consultation, by a surgeon experienced in mycobacterial surgery) is an option for selected patients: failure of medical therapy, cavitary or drug-resistant disease, or complications such as massive hemoptysis or severe localized bronchiectasis.","Monitor toxicities: ethambutol (visual acuity / color vision), aminoglycoside (audiometry, renal), rifamycin drug interactions, macrolide QT."],
  duration:"At least 12 months of therapy after culture conversion (sputum becomes and stays negative).",
  pearls:["Two positive sputum cultures of the SAME species are required — one positive culture is usually not enough to diagnose or treat.","Never treat Mycobacterium avium complex with a macrolide plus an inactive partner (functional monotherapy) — you select macrolide resistance, the key predictor of failure.","Cavitary disease → daily therapy + initial amikacin; nodular/bronchiectatic disease → three-times-weekly is preferred."],
  consult:["infectious disease (ID)/pulmonary co-management for the treat-or-not decision, regimen choice, susceptibility interpretation (macrolide/amikacin), and toxicity monitoring over the long course."]},

 {id:"aspergillosis",name:"Invasive Aspergillosis",cat:"Respiratory",src:"asperg",
  suspect:["Invasive pulmonary aspergillosis in prolonged neutropenia, allogeneic hematopoietic stem cell transplant (HSCT), solid-organ transplant, high-dose corticosteroids, or advanced immunodeficiency: fever, pleuritic chest pain, hemoptysis, nodules on computed tomography (CT).","Halo sign (early) and air-crescent sign (later, with count recovery) on chest computed tomography are classic but not specific.","Also recognize the non-invasive forms: chronic cavitary pulmonary aspergillosis (chronic cough, hemoptysis, weight loss + cavitation in prior tuberculosis/COPD), aspergilloma (fungal ball in an old cavity), and allergic bronchopulmonary aspergillosis (asthma/cystic fibrosis)."],
  workup:["Chest computed tomography at first suspicion in an at-risk host (regardless of chest radiograph); add contrast only if a nodule/mass abuts a large vessel.","Serum and bronchoalveolar lavage (BAL) galactomannan support the diagnosis in hematologic malignancy/HSCT — but it is NOT validated for solid-organ transplant or chronic granulomatous disease, and serum screening is unreliable on mold-active prophylaxis/therapy (test the bronchoalveolar lavage instead). Serial serum galactomannan tracks response when elevated at baseline. serum (1→3)-β-D-glucan is adjunctive and not Aspergillus-specific.","Bronchoscopy with bronchoalveolar lavage when feasible (low yield for peripheral nodules → percutaneous/endobronchial biopsy). Obtain tissue/fluid for fungal culture and histopathology; consider Aspergillus polymerase chain reaction (PCR); reserve azole-susceptibility testing for suspected resistance or non-response.","Diagnose the chronic cavitary form with Aspergillus immunoglobulin G (IgG) antibody (the most sensitive test); diagnose allergic bronchopulmonary aspergillosis with an elevated total immunoglobulin E (IgE) plus Aspergillus-specific IgE."],
  empiric:[
   {set:"Primary therapy (all invasive aspergillosis)",rx:"Voriconazole 6 mg/kg intravenous (IV) every 12 hours (q12h) ×2 doses, then 4 mg/kg intravenous (or by mouth (PO)) every 12 hours — with therapeutic drug monitoring",why:"Voriconazole is first-line and superior to amphotericin for invasive pulmonary aspergillosis; start early while the workup proceeds; follow trough levels (interactions, erratic absorption)."},
   {set:"Alternative primary / voriconazole not tolerated",rx:"Isavuconazole 200 mg every 8 hours ×6 doses (loading), then 200 mg daily; OR liposomal amphotericin B 3–5 mg/kg/day intravenous (IV)",why:"Isavuconazole is non-inferior with fewer interactions/toxicity; lipid amphotericin when azoles cannot be used."},
   {set:"Severe disease / azole-resistance concern",rx:"Consider combination voriconazole + an echinocandin (micafungin or caspofungin)",why:"Combination may be considered in select patients with documented disease while evidence evolves."},
   {set:"Salvage (refractory disease)",rx:"Switch drug class: liposomal amphotericin B, an echinocandin, or posaconazole",why:"Change class for refractory disease; echinocandins are salvage-only, not adequate as primary monotherapy."},
   {set:"Primary antifungal prophylaxis (high-risk)",rx:"Posaconazole (tablet 300 mg twice daily ×1 day, then 300 mg daily) during prolonged neutropenia (acute-leukemia induction) and for high-risk graft-versus-host disease; alternatives voriconazole or micafungin",why:"Posaconazole prophylaxis is strongly recommended (high-quality evidence); continue throughout immunosuppression (prednisone >1 mg/kg/day for >2 weeks or anti-GVHD therapy)."},
   {set:"Empiric therapy (persistent febrile neutropenia)",rx:"Liposomal amphotericin B, an echinocandin (caspofungin/micafungin), or voriconazole for high-risk prolonged neutropenia that stays febrile despite broad-spectrum antibiotics",why:"Not needed if anticipated neutropenia <10 days; a galactomannan/β-D-glucan-driven preemptive strategy reduces unnecessary antifungal use."}],
  definitive:["Reduce immunosuppression where possible and reverse neutropenia (granulocyte colony-stimulating factor (G-CSF) as appropriate); surgery for localized disease (sinus, focal central nervous system (CNS), endocarditis).","After successfully treated invasive aspergillosis, give secondary prophylaxis if further immunosuppression is planned.","Follow-up chest computed tomography after ≥2 weeks (sooner if deteriorating) to assess response; manage azole interactions and continue therapeutic drug monitoring (TDM)."],
  duration:"Invasive disease: minimum 6–12 weeks, individualized to immune recovery and radiographic/clinical response. Chronic cavitary pulmonary aspergillosis: ≥6 months (often long-term).",
  pearls:["Voriconazole is primary therapy; echinocandins are not adequate as primary monotherapy.","Always get a voriconazole level — target a trough >1–1.5 µg/mL for efficacy and <5–6 µg/mL to limit (mainly central nervous system) toxicity; absorption and interactions are unpredictable.","Posaconazole is first-line antifungal prophylaxis during prolonged neutropenia and for high-risk graft-versus-host disease.","High-risk neutropenic/hematopoietic stem cell transplant patients belong in a protected (HEPA-filtered) environment; at-risk outpatients should avoid gardening, mulch/compost, and construction/renovation dust.","Spectrum beyond invasive disease: chronic cavitary pulmonary aspergillosis (≥3 months of symptoms + cavitation in prior tuberculosis/COPD — diagnose with Aspergillus immunoglobulin G, treat ≥6 months with itraconazole or voriconazole), aspergilloma (resect if significant hemoptysis), and allergic bronchopulmonary aspergillosis (asthma/cystic fibrosis with high immunoglobulin E — corticosteroids ± itraconazole)."],
  consult:["infectious disease (ID)/transplant for antifungal selection, therapeutic drug monitoring, drug interactions, host/source optimization, and duration."]},

 {id:"influenza",name:"Seasonal Influenza",cat:"Respiratory",src:"flu",
  suspect:["Abrupt fever, cough, myalgia, headache, and sore throat during influenza season or an institutional outbreak; can decompensate cardiopulmonary disease and the elderly.","High-risk for complications (Table 4): age <2 or ≥65, pregnancy or ≤2 weeks postpartum, chronic lung/heart/kidney/liver/blood/metabolic (diabetes) or neurologic disease, immunosuppression, morbid obesity (BMI ≥40), nursing-home/long-term-care residents, American Indian/Alaska Native, and children <19 on chronic aspirin."],
  workup:["Test hospitalized patients, high-risk patients, and any case where the result changes management, using a molecular assay (reverse transcription polymerase chain reaction (RT-PCR) or rapid nucleic acid amplification test (NAAT)) on an upper-respiratory specimen — molecular is preferred over antigen tests (higher sensitivity); do NOT rely on a rapid antigen test (RIDT) in hospitalized patients.","In intubated/respiratory-failure patients use a LOWER-respiratory specimen (endotracheal aspirate/bronchoalveolar lavage) even if upper-respiratory testing is negative. Confirm a negative rapid antigen with reverse transcription polymerase chain reaction when influenza is still suspected. Testing is NOT required to start treatment."],
  empiric:[
   {set:"Hospitalized, severe, progressive, or high-risk (any symptom duration)",rx:"Oseltamivir 75 mg by mouth (PO) twice daily (BID) ×5 days — start as soon as possible, do not wait for test results",why:"Antiviral benefit is greatest early but is still indicated in hospitalized/severe/high-risk patients regardless of symptom duration. Pregnant/postpartum patients are high-risk — treat promptly with oseltamivir."},
   {set:"Outpatient, uncomplicated, not high-risk",rx:"Oseltamivir (or inhaled zanamivir, or intravenous (IV) peramivir ×1) if within ~48 h of onset; otherwise supportive care",why:"Early neuraminidase inhibitor shortens illness in otherwise-healthy outpatients; benefit falls after 48 h. Use a SINGLE neuraminidase inhibitor — do NOT combine agents or routinely use higher doses. (Baloxavir, a single-dose oral cap-dependent endonuclease inhibitor, is a newer option approved after this guideline.)"},
   {set:"Chemoprophylaxis (selected exposures / outbreaks)",rx:"Oseltamivir 75 mg by mouth once daily — start within 48 h of exposure for high-risk contacts; for an institutional outbreak, give to ALL residents (regardless of vaccination status) plus treat the ill",why:"Post-exposure prophylaxis and outbreak control in high-risk settings; vaccination remains primary prevention."}],
  definitive:["Stop antivirals if an alternative diagnosis is confirmed. Treat secondary bacterial pneumonia (suspect with biphasic worsening after initial improvement) — the classic pathogens are Streptococcus pneumoniae, Staphylococcus aureus (including methicillin-resistant Staphylococcus aureus, which causes necrotizing pneumonia), and Streptococcus pyogenes.","Do NOT use corticosteroids routinely — adjunctive corticosteroids are associated with harm (worse outcomes) unless indicated for another reason."],
  duration:"Treatment 5 days (longer, with viral testing, if severe/immunocompromised). Post-exposure prophylaxis 7 days; for an institutional outbreak continue chemoprophylaxis ≥2 weeks AND until ~7 days after the last known case.",
  pearls:["Start oseltamivir empirically in hospitalized/severe/high-risk suspected influenza — do not wait for confirmation; testing is not required to treat.","Prefer molecular testing over rapid antigen; a negative antigen does not exclude influenza (use RT-PCR in the hospitalized).","Watch for secondary bacterial pneumonia (Staphylococcus aureus/methicillin-resistant Staphylococcus aureus necrotizing pneumonia, pneumococcus) and AVOID routine corticosteroids.","A long-term-care outbreak = ≥2 healthcare-associated cases within 72 h → treat the ill and give chemoprophylaxis to all residents; annual vaccination is the primary preventive measure."],
  consult:["Rarely infectious disease (ID); involve for severe/immunocompromised disease, suspected antiviral resistance (test if there is no improvement on therapy), or outbreak management with infection control/public health."]},

 {id:"ncc",name:"Neurocysticercosis",cat:"Neurological",src:"ncc",
  suspect:["New-onset seizures in an adult from (or exposed to people from) a Taenia solium–endemic area — the most common cause of acquired epilepsy worldwide.","Seizures and increased intracranial pressure (usually obstructive hydrocephalus — headache, vomiting, papilledema) are the TWO most common presentations. Common in immigrants from Latin America, sub-Saharan Africa, and parts of Asia; acquired fecal-orally from a Taenia solium tapeworm carrier (often a household member) — the patient need not have traveled.","Forms: viable parenchymal cysts, single enhancing lesion, calcified (dead) cysts, and the dangerous extraparenchymal forms — ventricular and subarachnoid disease (hydrocephalus, mass effect)."],
