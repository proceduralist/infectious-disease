<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infectious Disease Rotation Companion</title>
<style>
:root{
  --bg:#0f172a; --panel:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --brand:#0d6e6e; --brand2:#0b5563; --accent:#1d4ed8; --soft:#f1f5f9; --softer:#f8fafc;
  --good:#15803d; --goodbg:#dcfce7; --ok:#a16207; --okbg:#fef9c3; --warn:#c2410c; --warnbg:#ffedd5;
  --bad:#b91c1c; --badbg:#fee2e2; --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--softer);line-height:1.5;font-size:15px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.app{display:flex;min-height:100vh}
/* Sidebar */
.side{width:248px;flex:0 0 248px;background:linear-gradient(180deg,#0d6e6e,#0b5563);color:#e6fffb;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 18px 12px;border-bottom:1px solid rgba(255,255,255,.14)}
.brand h1{font-size:16px;margin:0;letter-spacing:.2px;font-weight:700}
.brand .sub{font-size:11.5px;opacity:.85;margin-top:3px}
.nav{padding:10px 8px;flex:1}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:0;color:#d7fbf6;padding:10px 12px;border-radius:9px;font-size:14px;cursor:pointer;font-weight:500;margin:2px 0}
.nav button:hover{background:rgba(255,255,255,.10)}
.nav button.active{background:#ffffff;color:var(--brand2);font-weight:700;box-shadow:var(--shadow)}
.nav .ic{font-size:16px;width:20px;text-align:center}
.navparent .caret{margin-left:auto;font-size:11px;transition:.15s;opacity:.8}
.navgroup.open .navparent .caret{transform:rotate(90deg)}
.navsub{display:none}
.navgroup.open .navsub{display:block}
.navsub button{padding-left:42px;font-size:13px}
.navlabel{padding:8px 12px 2px 20px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#8fe7dd;opacity:.85}
.side .foot{padding:12px 16px;font-size:10.5px;opacity:.8;border-top:1px solid rgba(255,255,255,.14)}
/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:10px 22px;display:flex;align-items:center;gap:14px}
.topbar .pg{font-weight:700;font-size:15px}
.search{margin-left:auto;position:relative}
.search input{width:300px;max-width:42vw;padding:8px 12px 8px 32px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fff}
.search:before{content:"\1F50D";position:absolute;left:10px;top:7px;font-size:13px;opacity:.5}
.wrap{padding:22px;max-width:1180px;width:100%;margin:0 auto}
.page{display:none}
.page.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
h2.sec{font-size:21px;margin:2px 0 4px}
.lead{color:var(--muted);margin:0 0 18px;font-size:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h3{margin:0 0 10px;font-size:16px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
label.fld{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:0 0 5px}
select,input[type=text],textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:#fff}
textarea{resize:vertical}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--brand);color:#fff;border:0;padding:9px 15px;border-radius:9px;font-weight:600;cursor:pointer;font-size:14px}
.btn:hover{background:var(--brand2)}
.btn.ghost{background:#fff;color:var(--brand2);border:1px solid var(--brand)}
.btn.sm{padding:6px 11px;font-size:13px}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#334155}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;position:sticky;top:0;background:#fff}
.sb{display:inline-block;min-width:38px;text-align:center;padding:2px 6px;border-radius:6px;font-weight:700;font-size:12.5px}
.s-good{background:var(--goodbg);color:var(--good)}
.s-ok{background:var(--okbg);color:var(--ok)}
.s-warn{background:var(--warnbg);color:var(--warn)}
.s-bad{background:var(--badbg);color:var(--bad)}
.s-na{color:#cbd5e1}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--soft);color:#475569;margin-right:5px}
.tag.r{background:var(--badbg);color:var(--bad)}
.tag.g{background:var(--goodbg);color:var(--good)}
.tag.b{background:#dbeafe;color:#1e40af}
.drugrow{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin:6px 0;cursor:pointer;font-family:inherit;transition:.12s}
.drugrow:hover{border-color:var(--brand);box-shadow:var(--shadow)}
.drugrow .dn{font-weight:700;color:var(--brand2);font-size:14.5px}
.drugrow .dmeta{margin-left:auto;display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.drugrow .dchev{color:var(--brand);font-size:18px;font-weight:800;margin-left:2px}
.lib-grp td{background:var(--soft);color:var(--brand2);font-weight:800;font-size:13px;letter-spacing:.2px;border-top:2px solid var(--brand)}
.callout{border-left:4px solid var(--brand);background:var(--softer);padding:11px 14px;border-radius:0 9px 9px 0;margin:10px 0;font-size:13.5px}
.callout.warn{border-color:var(--warn);background:var(--warnbg)}
.callout.bad{border-color:var(--bad);background:var(--badbg)}
.callout.ok{border-color:var(--good);background:var(--goodbg)}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.kv{display:flex;gap:8px;margin:3px 0;font-size:13.5px}
.kv b{flex:0 0 130px;color:var(--muted);font-weight:600}
.rx{background:#ecfeff;border:1px solid #a5f3fc;border-radius:9px;padding:12px 14px;margin:8px 0}
.rx .drug{font-weight:700;color:#0e7490}
.step{display:flex;gap:12px;margin:0 0 4px}
.step .n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.step .bd{flex:1;padding-top:2px}
.acc{border:1px solid var(--line);border-radius:11px;margin-bottom:10px;overflow:hidden;background:#fff}
.acc>summary{padding:13px 16px;cursor:pointer;font-weight:700;font-size:15px;list-style:none;display:flex;align-items:center;gap:10px}
.acc>summary::-webkit-details-marker{display:none}
.acc>summary:before{content:"\25B8";color:var(--brand);font-size:13px;transition:.15s}
.acc[open]>summary:before{transform:rotate(90deg)}
.acc .body{padding:4px 16px 16px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:8px 0}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block}
.scorebox{font-size:34px;font-weight:800;color:var(--brand)}
.note-out{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:10px;max-height:520px;overflow:auto}
.flag{font-size:11px;color:var(--warn);font-weight:700}
.hide{display:none!important}
@media print{.side,.topbar{display:none}.page{display:block!important}.card{break-inside:avoid}}
</style>
</head>

<div class="app">

  <main class="main">

</div>

/* ---------- ANTIMICROBIAL REFERENCE ---------- */
/* cov flags used by Bug-Drug matrix & engine: mssa,mrsa,strep,enteroAmp,enteroVRE,hnpek(enterobacterales),pseudo,esbl,anaerobe,atypical */
const DRUGS = [
 /* ── ANTIBACTERIAL ── */
 {n:"Penicillin G",kind:"Antibacterial",grp:"Penicillins",cls:"Penicillin",route:"IV",dose:"2–4 million units (MU) IV every 4 hours (q4h) (18–24 MU/d for endocarditis/neurosyphilis)",cov:["strep"],pearls:"Drug of choice for susceptible viridans strep / Streptococcus pyogenes (S. pyogenes), neurosyphilis, susceptible enterococcus (with gent or ceftriaxone). Local pneumococcus: 78% S meningeal / 100% non-meningeal."},
 {n:"Ampicillin",kind:"Antibacterial",grp:"Penicillins",cls:"Aminopenicillin",route:"IV/PO",dose:"2 g IV every 4 hours (q4h) (Listeria/endocarditis); 2 g every 6 hours (q6h)",cov:["strep","enteroAmp"],pearls:"Adds Listeria & Enterococcus coverage — reason ampicillin is added to ceftriaxone in meningitis >50y/immunocompromised. Local Enterococcus faecalis (E. faecalis) 100% S; Enterococcus faecium (E. faecium) only 17%."},

 {n:"Amoxicillin-clavulanate",kind:"Antibacterial",grp:"Penicillins",cls:"Aminopenicillin/BLI",route:"PO",dose:"875/125 mg PO twice daily (BID) or 2000/125 mg ER twice daily",cov:["mssa","strep","hnpek","anaerobe"],pearls:"Adds anaerobes + many Enterobacterales + methicillin-susceptible Staphylococcus aureus (MSSA). First-line: bite wounds, sinusitis, mild diabetic foot, outpatient diverticulitis (with/without fluoroquinolone (FQ))."},
 {n:"Ampicillin-sulbactam",kind:"Antibacterial",grp:"Penicillins",cls:"Aminopenicillin/BLI",route:"IV",dose:"3 g IV every 6 hours (q6h)",cov:["mssa","strep","enteroAmp","hnpek","anaerobe"],pearls:"Anaerobe + methicillin-susceptible Staphylococcus aureus (MSSA) + Enterococcus + many gram-negative rods (GNR). Note high Escherichia coli (E. coli) ampicillin resistance regionally. High-dose used for Acinetobacter."},
 {n:"Piperacillin-tazobactam",kind:"Antibacterial",grp:"Penicillins",cls:"Antipseudomonal PCN/BLI",route:"IV",dose:"4.5 g IV every 6 hours (q6h) (or extended 4h infusion)",cov:["mssa","strep","enteroAmp","hnpek","pseudo","anaerobe"],pearls:"Broad: gram-negative rods (GNR) incl Pseudomonas + anaerobes + methicillin-susceptible Staphylococcus aureus (MSSA) + enterococcus. Workhorse for hospital-acquired pneumonia (HAP), intra-abdominal, neutropenic fever, sepsis (no methicillin-resistant Staphylococcus aureus (MRSA)). Avoid relying on it for extended-spectrum beta-lactamase (ESBL) bacteremia."},
 {n:"Cefazolin",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 1",route:"IV",dose:"2 g IV every 8 hours (q8h)",cov:["mssa","strep","hnpek"],pearls:"Drug of choice for methicillin-susceptible Staphylococcus aureus (MSSA) bacteremia/endocarditis & surgical prophylaxis. Local urine Escherichia coli (E. coli) 93% S → predicts cephalexin for cystitis. No enterococcus/methicillin-resistant Staphylococcus aureus (MRSA)/Pseudomonas."},
 {n:"Cephalexin",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 1",route:"PO",dose:"500 mg PO four times daily (QID)",cov:["mssa","strep"],pearls:"PO step-down for methicillin-susceptible Staphylococcus aureus (MSSA) skin and soft tissue infection (SSTI) & cystitis. Cefazolin susceptibility predicts cephalexin."},
 {n:"Cefoxitin",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 2 (cephamycin)",route:"IV",dose:"2 g IV every 6 to 8 hours (q6–8h)",cov:["mssa","strep","hnpek","anaerobe"],pearls:"Has anaerobe coverage. Cephamycins stay active vs many extended-spectrum beta-lactamase (ESBL) in vitro but NOT recommended for extended-spectrum beta-lactamase infections (AmpC inoculum effect)."},
 {n:"Ceftriaxone",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 3",route:"IV",dose:"1 g IV every 24 hours (q24h); 2 g every 12 hours (q12h) (meningitis); 2 g every 24 hours (endocarditis)",cov:["mssa","strep","hnpek"],pearls:"Backbone of community-acquired pneumonia (CAP), meningitis, pyelonephritis, gonorrhea, viridans/enterococcal (with amp) endocarditis. No Pseudomonas/enterococcus/anaerobe. Local Escherichia coli (E. coli) 85% (systemic)."},
 {n:"Ceftazidime",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 3 (antipseudomonal)",route:"IV",dose:"2 g IV every 8 hours (q8h)",cov:["hnpek","pseudo"],pearls:"Antipseudomonal but weak gram-positive — don't use alone empirically when Staph/Strep possible. Pairs with vancomycin for HCAP, etc."},
 {n:"Cefepime",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 4",route:"IV",dose:"2 g IV every 8 hours (q8h) (every 12 hours (q12h) some); 2 g every 8 hours for febrile neutropenia/meningitis",cov:["mssa","strep","hnpek","pseudo"],pearls:"Antipseudomonal + good gram-positive (not methicillin-resistant Staphylococcus aureus (MRSA)/enterococcus). First-line monotherapy for febrile neutropenia, hospital-acquired and ventilator-associated pneumonia (HAP/VAP). Watch neurotoxicity in renal impairment. Preferred over 3rd-gen for AmpC organisms (Enterobacter/Serratia/Citrobacter)."},
 {n:"Ceftaroline",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 5",route:"IV",dose:"600 mg IV every 8 to 12 hours (q8–12h)",cov:["mrsa","mssa","strep","hnpek"],pearls:"The methicillin-resistant Staphylococcus aureus (MRSA)-active cephalosporin. Salvage for methicillin-resistant Staphylococcus aureus bacteremia; no Pseudomonas/enterococcus."},
 {n:"Cefdinir",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 3 (PO)",route:"PO",dose:"300 mg PO twice daily (BID)",cov:["strep","hnpek"],pearls:"Oral cephalosporin for sinusitis and pediatric/penicillin-allergic respiratory infections; inferior to amoxicillin-clavulanate for acute bacterial rhinosinusitis."},
 {n:"Cefpodoxime",kind:"Antibacterial",grp:"Cephalosporins",cls:"Generation 3 (PO)",route:"PO",dose:"200 mg PO twice daily (BID)",cov:["strep","hnpek"],pearls:"Oral cephalosporin for sinusitis and pyelonephritis step-down; useful penicillin-allergic respiratory option."},
 {n:"Meropenem",kind:"Antibacterial",grp:"Carbapenems",cls:"Carbapenem",route:"IV",dose:"1 g IV every 8 hours (q8h); 2 g every 8 hours (meningitis)",cov:["mssa","strep","enteroAmp","hnpek","pseudo","esbl","anaerobe"],pearls:"Broadest beta-lactam: extended-spectrum beta-lactamase (ESBL) drug of choice + Pseudomonas + anaerobes. No methicillin-resistant Staphylococcus aureus (MRSA), no enterococcus faecium, no Steno/atypicals. Local Enterobacterales ~89–100% S."},
 {n:"Ertapenem",kind:"Antibacterial",grp:"Carbapenems",cls:"Carbapenem",route:"IV",dose:"1 g IV every 24 hours (q24h)",cov:["mssa","strep","hnpek","esbl","anaerobe"],pearls:"Once-daily carbapenem for extended-spectrum beta-lactamase (ESBL) — but NO Pseudomonas/Acinetobacter/enterococcus. Convenient outpatient parenteral antibiotic therapy (OPAT) for extended-spectrum beta-lactamase urinary tract infection (UTI)/intra-abdominal."},
 {n:"Aztreonam",kind:"Antibacterial",grp:"Monobactam",cls:"Monobactam",route:"IV",dose:"2 g IV every 8 hours (q8h)",cov:["hnpek","pseudo"],pearls:"Gram-negative only (incl Pseudomonas). Safe in severe penicillin/cephalosporin allergy (no cross-reactivity except ceftazidime side chain). No gram-positive/anaerobe."},
 {n:"Gentamicin",kind:"Antibacterial",grp:"Aminoglycosides",cls:"Aminoglycoside",route:"IV",dose:"5–7 mg/kg every 24 hours (q24h) (extended interval); synergy dosing for endocarditis",cov:["hnpek","pseudo"],pearls:"Gram-negative coverage + synergy (with a cell-wall agent) for gram-positive endocarditis — the preferred aminoglycoside for gram-positive synergy. Nephro/ototoxic — monitor levels."},
 {n:"Tobramycin",kind:"Antibacterial",grp:"Aminoglycosides",cls:"Aminoglycoside",route:"IV",dose:"5–7 mg/kg every 24 hours (q24h) (extended interval)",cov:["hnpek","pseudo"],pearls:"Antipseudomonal aminoglycoside (marginally better than gentamicin vs Pseudomonas). Local Pseudomonas: tobramycin 98%. Nephro/ototoxic — monitor levels."},
 {n:"Amikacin",kind:"Antibacterial",grp:"Aminoglycosides",cls:"Aminoglycoside",route:"IV",dose:"15 mg/kg every 24 hours (q24h)",cov:["hnpek","pseudo"],pearls:"Most stable aminoglycoside vs resistance. Local Pseudomonas 99% S — best gram-negative agent locally for resistant Pseudomonas."},
 {n:"Ciprofloxacin",kind:"Antibacterial",grp:"Fluoroquinolones",cls:"Fluoroquinolone",route:"IV/PO",dose:"400 mg IV every 12 hours (q12h) / 500–750 mg PO twice daily (BID)",cov:["hnpek","pseudo"],pearls:"Best fluoroquinolone (FQ) for Pseudomonas; weak gram-positive. Local Escherichia coli (E. coli) only 70% (systemic)/71% (urine) — too low for empiric urinary tract infection (UTI). ~100% PO bioavailable. QT, tendon, C. diff, aortic risks."},
 {n:"Levofloxacin",kind:"Antibacterial",grp:"Fluoroquinolones",cls:"Respiratory FQ",route:"IV/PO",dose:"750 mg every 24 hours (q24h)",cov:["mssa","strep","hnpek","pseudo","atypical"],pearls:"Respiratory fluoroquinolone: pneumococcus + atypicals + some Pseudomonas. community-acquired pneumonia (CAP) monotherapy option. Same fluoroquinolone class warnings."},
 {n:"Moxifloxacin",kind:"Antibacterial",grp:"Fluoroquinolones",cls:"Respiratory FQ",route:"IV/PO",dose:"400 mg every 24 hours (q24h)",cov:["mssa","strep","hnpek","anaerobe","atypical"],pearls:"Adds anaerobes (intra-abdominal option) but NO reliable Pseudomonas and poor urine levels. community-acquired pneumonia (CAP) & tuberculosis (TB) regimens."},
 {n:"Azithromycin",kind:"Antibacterial",grp:"Macrolides",cls:"Macrolide",route:"IV/PO",dose:"500 mg day 1 then 250 mg; 500 mg IV every 24 hours (q24h)",cov:["atypical","strep"],pearls:"Atypical coverage (Legionella, Mycoplasma, Chlamydophila) — added to ceftriaxone for inpatient community-acquired pneumonia (CAP). Also GC/chlamydia, Mycobacterium avium complex (MAC). QT prolongation."},
 {n:"Doxycycline",kind:"Antibacterial",grp:"Tetracyclines",cls:"Tetracycline",route:"IV/PO",dose:"100 mg twice daily (BID)",cov:["mrsa","mssa","strep","atypical"],pearls:"Versatile PO: community-associated methicillin-resistant Staphylococcus aureus (CA-MRSA) skin and soft tissue infection (SSTI), atypical community-acquired pneumonia (CAP), tick-borne (Lyme, Rocky Mountain spotted fever (RMSF), anaplasma, ehrlichia), syphilis (penicillin (PCN)-allergic). First-line for almost all tick illness."},
 {n:"Clindamycin",kind:"Antibacterial",grp:"Lincosamide",cls:"Lincosamide",route:"IV/PO",dose:"600–900 mg IV every 8 hours (q8h) / 300–450 mg PO four times daily (QID)",cov:["mssa","mrsa","strep","anaerobe"],pearls:"Anti-toxin (adjunct in nec fasc/toxic shock — shuts off toxin production). Above-diaphragm anaerobes. Check D-test for inducible resistance. C. diff risk highest."},
 {n:"Vancomycin",kind:"Antibacterial",grp:"Glycopeptide",cls:"Glycopeptide",route:"IV/PO",dose:"IV: 15–20 mg/kg every 8 to 12 hours (q8–12h), area under the curve to minimum inhibitory concentration ratio (AUC/MIC) 400–600 target.  PO: 125 mg four times daily (QID) for Clostridioides difficile infection (CDI); 500 mg four times daily (fulminant)",cov:["mrsa","mssa","strep","enteroAmp"],pearls:"IV vancomycin = empiric methicillin-resistant Staphylococcus aureus (MRSA) coverage (follow AUC-based dosing; nephrotoxic with pip-tazo; not for Enterococcus faecium if vancomycin-resistant (VRE)). ORAL vancomycin is NOT absorbed — used ONLY for Clostridioides difficile (first-line per 2017 IDSA/SHEA) and has NO systemic spectrum. Local methicillin-resistant Staphylococcus aureus & coagulase-negative staphylococci (CoNS) 98–100% S."},
 {n:"Daptomycin",kind:"Antibacterial",grp:"Lipopeptide",cls:"Lipopeptide",route:"IV",dose:"6 mg/kg (8–10 mg/kg for bacteremia/endocarditis/vancomycin-resistant enterococci (VRE)) IV every 24 hours (q24h)",cov:["mrsa","mssa","strep","enteroAmp","enteroVRE"],pearls:"methicillin-resistant Staphylococcus aureus (MRSA) bacteremia/endocarditis & vancomycin-resistant enterococci option. INACTIVATED by surfactant → NEVER for pneumonia. Follow weekly creatine phosphokinase (CPK). Local Staph 100% S."},
 {n:"Linezolid",kind:"Antibacterial",grp:"Oxazolidinone",cls:"Oxazolidinone",route:"IV/PO",dose:"600 mg every 12 hours (q12h)",cov:["mrsa","mssa","strep","enteroAmp","enteroVRE"],pearls:"methicillin-resistant Staphylococcus aureus (MRSA) + vancomycin-resistant enterococci (VRE), 100% PO bioavailable. Good lung/skin penetration. Watch cytopenias >14d, serotonin syndrome (MAOI), peripheral/optic neuropathy."},
 {n:"Metronidazole",kind:"Antibacterial",grp:"Nitroimidazole",cls:"Nitroimidazole",route:"IV/PO",dose:"500 mg every 8 hours (q8h)",cov:["anaerobe"],pearls:"Below-diaphragm anaerobes (Bacteroides fragilis (B. fragilis)), added to ceftriaxone/cipro for intra-abdominal. Also giardia, amoeba, trich, BV. No longer first-line for Clostridioides difficile infection (CDI). Disulfiram-like w/ alcohol."},
 {n:"trimethoprim-sulfamethoxazole (TMP-SMX)",kind:"Antibacterial",grp:"Folate antagonist",cls:"Folate antagonist",route:"IV/PO",dose:"1–2 DS PO twice daily (BID); 15–20 mg/kg/d (TMP) for Pneumocystis jirovecii pneumonia (PJP)",cov:["mrsa","mssa","hnpek"],pearls:"community-associated methicillin-resistant Staphylococcus aureus (CA-MRSA) skin and soft tissue infection (SSTI), Pneumocystis jirovecii pneumonia treatment/prophylaxis, Stenotrophomonas (local 79%), Nocardia, some urinary tract infection (UTI). Local urine Escherichia coli (E. coli) 72% — borderline empiric. Hyperkalemia, ↑Cr, marrow suppression."},
 {n:"Nitrofurantoin",kind:"Antibacterial",grp:"Urinary agents",cls:"Urinary agent",route:"PO",dose:"100 mg twice daily (BID) (macrocrystal) ×5d",cov:["enteroAmp"],pearls:"CYSTITIS ONLY (no tissue/kidney levels → not for pyelonephritis/bacteremia). Local Escherichia coli (E. coli) 98%, Enterococcus faecalis (E. faecalis) 100% — but Klebsiella 26%, Proteus 0%, Serratia 0% (avoid). Avoid if creatinine clearance (CrCl)<30."},
 {n:"Fosfomycin",kind:"Antibacterial",grp:"Urinary agents",cls:"Urinary agent",route:"PO",dose:"3 g PO ×1 (cystitis)",cov:["enteroAmp","esbl"],pearls:"Single-dose cystitis; retains activity vs many extended-spectrum beta-lactamase (ESBL) Escherichia coli (E. coli) & vancomycin-resistant enterococci (VRE). Cystitis only."},
 /* ── ANTIFUNGAL ── */
 {n:"Fluconazole",kind:"Antifungal",grp:"Azoles",cls:"Azole",route:"IV/PO",dose:"800 mg (12 mg/kg) load → 400 mg (6 mg/kg) every 24 hours (q24h)",cov:[],pearls:"Candida albicans (C. albicans)/parapsilosis; step-down for stable candidemia once susceptible. No mold/Candida glabrata (C. glabrata)-krusei reliability. ~100% PO bioavailable."},
 {n:"Micafungin",kind:"Antifungal",grp:"Echinocandins",cls:"Echinocandin",route:"IV",dose:"100 mg IV every 24 hours (q24h)",cov:[],pearls:"First-line for candidemia/invasive candidiasis (per 2016 Infectious Diseases Society of America (IDSA)) incl. most Candida glabrata (C. glabrata)/krusei. Poor urine & central nervous system (CNS)/eye penetration. Not for cryptococcus/mold."},
 /* ── ANTIVIRAL ── */
 {n:"Acyclovir",kind:"Antiviral",grp:"Antivirals",cls:"Nucleoside analogue",route:"IV/PO",dose:"10 mg/kg IV every 8 hours (q8h) (herpes simplex virus (HSV) encephalitis); IBW dosing, hydrate",cov:[],pearls:"Empiric in suspected herpes simplex virus encephalitis — start immediately, don't wait for polymerase chain reaction (PCR). Maintain hydration to avoid crystal nephropathy."}

 {id:"sepsis",name:"Sepsis & Bacteremia — empiric approach",cat:"Systemic",src:"carb",src2:"sepsis2021",
  suspect:["Suspected infection + organ dysfunction (qSOFA ≥2: respiratory rate (RR)≥22, systolic blood pressure (SBP)≤100, altered mentation; or SOFA↑≥2).","Lactate, hypotension, or new end-organ dysfunction.","Surviving Sepsis 2021 recommends AGAINST using qSOFA as the SOLE screening tool (specific but insensitive) — screen with a tool/protocol such as systemic inflammatory response syndrome (SIRS), National Early Warning Score (NEWS), or Modified Early Warning Score (MEWS) plus clinical judgment, and use qSOFA/SOFA to gauge severity rather than to rule sepsis out."],
  workup:["Two sets of blood cultures BEFORE antibiotics (do not delay antibiotics (abx) >45 min in septic shock).","Lactate; repeat if >2. complete blood count (CBC), comprehensive metabolic panel (CMP), coags, UA/urine cx, chest radiograph (CXR); source-directed imaging/cultures.","Identify source: lines, lungs, urine, abdomen, skin, central nervous system (CNS), bone/joint.","Source control (drain abscess, remove infected line, relieve obstruction) is as important as antibiotics.","Surviving Sepsis 2021 antimicrobial timing: septic shock OR high likelihood of sepsis → antimicrobials IMMEDIATELY (ideally within 1 hour). Possible sepsis WITHOUT shock → rapid, time-limited workup, then antimicrobials within 3 hours if infection concern persists. LOW likelihood of infection without shock → DEFER antimicrobials and monitor closely.","Give ≥30 mL/kg IV crystalloid within the first 3 hours for hypotension or lactate ≥4; PREFER balanced crystalloids over 0.9% saline (add albumin if large volumes are needed; avoid starches). Guide ongoing resuscitation with dynamic measures, lactate clearance, and capillary refill time — not static pressures alone."],
  empiric:[
   {set:"Community sepsis, source unclear",rx:"Ceftriaxone 2 g intravenous (IV) every 24 hours (q24h) ± metronidazole (if abdominal) + vancomycin if methicillin-resistant Staphylococcus aureus (MRSA) risk/skin source",why:"Covers common Enterobacterales + pneumococcus; local Escherichia coli (E. coli) ceftriaxone 85%."},
   {set:"Healthcare-associated / prior resistant organisms / neutropenia",rx:"Cefepime 2 g every 8 hours (q8h) OR piperacillin-tazobactam 4.5 g every 6 hours (q6h) + Vancomycin",why:"Adds Pseudomonas + methicillin-resistant Staphylococcus aureus. Local Pseudomonas: cefepime 87%, pip-tazo via amikacin 99% if double-coverage needed."},
   {set:"Known/suspected extended-spectrum beta-lactamase (ESBL)",rx:"Meropenem 1 g every 8 hours (+ vancomycin (vanc) if gram-positive cocci (GPC))",why:"47 systemic / 314 urine extended-spectrum beta-lactamase isolates locally — carbapenem is reliable; cefepime/pip-tazo unreliable for extended-spectrum beta-lactamase bacteremia."}],
  definitive:["De-escalate at 48–72h to narrowest agent per culture & susceptibility; reassess DAILY for de-escalation rather than using a fixed duration.","Source control + shortest effective course. Stop empiric methicillin-resistant Staphylococcus aureus/Pseudomonas coverage if cultures negative. Where the optimal duration is unclear, procalcitonin PLUS clinical evaluation (over clinical evaluation alone) can help decide when to stop (Surviving Sepsis 2021)."],
  duration:"Typically 7 days for uncomplicated gram-negative rods (GNR) bacteremia with source control (per recent trials); longer for endovascular/undrained source. Staphylococcus aureus (S. aureus) bacteremia ≥14 days from first negative culture.",
  pearls:["Repeat blood cultures to document clearance for Staphylococcus aureus, Candida, and persistent bacteremia.","Every Staphylococcus aureus bacteremia warrants an infectious disease (ID) consult + echocardiography (echo) + source evaluation.","methicillin-resistant Staphylococcus aureus (MRSA) bacteremia: vancomycin (area under the curve (AUC)-dosed) OR daptomycin 6 mg/kg (NOT daptomycin for a pulmonary source — surfactant inactivates it); ≥2 weeks for uncomplicated, 4–6 weeks if complicated/endovascular. Do NOT add gentamicin or rifampin to vancomycin for native-valve MRSA bacteremia/endocarditis (no benefit, more toxicity). Persistent bacteremia / vancomycin failure → re-image for an undrained focus + source control, then high-dose daptomycin 8–10 mg/kg ± a second agent (e.g., ceftaroline) (IDSA MRSA 2011).","Antibiotic timing, source control, and de-escalation are the core stewardship levers (CARB national action plan).","Norepinephrine is the first-line vasopressor (target mean arterial pressure (MAP) ≥65); ADD vasopressin when norepinephrine reaches ~0.25–0.5 µg/kg/min (rather than escalating norepinephrine further), then add epinephrine if the MAP target is still unmet. Start vasopressors PERIPHERALLY rather than delaying for central access. Add dobutamine (or switch to epinephrine) for cardiac dysfunction with persistent hypoperfusion despite adequate fluid + pressors (Surviving Sepsis 2021).","Septic shock with an ONGOING vasopressor requirement (norepinephrine/epinephrine ≥0.25 µg/kg/min for ≥4 h): add IV hydrocortisone 200 mg/day (50 mg every 6 h or a continuous infusion) (Surviving Sepsis 2021).","SSC 2021 empiric tailoring: add methicillin-resistant Staphylococcus aureus (MRSA) coverage only with MRSA risk; use double gram-negative/antipseudomonal coverage only with high multidrug-resistance risk; add an antifungal only with high fungal-infection risk; consider extended/prolonged-infusion beta-lactams (after a loading dose)."],
  consult:["Frame: Host (immune status, devices) → Syndrome (source) → Organism → Drug/Source control.","Document de-escalation plan and planned duration with a stop date."]},

 {id:"meningitis",name:"Acute Bacterial Meningitis",cat:"Neurological",src:"meningitis",
  suspect:["Classic triad = fever + neck stiffness + altered mental status — all three present in <50%; but ~95% have at least two of headache, fever, neck stiffness, or altered mental status (van de Beek; McGill/Lancet 2016).","Photophobia, seizures, focal deficits, petechial rash (meningococcus). Kernig/Brudzinski signs are specific but insensitive (sensitivity as low as 5%) — do NOT use them to rule out meningitis."],
  workup:["DON'T delay antibiotics for lumbar puncture (LP)/computed tomography (CT). Obtain blood cultures → empiric antibiotics (abx) + dexamethasone immediately.","computed tomography head BEFORE lumbar puncture if: immunocompromised, central nervous system (CNS) disease, new seizure, papilledema, focal deficit, Glasgow Coma Scale (GCS)<15.","lumbar puncture: opening pressure, cell count/diff, glucose (vs serum), protein, Gram stain & culture; meningitis/encephalitis multiplex polymerase chain reaction (PCR). cerebrospinal fluid (CSF) lactate (drawn before antibiotics) helps separate bacterial from viral meningitis (sensitivity ~93%, specificity ~96%) and — unlike glucose — is not affected by the serum level.","Bacterial cerebrospinal fluid (CSF) pattern: white blood cell count (WBC) 1000–5000 (neutrophilic), glucose <40 / cerebrospinal fluid:serum <0.4, protein >100–500."],
  empiric:[
   {set:"Adult 2–50 y, immunocompetent",rx:"Vancomycin (area under the curve (AUC)-dosed) + Ceftriaxone 2 g intravenous (IV) every 12 hours (q12h) + Dexamethasone 10 mg intravenous every 6 hours (q6h) ×4d (with/just before 1st dose)",why:"Covers Streptococcus pneumoniae (S. pneumoniae) (incl. resistant) + Neisseria meningitidis (N. meningitidis). Dexamethasone reduces mortality/hearing loss in pneumococcal meningitis."},
   {set:">50 y, alcohol, pregnancy, or immunocompromised",rx:"Add Ampicillin 2 g intravenous every 4 hours (q4h)",why:"Adds Listeria monocytogenes coverage."},
   {set:"Post-neurosurgery / penetrating trauma / shunt",rx:"Vancomycin + Cefepime 2 g every 8 hours (q8h) (or meropenem)",why:"Adds nosocomial gram-negative rods (GNR) incl. Pseudomonas + staph."}],
  definitive:["Pneumococcus: penicillin if minimum inhibitory concentration (MIC) susceptible, else ceftriaxone ± vancomycin (vanc) per cerebrospinal fluid breakpoints (local CTX 100%).","Meningococcus: ceftriaxone (penicillin if susceptible). Listeria: ampicillin + gentamicin. Continue dexamethasone only if pneumococcal."],
  duration:"Neisseria meningitidis 7 d; Haemophilus influenzae (H. influenzae) 7 d; Streptococcus pneumoniae 10–14 d; Listeria ≥21 d; gram-negative rods 21 d.",
  pearls:["Give dexamethasone with or before the first antibiotic dose — not after.","Add acyclovir if encephalitis features (altered behavior, focal findings, seizures).","Notify public health for meningococcus; droplet precautions + chemoprophylaxis for close contacts.","Healthcare-associated / post-neurosurgical methicillin-resistant Staphylococcus aureus meningitis: vancomycin ×2 weeks ± rifampin (alternatives linezolid or trimethoprim-sulfamethoxazole — both penetrate cerebrospinal fluid). For a cerebrospinal fluid shunt infection, REMOVE the shunt and do not replace it until cerebrospinal fluid cultures are repeatedly negative (IDSA MRSA 2011)."],
  consult:["Confirm steroid timing and duration; ensure isolation and contact prophylaxis addressed.","Plan repeat lumbar puncture only if no clinical improvement at 48h or resistant pneumococcus."]},

 {id:"encephalitis",name:"Acute Encephalitis",cat:"Neurological",src:"enceph",src2:"mksap",
  suspect:["Required major criterion: altered mental status (decreased/altered consciousness, lethargy, or personality change) lasting ≥24h with no alternative cause. Minor criteria — fever ≥38°C within 72h, new seizures, new focal neuro findings, cerebrospinal fluid (CSF) white blood cell count (WBC) ≥5/mm³, or new neuroimaging/EEG changes: ≥2 = possible, ≥3 = probable/confirmed encephalitis (International Encephalitis Consortium 2013).","Encephalitis = brain parenchyma (altered cognition/behavior); meningitis = meninges (meningismus). Always exclude mimics: vascular disease, systemic infection/sepsis without CNS infection, toxic exposures, and metabolic derangements."],
  workup:["Empiric intravenous (IV) acyclovir 10 mg/kg every 8 hours (q8h) immediately for possible herpes simplex virus (HSV) — do not wait for polymerase chain reaction (PCR).","lumbar puncture (LP) in ALL unless contraindicated (significant mass effect/edema, effaced basal cisterns, or skin/soft-tissue infection in the needle path): opening pressure, cell count/diff, protein, glucose, Gram stain & culture; cerebrospinal fluid (CSF) herpes simplex virus-1/2, varicella-zoster virus (VZV) and enterovirus polymerase chain reaction; cryptococcal antigen, VDRL, oligoclonal bands/IgG index.","In EVERY patient also send blood cultures, human immunodeficiency virus (HIV) testing (consider RNA), and syphilis serology; hold acute serum for paired convalescent serology at 10–21 days. magnetic resonance imaging (MRI) brain (preferred to CT; herpes simplex virus → temporal lobe) + chest imaging (focal infiltrates suggest fungal/mycobacterial) + EEG (PLEDs).","Typical viral CSF = lymphocytic/mononuclear pleocytosis (often <200 cells/mm³; occasionally >1000 with mumps/lymphocytic choriomeningitis) — but neutrophils can predominate in the first 24h, so early neutrophilic CSF does not exclude viral encephalitis.","Send autoimmune encephalitis antibodies (serum AND cerebrospinal fluid) if infectious workup is negative or psychosis, movement disorder/orofacial dyskinesia, or autonomic instability is present.","Broaden by season/exposure/geography: arboviruses (West Nile — diagnose by serum & cerebrospinal fluid IgM serology, NOT PCR), tick-borne (Powassan), travel including remote travel (Japanese encephalitis, rabies, malaria), immune status (toxoplasma, cytomegalovirus (CMV), human herpesvirus (HHV) 6/7, JC, cryptococcus)."],
  empiric:[{set:"All suspected encephalitis",rx:"Acyclovir 10 mg/kg intravenous every 8 hours (IBW; hydrate) + cover bacterial meningitis if cannot exclude",why:"herpes simplex virus encephalitis untreated mortality ~70%; delayed acyclovir increases death and severe disability — early acyclovir is the key intervention."}],
  definitive:["herpes simplex virus confirmed: acyclovir ×14–21 d (consider repeat cerebrospinal fluid polymerase chain reaction before stopping).","Negative herpes simplex virus polymerase chain reaction early can be falsely negative <72h — repeat the lumbar puncture in 3–7 d if suspicion is high.","Autoimmune (anti-NMDA receptor / limbic) encephalitis: first-line corticosteroids (methylprednisolone 1 g intravenous daily ×5 d), IV immunoglobulin (2 g/kg over 5 d), and/or plasma exchange; second-line rituximab or cyclophosphamide; resect the tumor in paraneoplastic disease."],
  duration:"herpes simplex virus: 14–21 days intravenous.",
  pearls:["A negative herpes simplex virus polymerase chain reaction in the first 72h does not exclude herpes simplex virus — continue acyclovir and repeat the lumbar puncture in 3–7 days.","One-third of herpes simplex virus encephalitis patients later develop anti-NMDA receptor antibodies — test for autoimmune encephalitis if there is neurologic relapse or a new movement disorder after appropriate herpes simplex virus treatment.","Manage with the 3 E's — Emergent issues (ABCs, intracranial pressure/mass effect with mannitol or hypertonic saline; ~25% need intensive care unit (ICU)), Epilepsy (status epilepticus in ~15% of critically ill — continuous EEG; benzodiazepine → fosphenytoin/levetiracetam/valproate → anesthetic), and Etiology.","varicella-zoster virus is a commonly missed, treatable cause of encephalitis that can occur WITHOUT a rash (zoster sine herpete) — send cerebrospinal fluid varicella-zoster virus polymerase chain reaction AND cerebrospinal fluid varicella-zoster virus immunoglobulin G (IgG) (more sensitive than PCR) and treat with intravenous acyclovir.","West Nile virus is the most common arboviral encephalitis in the United States (late summer/fall), classically with acute flaccid paralysis; care is supportive.","Don't-miss exposures: warm-freshwater swimming or nasal/sinus irrigation → Naegleria fowleri (primary amebic meningoencephalitis); cat contact (especially with seizures and paucicellular cerebrospinal fluid) → Bartonella; animal or bat bite → rabies (almost universally fatal once symptomatic — wound care + rabies immune globulin + vaccine after exposure)."],
  consult:["Coordinate with Neurology and neurocritical care; ensure acyclovir is dosed on IBW with hydration and renal monitoring, and address intracranial pressure, status epilepticus, and immunotherapy decisions."]},

 {id:"cap",name:"Community-Acquired Pneumonia",cat:"Respiratory",src:"cap",
  suspect:["Cough, purulent sputum, dyspnea, pleuritic chest pain, fever/chills (sensitivity 50–85% — fever may be ABSENT in the elderly) + a new infiltrate on imaging.","Elderly or chronically ill patients may present with NO respiratory symptoms — only confusion, weakness, falls, poor oral intake, or decompensation of a chronic illness (e.g., heart failure). Hemoptysis suggests necrotizing infection (lung abscess, tuberculosis, gram-negative).","Assess severity to choose the site of care (home vs ward vs intensive care unit (ICU))."],
  workup:["chest radiograph (CXR): an infiltrate supports the diagnosis but can be falsely negative early — if the history and focal exam are convincing, treat and repeat imaging. Pulse oximetry is the only test usually needed for outpatients; add complete blood count (CBC), basic metabolic panel (BMP), and lactate if ill.","Severity: CURB-65 / pneumonia severity index (PSI) (see Scores). Severe CAP (IDSA/ATS) = 1 major (mechanical ventilation or septic shock on vasopressors) OR ≥3 minor (respiratory rate ≥30, PaO2/FiO2 ≤250, multilobar infiltrates, confusion, blood urea nitrogen ≥20 mg/dL, white blood cell count <4, platelets <100, temperature <36°C, hypotension needing aggressive fluids) → ICU.","If severe: two sets of blood cultures + urinary Legionella and pneumococcal antigens (blood cultures positive in only 10–20%); good-quality sputum Gram stain/culture before antibiotics; culture an endotracheal aspirate if intubated. Do NOT send viral/atypical serologies (need convalescent titers).","Predict the likely pathogen: drug-resistant pneumococcus (age >65, beta-lactam in the last 3 months, alcoholism, immunosuppression/steroids, multiple comorbidities, day-care contact); Pseudomonas (structural lung disease/bronchiectasis, prednisone >10 mg/d, broad-spectrum antibiotics >7 d in the last month, malnutrition); Klebsiella (alcoholism); post-influenza necrotizing methicillin-resistant Staphylococcus aureus (MRSA).","Consider procalcitonin (helps start and time-limit antibiotics — discourage if <0.25 µg/L), viral polymerase chain reaction (PCR) (influenza/COVID/respiratory syncytial virus (RSV)); methicillin-resistant Staphylococcus aureus (MRSA) nares polymerase chain reaction to help de-escalate empiric vancomycin (vanc)."],
  severity:"CURB-65",
  empiric:[
   {set:"Outpatient, no comorbidities",rx:"Amoxicillin 1 g three times daily (TID) OR doxycycline 100 mg twice daily (BID) OR azithromycin (only if local pneumococcal macrolide R <25%)",why:"Targets pneumococcus + atypicals (2019 American Thoracic Society (ATS)/Infectious Diseases Society of America (IDSA))."},
   {set:"Outpatient w/ comorbidities",rx:"Amox-clav (or cefpodoxime) + azithromycin/doxycycline, OR respiratory fluoroquinolone (FQ) (levofloxacin 750)",why:"Beta-lactam + atypical, or fluoroquinolone monotherapy. If an antibiotic was used in the last 3 months, switch to a different class."},
   {set:"Inpatient, non-severe",rx:"Ceftriaxone 1–2 g intravenous (IV) every 24 hours (q24h) + Azithromycin 500 mg every 24 hours (or levofloxacin monotherapy)",why:"Standard inpatient combo; adding a macrolide to the beta-lactam lowers mortality even in bacteremic pneumococcal pneumonia. Local pneumococcus ceftriaxone 100%; avoid cefuroxime for bacteremic resistant pneumococcus."},
   {set:"Severe / intensive care unit (ICU)",rx:"Ceftriaxone + Azithromycin (or + respiratory fluoroquinolone). Add methicillin-resistant Staphylococcus aureus (vancomycin/linezolid) and antipseudomonal (cefepime/pip-tazo) only if risk factors / prior isolation.",why:"No ICU patient should receive monotherapy. Routine methicillin-resistant Staphylococcus aureus/Pseudomonas coverage NOT recommended without risk factors (2019 American Thoracic Society (ATS)/Infectious Diseases Society of America (IDSA)). For post-influenza necrotizing CA-methicillin-resistant Staphylococcus aureus, use linezolid or vancomycin + clindamycin (toxin suppression)."}],
  definitive:["De-escalate using cultures, methicillin-resistant Staphylococcus aureus nares (high NPV), and clinical response. Stop atypical coverage if an alternative diagnosis is found.","Switch to oral once cough/sputum/dyspnea are improving, the patient is afebrile on 2 occasions 8h apart, and able to take by mouth (PO) — often by 24–48h."],
  duration:"Minimum 5 days; afebrile 48–72h and clinically stable before stopping (total usually 5–7 days). Longer for Pseudomonas, Staphylococcus aureus, or complications (empyema, abscess, meningitis).",
  pearls:["HCAP is obsolete — use the community-acquired pneumonia (CAP) pathway + individual methicillin-resistant Staphylococcus aureus/Pseudomonas risk factors.","A negative methicillin-resistant Staphylococcus aureus nares polymerase chain reaction allows stopping empiric vancomycin in most community-acquired pneumonia.","Empirically cover methicillin-resistant Staphylococcus aureus in SEVERE community-acquired pneumonia with necrotizing/cavitary infiltrates or empyema (and post-influenza): vancomycin (area under the curve (AUC)-dosed) OR linezolid OR clindamycin if susceptible, for 7–21 days; drain an empyema. Linezolid or clindamycin adds toxin suppression in necrotizing disease (IDSA MRSA 2011).","Always assess for influenza in season and treat empirically if severe.","If there is no improvement by 48–72h, broaden the differential: resistant/unusual organisms (tuberculosis — which can be partially masked by fluoroquinolone monotherapy — and endemic fungi) and noninfectious mimics (organizing pneumonia, vasculitis, lung cancer, heart failure, pulmonary embolism).","Adjunctive corticosteroids are NOT routine, but may reduce treatment failure in severe CAP with a high inflammatory response (C-reactive protein >150 mg/L); also consider them for pneumococcal pneumonia with meningitis or suspected adrenal insufficiency.","Obtain a follow-up chest radiograph at 4–6 weeks (not sooner) in smokers and older adults to confirm resolution and exclude an underlying malignancy — radiographic clearing lags clinical recovery by 6–8 weeks.","Prevent recurrence: pneumococcal (PCV-13 + PPSV-23) and annual influenza vaccination, plus smoking cessation (smoking is a risk factor for bacteremic pneumococcal disease). ~1 in 5 patients with pneumococcal pneumonia has a major cardiac event (myocardial infarction, new atrial fibrillation, or heart failure)."],
  consult:["Address de-escalation, duration, and whether broad coverage can stop; evaluate for complications (parapneumonic effusion/empyema → thoracentesis, chest tube if complicated). Consider an infectious disease/pulmonary consult for non-responders or unusual pathogens."]},

 {id:"hap",name:"Hospital-Acquired / Ventilator-Associated Pneumonia",cat:"Respiratory",src:"hapvap",
  suspect:["New infiltrate + ≥48h after admission (hospital-acquired pneumonia (HAP)) or ≥48h after intubation (ventilator-associated pneumonia (VAP)) with fever, leukocytosis, purulent secretions, ↓oxygenation."],
  workup:["Lower-respiratory sample for culture BEFORE/at antibiotics (abx) start — noninvasive sampling (endotracheal aspirate) with SEMIquantitative culture is preferred over bronchoscopic/quantitative; plus blood cultures.","Decide whether to START antibiotics on CLINICAL criteria alone — do NOT use procalcitonin, C-reactive protein, or the Clinical Pulmonary Infection Score (CPIS) to make the start decision.","Use the local antibiogram to guide empiric therapy (2016 Infectious Diseases Society of America (IDSA)/American Thoracic Society (ATS)). Multidrug-resistant (MDR) risk: prior intravenous (IV) antibiotics in 90d, septic shock, ARDS, ≥5d hospitalization, or acute renal replacement therapy (RRT) before onset."],
  empiric:[
   {set:"Empiric hospital-acquired and ventilator-associated pneumonia (HAP/VAP) — cover Pseudomonas + methicillin-susceptible Staphylococcus aureus (MSSA)",rx:"Cefepime 2 g intravenous every 8 hours (q8h) OR Piperacillin-tazobactam 4.5 g every 6 hours (q6h)",why:"Antipseudomonal beta-lactam; local Pseudomonas cefepime 87%, meropenem 89%."},
   {set:"Add methicillin-resistant Staphylococcus aureus (MRSA) coverage if risk (prior intravenous antibiotics 90d, methicillin-resistant Staphylococcus aureus prevalence >10–20% or unknown, severe)",rx:"+ Vancomycin (area under the curve (AUC)) OR Linezolid 600 mg every 12 hours (q12h)",why:"Local methicillin-resistant Staphylococcus aureus 0% oxacillin, vancomycin (vanc) 100%. Linezolid preferred if acute kidney injury (AKI) / better lung levels."},
   {set:"Add 2nd antipseudomonal (double coverage) — only for defined triggers",rx:"+ Amikacin (99% local) OR ciprofloxacin/tobramycin (a different class from the beta-lactam) — empiric only, then narrow",why:"Use 2 antipseudomonals empirically ONLY with a multidrug-resistant risk factor, unit Gram-negative resistance >10% (or unknown local susceptibility), or structural lung disease (bronchiectasis/cystic fibrosis); otherwise a single antipseudomonal suffices. De-escalate to one once susceptibilities known."}],
  definitive:["De-escalate to a single agent per culture; stop methicillin-resistant Staphylococcus aureus coverage if methicillin-resistant Staphylococcus aureus is not isolated.","Culture-proven Pseudomonas: use MONOTHERAPY (an agent the isolate is susceptible to) — continue combination therapy only if the patient remains in septic shock or at high risk of death (>25% mortality risk).","NEVER use daptomycin for pneumonia (surfactant inactivation). For Gram-negatives susceptible only to aminoglycosides or polymyxins, ADD an inhaled antibiotic (e.g., inhaled colistin or aminoglycoside) to systemic therapy."],
  duration:"7 days for most hospital-acquired and ventilator-associated pneumonia (including Pseudomonas) per 2016 Infectious Diseases Society of America/American Thoracic Society if good clinical response; procalcitonin plus clinical criteria can guide STOPPING/shortening (procalcitonin is not used to decide whether to start).",
  pearls:["Empiric regimen should be antibiogram-driven — this hospital's Pseudomonas data favors cefepime + amikacin.","Avoid double gram-positive coverage; avoid aminoglycoside monotherapy for pneumonia."],
  consult:["Confirm appropriateness of double coverage and de-escalation timeline; reassess at 48–72h with cultures."]},

 {id:"uti",name:"Urinary Tract Infection (cystitis, pyelonephritis, complicated, catheter-associated urinary tract infection (CAUTI))",cat:"Genitourinary",src:"uti",src2:"utiIDSA",
  suspect:["Cystitis: dysuria, frequency, urgency, suprapubic pain, no fever/flank pain. Dysuria + frequency WITHOUT vaginal discharge or irritation makes cystitis highly likely — treat empirically, no culture needed. Vaginal discharge/irritation → consider vaginitis or cervicitis/STI instead.","Pyelonephritis: fever, flank pain, CVA tenderness ± systemic illness.","Asymptomatic bacteriuria: treat ONLY in pregnancy or before a urologic procedure with mucosal trauma."],
  workup:["UA (pyuria/nitrites) + urine culture (before antibiotics (abx)) for pyelonephritis/complicated/recurrent.","'Complicated' = male, pregnancy, obstruction, stones, catheter, immunocompromise, recent instrumentation.","catheter-associated urinary tract infection: culture from freshly replaced catheter; pyuria alone does NOT define infection."],
  empiric:[
   {set:"Uncomplicated cystitis (women)",rx:"Nitrofurantoin 100 mg twice daily (BID) ×5d  •  trimethoprim-sulfamethoxazole (TMP-SMX) DS twice daily ×3d (if local R<20%)  •  Fosfomycin 3 g ×1",why:"Local urine Escherichia coli (E. coli): nitrofurantoin 98%, trimethoprim-sulfamethoxazole 72% (borderline), ciprofloxacin 71% (avoid empiric). Spare fluoroquinolones. Avoid trimethoprim-sulfamethoxazole if local resistance >20% OR it was used in the past 3 months. Oral beta-lactams (amoxicillin-clavulanate, cefdinir, cefpodoxime) are inferior alternatives for when first-line agents can't be used; do NOT use amoxicillin/ampicillin empirically (high resistance)."},
   {set:"Pyelonephritis (outpatient)",rx:"Ceftriaxone 1 g intravenous (IV) ×1 then by mouth (PO) (cefpodoxime, or fluoroquinolone (FQ) if local R low). Avoid nitrofurantoin (no renal tissue levels).",why:"Need an agent with renal parenchymal levels; nitrofurantoin & fosfomycin are cystitis-only. Always send a urine culture. If local fluoroquinolone resistance >10%, give an initial IV long-acting dose (ceftriaxone 1 g or a once-daily aminoglycoside) first. Oral trimethoprim-sulfamethoxazole ×14 days only if the isolate is susceptible (give an initial IV dose if susceptibility is unknown)."},
   {set:"Pyelonephritis/complicated (inpatient)",rx:"Ceftriaxone 1 g every 24 hours (q24h); if Pseudomonas/resistance risk → cefepime or pip-tazo; if extended-spectrum beta-lactamase (ESBL) risk → ertapenem/meropenem",why:"Local urine extended-spectrum beta-lactamase = 314 isolates; carbapenem reliable for extended-spectrum beta-lactamase urinary tract infection (UTI). Escherichia coli ceftriaxone 81%."}],
  definitive:["Narrow to by mouth agent per culture once afebrile/improving. Remove or replace catheter for catheter-associated urinary tract infection.","Klebsiella, Proteus, Serratia, Morganella → nitrofurantoin NOT reliable (local Kleb 26%, Proteus 0%, Serratia 0%).","Recurrent urinary tract infection (≥2 in 6 months or ≥3 in 1 year): behavioral measures; TOPICAL vaginal estrogen in postmenopausal women; continuous or postcoital antimicrobial prophylaxis (e.g., low-dose trimethoprim-sulfamethoxazole or nitrofurantoin); self-diagnosis/self-start therapy is reasonable in reliable patients. Cranberry and methenamine have limited/modest evidence."],
  duration:"Cystitis 3–5 d; pyelonephritis 5–7 d (fluoroquinolone 5–7, beta-lactam 7, trimethoprim-sulfamethoxazole 14); complicated 7–14 d; men 7–14 d.",
  pearls:["Don't treat asymptomatic bacteriuria (except pregnancy / pre-urologic procedure) — major stewardship target.","Nitrofurantoin & fosfomycin: cystitis only — never for pyelonephritis or bacteremia.","Local cipro Escherichia coli ~70% makes fluoroquinolones a poor empiric choice for urinary tract infection here.","Pregnancy: screen for and TREAT asymptomatic bacteriuria and cystitis; nitrofurantoin and beta-lactams are commonly used — avoid fluoroquinolones, and avoid trimethoprim-sulfamethoxazole in the first trimester and near term."],
  consult:["For recurrent/complicated/extended-spectrum beta-lactamase urinary tract infection: confirm source (obstruction, stone, retained catheter) and tailor duration."]},

 {id:"ssti",name:"Skin & Soft Tissue Infection (cellulitis, abscess, necrotizing)",cat:"Skin, Soft Tissue, and Bone",src:"ssti",src2:"sstiIDSA",
  suspect:["Non-purulent cellulitis (β-hemolytic strep, methicillin-susceptible Staphylococcus aureus (MSSA)) vs purulent (abscess/furuncle → Staphylococcus aureus (S. aureus) incl methicillin-resistant Staphylococcus aureus (MRSA)).","Erysipelas is a superficial variant (upper dermis + lymphatics) with a raised, sharply-demarcated border — almost always β-hemolytic streptococci → penicillin/amoxicillin.","RED FLAGS for necrotizing: pain out of proportion, rapid progression, bullae, crepitus, skin necrosis, systemic toxicity, ↑lactate/creatine kinase (CK)."],
  workup:["Clinical diagnosis. Purulent → incision and drainage (I&D) + culture the pus. Mark borders; assess for abscess (point-of-care ultrasound (POCUS)).","Blood cultures, cutaneous aspirates, biopsies, and swabs are NOT routine for typical cellulitis (low yield — blood cultures positive <10%). DO obtain blood cultures (± aspirate/biopsy) in malignancy/chemotherapy, neutropenia, severe cell-mediated immunodeficiency, immersion injury, or animal bites.","Severe/systemic → blood cultures, complete blood count (CBC), comprehensive metabolic panel (CMP), creatine kinase, lactate. LRINEC score supports but cannot exclude nec fasc.","Surgical consult immediately if necrotizing suspected — diagnosis & treatment is operative exploration."],
  empiric:[
   {set:"Non-purulent, mild–moderate",rx:"Cephalexin or cefazolin (strep + methicillin-susceptible Staphylococcus aureus). by mouth (PO) dicloxacillin alternative.",why:"Non-purulent cellulitis is usually streptococcal/methicillin-susceptible Staphylococcus aureus — add methicillin-resistant Staphylococcus aureus (MRSA) coverage (e.g., vancomycin) for penetrating trauma, MRSA elsewhere or nasal colonization, injection drug use, or systemic inflammatory response syndrome (SIRS)."},
   {set:"Purulent / abscess",rx:"incision and drainage (primary) ± trimethoprim-sulfamethoxazole (TMP-SMX) or doxycycline (cover community-associated methicillin-resistant Staphylococcus aureus (CA-MRSA)); other oral CA-MRSA options: clindamycin or linezolid. Local community-associated methicillin-resistant Staphylococcus aureus: trimethoprim-sulfamethoxazole 95%, doxy 86%.",why:"incision and drainage is the key intervention. ADD an antibiotic after drainage for: severe/extensive or multifocal disease, rapid progression with cellulitis, systemic signs, immunosuppression/comorbidity, extremes of age, an abscess hard to drain (face, hand, genitalia), septic phlebitis, or failure of incision and drainage alone (IDSA MRSA 2011)."},
   {set:"Severe / systemic / immunocompromised",rx:"Vancomycin + (cefepime or pip-tazo) until cultures back",why:"Broad gram-positive incl methicillin-resistant Staphylococcus aureus + gram-negative; local methicillin-resistant Staphylococcus aureus vancomycin (vanc) 100%."},
   {set:"Necrotizing fasciitis",rx:"OR debridement + Vancomycin + Piperacillin-tazobactam + Clindamycin 900 mg every 8 hours (q8h)",why:"Clindamycin suppresses toxin (Eagle effect) in strep/staph; broad coverage until pathogen known."}],
  definitive:["methicillin-susceptible Staphylococcus aureus → cefazolin/nafcillin (better than vancomycin). Group A strep nec fasc → penicillin + clindamycin. Add intravenous immunoglobulin (IVIG) for strep toxic shock per some.",""],
  duration:"Uncomplicated cellulitis 5 days — EXTEND only if not improved by then (IDSA 2014); abscess often incision and drainage ± a short course; necrotizing infection until debridement complete + clinically stable.",
  pearls:["Elevate the limb and treat predisposing factors (edema, obesity, eczema, venous insufficiency); examine and treat interdigital toe-web tinea/fissuring — reduces recurrence. For ≥3–4 episodes/year despite controlling these, give antibiotic prophylaxis (oral penicillin or erythromycin twice daily, or intramuscular benzathine penicillin every 2–4 weeks) (IDSA 2014).","Systemic corticosteroids (e.g., prednisone 40 mg daily ×7 days) can be considered in NON-diabetic adults with cellulitis to speed resolution (IDSA 2014).","Bilateral lower-extremity 'cellulitis' is usually stasis dermatitis, not infection; misdiagnosis is common — also consider deep vein thrombosis, gout, and contact dermatitis.","For methicillin-susceptible Staphylococcus aureus, a beta-lactam (cefazolin/nafcillin) outperforms vancomycin — de-escalate promptly.","Recurrent methicillin-resistant Staphylococcus aureus skin infection: reinforce hygiene/wound care first, then consider DECOLONIZATION — intranasal mupirocin twice daily ×5–10 d ± topical body wash (chlorhexidine or dilute-bleach baths) ×5–14 d. Oral antibiotics are for ACTIVE infection, not routine decolonization (IDSA MRSA 2011).","Infectious Diseases Society of America (IDSA) 2014 stratifies by purulence AND severity: mild = no systemic signs, moderate = systemic signs (SIRS), severe = failed oral antibiotics (abx) + incision and drainage, or immunocompromised, or signs of deeper infection (bullae, sloughing, hypotension, organ dysfunction) → broaden and image/explore."],
  consult:["Differentiate cellulitis mimics; ensure source control (incision and drainage, surgical debridement) and methicillin-susceptible Staphylococcus aureus de-escalation."]},

 {id:"dfi",name:"Diabetic Foot Infection",cat:"Skin, Soft Tissue, and Bone",src:"dfi",
  suspect:["Diagnose infection clinically (do NOT culture/treat a clinically UNINFECTED ulcer — all open ulcers are colonized): ≥2 of local swelling/induration, erythema >0.5 cm, tenderness/pain, warmth, or purulent discharge, with no other cause.","Severity (International Working Group on the Diabetic Foot (IWGDF)/Infectious Diseases Society of America (IDSA)): MILD = skin/subcutaneous only with erythema ≤2 cm; MODERATE = erythema >2 cm OR deeper structures (tendon, muscle, joint, bone); SEVERE = ≥2 systemic inflammatory response syndrome (SIRS) criteria. Add '(O)' when osteomyelitis is present.","Probe-to-bone positive, ulcer >2 cm² / >erythrocyte sedimentation rate (ESR) 70, or a non-healing ulcer → suspect osteomyelitis."],
  workup:["Assess depth (probe-to-bone), perfusion (pulses/ankle-brachial index (ABI)), and need for debridement. Send DEEP/operative tissue cultures, not superficial swabs.","X-ray first; magnetic resonance imaging (MRI) if osteomyelitis is suspected and the radiograph is unrevealing. Trend inflammatory markers (erythrocyte sedimentation rate and C-reactive protein (ESR/CRP)). Bone biopsy (percutaneous or surgical) is the optimal specimen to diagnose osteomyelitis and obtain uncontaminated culture/susceptibility.","Vascular surgery for ischemia; surgical debridement for deep infection/abscess/gas — debridement (removing biofilm and necrotic tissue) is central to cure."],
  empiric:[
   {set:"Mild (no prior antibiotics (abx), no methicillin-resistant Staphylococcus aureus (MRSA) risk)",rx:"Cephalexin or amox-clavulanate (strep + methicillin-susceptible Staphylococcus aureus (MSSA) ± anaerobe)",why:"Mild diabetic foot infection (DFI) is often gram-positive; narrow coverage."},
   {set:"Moderate–severe / chronic / prior antibiotics",rx:"Ampicillin-sulbactam or pip-tazo ± vancomycin (methicillin-resistant Staphylococcus aureus) ± antipseudomonal per risk",why:"Polymicrobial incl gram-negative rods (GNR) + anaerobes; add methicillin-resistant Staphylococcus aureus (vancomycin, linezolid, or daptomycin; oral doxycycline or trimethoprim-sulfamethoxazole for milder disease) for prior methicillin-resistant Staphylococcus aureus/colonization, recent hospitalization or antibiotics, high local prevalence, or severe limb-threatening infection, and Pseudomonas coverage for warm climates, water exposure, or macerated wounds — then tailor to deep cultures and local epidemiology."}],
  definitive:["Tailor to deep cultures. Soft-tissue only: 1–2 wk. Osteomyelitis without resection: 6 wk; after complete resection of infected bone: ~3 wk (or less).","Oral antibiotics are non-inferior to intravenous for bone/joint infection (OVIVA trial) — intravenous therapy is not mandatory once the patient can take a well-absorbed oral agent. For LOCALIZED diabetic foot osteomyelitis, antibiotics alone can be non-inferior to surgical bone resection."],
  duration:"Soft tissue 1–2 wk; bone 3–6 wk (shorter if all infected bone is resected). Oral therapy acceptable.",
  pearls:["Superficial swabs mislead — get deep tissue/bone cultures, and don't culture or treat a clinically uninfected ulcer.","Revascularization and offloading are as important as antibiotics, and debridement of biofilm/necrotic tissue is essential.","Oral antibiotics work as well as intravenous for diabetic foot bone infection (OVIVA); no adjunctive therapy (hyperbaric oxygen, negative-pressure wound therapy) has proven benefit specifically for treating diabetic foot infection."],
  consult:["Coordinate Vascular + Podiatry/Surgery + Endocrine; define soft-tissue vs bone to set duration."]},

 {id:"osteo",name:"Osteomyelitis (incl. Native Vertebral)",cat:"Skin, Soft Tissue, and Bone",src:"vosteo",
  suspect:["Vertebral: new/worsening back OR NECK pain + fever or ↑erythrocyte sedimentation rate and C-reactive protein (ESR/CRP); also suspect with bloodstream infection/infective endocarditis, recent Staphylococcus aureus (S. aureus) bacteremia, or fever + new neurologic symptoms (± back pain). Risk: bacteremia (esp S. aureus), endocarditis, injection drug use (IVDU), devices.","Often misdiagnosed as a degenerative process → diagnosis delayed by months. Contiguous (diabetic foot, trauma, hardware) vs hematogenous (avascular disc seeded from a distant focus)."],
  workup:["erythrocyte sedimentation rate (ESR) & C-reactive protein (CRP) (sensitive, trend response) + 2 sets of aerobic AND anaerobic blood cultures. magnetic resonance imaging (MRI) is the imaging of choice; if MRI can't be obtained (cardiac device, claustrophobia, unavailable), use a gallium/Tc-99 bone scan, computed tomography (CT), or PET.","A positive blood culture for Staphylococcus aureus (S. aureus), Staphylococcus lugdunensis (S. lugdunensis), or Brucella (or strongly positive Brucella serology) WITH a compatible magnetic resonance imaging obviates a biopsy. Otherwise do an image-guided aspiration/biopsy (send for microbiology AND pathology) BEFORE antibiotics when the patient is stable.","Broaden the differential in subacute or at-risk disease: Brucella serology + cultures (endemic areas), fungal blood cultures (host/epidemiologic risk), and a PPD or interferon-γ release assay for tuberculosis (TB). If the first biopsy grows a skin contaminant (coagulase-negative staphylococci except S. lugdunensis, Cutibacterium/Propionibacterium, or diphtheroids) or is nondiagnostic, repeat it (re-aspirate, percutaneous endoscopic discectomy and drainage, or open biopsy); add fungal/mycobacterial cultures + bacterial nucleic acid amplification if routine cultures are negative.","Echo if Staphylococcus aureus / strep bacteremia or vertebral osteo to exclude endocarditis."],
  empiric:[{set:"Hold antibiotics if stable until cultures/biopsy",rx:"If empiric needed (sepsis): Vancomycin + (ceftriaxone or cefepime)",why:"Cover methicillin-resistant Staphylococcus aureus (MRSA) + gram-negative rods (GNR); Staphylococcus aureus is the most common pathogen of vertebral osteomyelitis."}],
  definitive:["Pathogen-directed intravenous (IV) (or highly bioavailable by mouth (PO)) therapy: methicillin-susceptible Staphylococcus aureus (MSSA) → cefazolin/nafcillin; methicillin-resistant Staphylococcus aureus → vancomycin or daptomycin 6 mg/kg (oral/parenteral options: trimethoprim-sulfamethoxazole + rifampin, linezolid, or clindamycin); strep → ceftriaxone; gram-negative rods → per susceptibility.","Surgery for: progressive neurologic deficits, progressive deformity, or spinal instability (± pain) despite appropriate antibiotics; consider debridement ± stabilization for persistent/recurrent bacteremia (no other source) or worsening pain on therapy. Neurologic compromise or impending sepsis → immediate surgery + empiric antibiotics."],
  duration:"6 weeks (total) of parenteral or highly bioavailable oral therapy for most pyogenic native vertebral osteomyelitis (2015 Infectious Diseases Society of America (IDSA)); Brucella native vertebral osteomyelitis → 3 months. Trend erythrocyte sedimentation rate and C-reactive protein and clinical response to guide.",
  pearls:["Get the microbiologic diagnosis (biopsy/blood cx) before antibiotics when the patient is stable — avoids prolonged empiric therapy.","Always look for endocarditis and a seeding source in hematogenous/vertebral osteomyelitis.","Follow response with erythrocyte sedimentation rate and C-reactive protein at ~4 weeks plus clinical assessment — do NOT routinely repeat MRI in patients who are improving. Persistent pain, residual neurologic deficit, mildly elevated markers, or unchanged radiographs ALONE do not equal treatment failure.","Worsening BONY imaging at 4–6 weeks while symptoms, exam, and inflammatory markers improve is expected (imaging lags) — do NOT operate for that alone. Unchanged/rising ESR/CRP after 4 weeks → suspect failure: repeat MRI (epidural/paraspinal soft tissue) and consider re-biopsy.","For methicillin-resistant Staphylococcus aureus osteomyelitis specifically, a minimum 8-week course is recommended; some add rifampin (after any bacteremia has cleared) and extend rifampin-based oral combination therapy for chronic or undrained disease (IDSA MRSA 2011)."],
  consult:["Secure a pathogen, exclude endovascular source, define duration (≥6 wk), arrange outpatient parenteral antibiotic therapy (OPAT) + erythrocyte sedimentation rate and C-reactive protein monitoring."]},

 {id:"pji",name:"Prosthetic Joint Infection",cat:"Skin, Soft Tissue, and Bone",src:"pji",
  suspect:["Suspect with any of: a sinus tract or persistent wound drainage over a prosthesis, ACUTE onset of a painful prosthesis, or ANY chronically painful prosthesis — especially without a pain-free interval after implantation, in the first few years, or with prior wound-healing problems.","Early wound breakdown or an acute-on-chronic effusion around a prosthesis also raises concern."],
  workup:["Check erythrocyte sedimentation rate and C-reactive protein (ESR/CRP) in ALL (the abnormal-ESR + abnormal-CRP combination gives the best sensitivity/specificity) and a plain radiograph in all. Diagnostic arthrocentesis: synovial cell count + differential, crystals, and aerobic/anaerobic culture. Blood cultures if fever, acute onset, or likely Staphylococcus aureus (S. aureus).","Do NOT routinely use bone/leukocyte scans, magnetic resonance imaging (MRI), computed tomography (CT), or PET to diagnose prosthetic joint infection (PJI).","Hold antibiotics ≥2 weeks before sampling when stable to improve culture yield. Send ≥3 (optimally 5–6) periprosthetic tissue cultures; sonication of the explant ↑ yield.","Definition: a sinus tract communicating with the prosthesis OR purulence around it (no other cause) is DEFINITIVE; ≥2 cultures (or aspirate + intraoperative) growing the SAME organism is definitive; acute inflammation on histopathology is highly suggestive; a virulent organism (e.g., S. aureus) in a single sample may indicate PJI, but a single common contaminant (coagulase-negative staphylococci, Cutibacterium/Propionibacterium) alone is not."],
  empiric:[{set:"Only if septic; otherwise await cultures",rx:"Vancomycin + antipseudomonal beta-lactam (cefepime/pip-tazo)",why:"Cover staph (incl methicillin-resistant Staphylococcus aureus (MRSA)) + gram-negative rods (GNR); staph & coagulase-negative staphylococci (CoNS) dominate."}],
  definitive:["Surgical strategy (DAIR vs 1-/2-stage exchange) + pathogen-directed therapy. Staphylococcal prosthetic joint infection (PJI) with retained hardware: add RIFAMPIN to the regimen (biofilm activity).","methicillin-resistant Staphylococcus aureus with a stable implant, short symptom duration (<3 wk), and debridement + retention (DAIR): parenteral anti-methicillin-resistant Staphylococcus aureus therapy + rifampin ×2 wk, then rifampin + a companion oral agent (fluoroquinolone, trimethoprim-sulfamethoxazole, a tetracycline, or clindamycin) for 3 months (hip) or 6 months (knee). Remove the device for unstable implants, late-onset infection, or long symptom duration (IDSA MRSA 2011).","Surgical-strategy menu (2013 Infectious Diseases Society of America (IDSA)): DAIR (debridement + retention) ONLY if the prosthesis is well-fixed, there is NO sinus tract, AND it is within ~30 days of implantation OR <3 weeks of symptom onset. Otherwise — 2-stage exchange (most common in the US; obtain a pre-reimplantation ESR/CRP), 1-stage/direct exchange (selected total hip with a good soft-tissue envelope + an organism susceptible to highly bioavailable oral agents), or permanent resection arthroplasty / arthrodesis / amputation (nonambulatory, poor bone/soft tissue, highly resistant organism, or failed staged exchange).","Indefinite chronic oral suppression may be considered for a retained prosthesis (e.g., not a surgical candidate), individualized to comorbidities, allergies, and tolerances."],
  duration:"Staphylococcal PJI with DAIR or 1-stage exchange: 2–6 weeks pathogen-specific intravenous (IV) therapy WITH rifampin, then rifampin + an oral companion to a TOTAL of 3 months (hip) or 6 months (knee); if rifampin can't be used, 4–6 weeks pathogen-specific therapy. Resection arthroplasty (no retained hardware): 4–6 weeks pathogen-specific IV or highly bioavailable oral therapy (2013 Infectious Diseases Society of America (IDSA)).",
  pearls:["Rifampin is key for staph biofilm on retained hardware — never use rifampin as monotherapy (rapid resistance). The PREFERRED rifampin companion is a fluoroquinolone (ciprofloxacin or levofloxacin); add rifampin only AFTER any bacteremia has cleared and the wound is dry.","Source control (surgery) is essential; antibiotics alone rarely cure a retained infected prosthesis.","Don't rely on MRI/CT/bone scans to diagnose PJI — ESR + CRP, arthrocentesis (cell count/differential + culture), and ≥3–6 intraoperative cultures are the workhorses."],
  consult:["Partner with Orthopedics on surgical plan; decide rifampin eligibility and outpatient parenteral antibiotic therapy (OPAT) duration."]},

 {id:"endocarditis",name:"Infective Endocarditis",cat:"Cardiac",src:"ie",src2:"valve",
  suspect:["Fever + a new/worsening regurgitant murmur, embolic phenomena, or persistent bacteremia (especially Staphylococcus aureus (S. aureus), viridans streptococci, enterococcus); risk: injection drug use (IVDU), prosthetic valve/cardiac device, prior endocarditis, degenerative valve disease.","Right-sided (tricuspid) endocarditis in injection drug users — Staphylococcus aureus with septic pulmonary emboli (cough, pleuritic pain, nodular infiltrates), often WITHOUT a murmur.","Classic peripheral stigmata (Osler nodes, Janeway lesions, Roth spots) are now RARE — petechiae and splinter hemorrhages are more common."],
  treatWhen:[
   "PROPHYLAXIS (2017 American Heart Association/American College of Cardiology (ACC) valvular update) — give antibiotic prophylaxis ONLY before dental procedures that manipulate gingiva/the periapical region or perforate oral mucosa, AND only for the highest-risk hearts: a prosthetic valve (including transcatheter/homograft) or prosthetic repair material (annuloplasty rings/chords), previous infective endocarditis, unrepaired cyanotic congenital heart disease (or repaired with a residual shunt/regurgitation at prosthetic material), or a cardiac transplant with valvulopathy.",
   "NO prophylaxis for gastrointestinal or genitourinary procedures, and none for hearts that are not in the high-risk list.",
   "Regimen: amoxicillin 2 g by mouth (PO) 30–60 min before the procedure (cephalexin, azithromycin, or doxycycline if penicillin-allergic — clindamycin is no longer recommended)."
  ],
  workup:["≥3 sets of blood cultures from separate venipuncture sites BEFORE antibiotics, with the first and last drawn ≥1 hour apart. Apply the Modified Duke Criteria (definite = 2 major, OR 1 major + 3 minor, OR 5 minor; see Scores).","transthoracic echocardiography (TTE) first; transesophageal echocardiography (TEE) if a prosthetic valve/device, high suspicion, or a positive/non-diagnostic transthoracic echocardiography (TTE sensitivity is only ~36–69% for prosthetic valves). Repeat TEE in 3–5 days if initially negative but suspicion persists.","18F-FDG PET/CT (and cardiac CT) help diagnose PROSTHETIC-valve and cardiac-device infection (now a major criterion in newer schemes).","If blood cultures are negative, consider fastidious/zoonotic causes — Bartonella, Coxiella burnetii (Q fever), Brucella, Tropheryma whipplei, Legionella, fungi — and send specific serologies/polymerase chain reaction (PCR).","Look for complications: heart failure, perivalvular abscess (new heart block / PR prolongation), systemic emboli (brain/spleen/kidney), and mycotic aneurysm."],
  empiric:[
   {set:"Native valve, acute, awaiting cultures",rx:"Vancomycin + Ceftriaxone (add cefepime if gram-negative rods (GNR) concern)",why:"Covers Staphylococcus aureus (incl methicillin-resistant Staphylococcus aureus (MRSA)), streptococci, enterococcus, and HACEK."},
   {set:"Prosthetic valve",rx:"Vancomycin + Gentamicin + Rifampin (± cefepime)",why:"Adds coagulase-negative staphylococci (CoNS)/biofilm coverage; add rifampin for prosthetic material once bacteremia has cleared."}],
  definitive:["methicillin-susceptible Staphylococcus aureus (MSSA): cefazolin or nafcillin ×6 wk (vancomycin or daptomycin only if methicillin-resistant Staphylococcus aureus or beta-lactam allergy). Do NOT add gentamicin to staphylococcal native-valve endocarditis (no benefit, more nephrotoxicity). methicillin-resistant Staphylococcus aureus: vancomycin or daptomycin ×6 wk.","Viridans streptococci/Streptococcus gallolyticus by penicillin minimum inhibitory concentration (MIC): highly susceptible (MIC ≤0.12) → penicillin or ceftriaxone ×4 wk (or a 2-week regimen with gentamicin in uncomplicated native-valve disease); less-susceptible strains → 4–6 wk + gentamicin. Enterococcus: ampicillin + ceftriaxone (or ampicillin + gentamicin) ×4–6 wk. HACEK: ceftriaxone ×4 wk.","Uncomplicated right-sided methicillin-susceptible Staphylococcus aureus endocarditis in an injection drug user can be treated with a 2-week beta-lactam + aminoglycoside in selected patients (no renal failure, no left-sided/metastatic disease, vegetation <20 mm).","Early surgery (during the initial hospitalization) for: valve dysfunction causing heart failure; uncontrolled infection (perivalvular abscess, heart block, or fungi/highly resistant organisms such as vancomycin-resistant enterococci (VRE) or multidrug-resistant gram-negative rods); persistent bacteremia/fever >5–7 days on appropriate therapy; recurrent emboli with a persistent large (>10 mm) mobile vegetation; and prosthetic-valve dehiscence."],
  duration:"4 weeks (native valve, highly susceptible streptococci) to 6 weeks (Staphylococcus aureus, enterococcus, prosthetic valve); count day 1 from the first NEGATIVE blood culture.",
  pearls:["Cefazolin/nafcillin beats vancomycin for methicillin-susceptible Staphylococcus aureus endocarditis — de-escalate once methicillin-susceptible Staphylococcus aureus is confirmed; daptomycin is the alternative for methicillin-resistant Staphylococcus aureus or beta-lactam intolerance.","Ampicillin + ceftriaxone is the preferred, less-nephrotoxic enterococcal regimen.","Repeat blood cultures every 24–48 hours until clearance. Antibiotic prophylaxis is now reserved for the highest-risk hearts and dental procedures only (2017 update).","Classic immunologic stigmata (Osler nodes, Roth spots) are rare; every Staphylococcus aureus bacteremia warrants evaluation for endocarditis (and an echocardiogram)."],
  consult:["Mandatory infectious disease (ID) + Cardiology/cardiac surgery 'Endocarditis Team'; define duration, surgical indications, and outpatient parenteral antibiotic therapy (OPAT)."]},

 {id:"diverticulitis",name:"Intra-abdominal Infection & Acute Diverticulitis",cat:"Gastrointestinal",src:"divert",src2:"ciai",
  suspect:["Diverticulitis: left-lower-quadrant pain, fever, and altered bowel habits; computed tomography (CT) confirms and stages it (uncomplicated vs complicated — abscess, perforation, obstruction, or fistula; ~12% are complicated). The modified Hinchey classification grades severity.","Secondary peritonitis / intra-abdominal abscess: localized or diffuse abdominal pain + systemic signs.","Risk factors for diverticulitis: increasing age, a low-fiber/high-red-meat diet, obesity, physical inactivity, smoking, and non-aspirin NSAIDs, corticosteroids, or opioids."],
  workup:["Imaging by scenario (Infectious Diseases Society of America (IDSA) 2024): suspected diverticulitis or intra-abdominal abscess → computed tomography (CT) of the abdomen/pelvis with IV contrast first (ultrasound or magnetic resonance imaging if CT is unavailable/contraindicated, or in pregnancy); suspected appendicitis → CT first in adults but ULTRASOUND first in children and pregnant patients (then magnetic resonance imaging if equivocal); suspected cholecystitis/cholangitis → ultrasound first.","Risk-stratify with a severity-of-illness score within 24 h (Infectious Diseases Society of America 2024 prefers APACHE II in adults).","complete blood count (CBC), comprehensive metabolic panel (CMP), lactate. Obtain blood cultures ONLY if there is an elevated temperature PLUS hypotension/tachypnea/delirium, OR concern for a resistant organism that would change therapy — not routinely otherwise.","Source control: percutaneous drainage of an abscess >3–4 cm; surgery for perforation/peritonitis/failure. Obtain intra-abdominal cultures at source control (fluid inoculation preferred over a swab); do not routinely culture an uncomplicated appendectomy."],
  empiric:[
   {set:"Uncomplicated diverticulitis — selected outpatients",rx:"Observation/no antibiotics is now acceptable in immunocompetent mild cases; if treating: amox-clav, or (cipro/levo + metronidazole)",why:"Recent trials show many uncomplicated cases improve without antibiotics."},
   {set:"Complicated / inpatient community-acquired",rx:"Ceftriaxone + Metronidazole  OR  Ertapenem  OR  (cipro/levo + metronidazole)",why:"Cover enteric gram-negative rods (GNR) + anaerobes. Local Escherichia coli (E. coli) ceftriaxone 85%."},
   {set:"Healthcare-associated / severe / Pseudomonas risk",rx:"Piperacillin-tazobactam  OR  Cefepime + Metronidazole  ± Vancomycin (if enterococcus risk)",why:"Broaden for Pseudomonas/resistant gram-negative rods; add enterococcal coverage in healthcare-associated peritonitis."}],
  definitive:["Narrow per culture (often from drainage); anaerobic coverage is essential for a colonic source."],
